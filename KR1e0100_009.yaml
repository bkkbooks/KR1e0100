body:
  text: 讀左日鈔卷九吳江朱鶴齡撰五年舍中軍卑公室也注罷中軍季孫稱左師孟氏稱右師叔孫氏則自以叔孫為軍名疏分中軍之衆屬上下二軍故魯有左師右師左師右師見哀十一年傳又言叔孫武叔退而蒐乘知自以叔孫為軍名也劉敞曰如杜所言則三軍猶在徒以軍為師名號少異耳何謂舍中軍乎陸粲曰按魯之軍號傳所不言哀十一年雖稱左師右師疑亦臨時所命非若晉之三軍楚之二廣有定制者叔孫軍名尤無據愚謂觀下言四分公室則廢中軍之後上下二軍分爲四矣本自明白注直可刪葬鮮者自西門注不以壽終曰鮮西門非魯朝正門按叔仲帶以葬鮮告季孫則季孫知豎牛餓殺季孫矣而不討者季孫利其禍已得專魯政也彼實家亂子勿與知不亦可乎王樵曰南遺此語與盧蒲嫳告慶之語同豎牛即叔孫之東郭偃棠無咎也孟丙仲壬則崔成崔疆也叔孫之季孫則崔杼之慶封也使亂大從注使從于亂按哀三年傳鄭勝亂從杜亦作此解服䖍云使亂大順之道從順也謂適庶之順此説得之必速殺之鍾惺曰豎牛立昭子而討豎牛者即出昭子假手甚妙藏機甚巧若他人殺之便不足異矣此中理數昭子亦隂為天所用而不知可謂千古賊奴之戒日之數十故有十時亦當十位注日之數自甲至癸為十日中當王食時當公平旦為卿鷄鳴為士夜半為皂人定為輿黄昏為𨽻日入為僚晡時為僕日昳為臺疏七年傳天有十日人有十等彼即厯言從王至臺十等之目此傳既云十時十位位以王公卿為三日以中食旦為三日上其中知從中而右旋配之也晡時日西食時也日昳謂蹉跌而下若據時之先後則旦至食乃至于中宜以左旋為次今傳以配十位從中而右旋者人之道貴以賤為本欲從賤而漸至于貴也若從中左旋則位乃漸退非進長之義故右旋也日之謙當鳥注離為日為鳥離變為謙日光不足故當鳥疏説卦離為日為雉雉為鳥也日為髙明鳥為微細今日之謙退不得髙明下當微細是日光不足下當鳥也純離為牛注易離上離下離畜牝牛吉故言純離為牛疏明夷初九無牝牛象但明夷初卦下體是離故傳以純離之卦求牛象也民食于他注他三家也謂公與民無異程公説曰君以養民民食于他者言民為三家所有也索氏注河南成臯縣東有大索城按漢書楚漢相拒于滎陽京索之間即此地享覜有璋注既朝聘而享覜見也疏引服䖍云享獻也獻國所有林堯叟以二義皆通傅遜曰聘而獻見禮之大者何得略之此即鄉黨享禮有容色之享耳半圭曰璋執之以行禮設机而不倚爵盈而不飲疏朝聘之禮有設机進爵之時朝禮雖亡而聘禮有其略也聘義曰聘射之禮至大禮也質明而始行事日㡬中而後禮成非強有力者弗能行也故設机而不倚酒清人渴而不敢飲肉敗人餒而不敢食故爵盈而不飲誰其重此注言怨重或曰問誰人當此重任以備晉師之來也如杜氏解與下文四句意不貫韓賦七邑林注韓襄起之兄子箕襄邢帶二人韓氏族韓須叔禽叔椒子羽四人皆韓起子凡七人人一邑陸粲曰觀下文皆大家句叔禽三人若是起庶子不得稱家又云輔韓須揚石而不及叔禽等其非起之子明矣劉炫以為叔禽三人亦韓起之族得之楊肸按叔向本羊舌氏食邑于楊故又號楊肸肸子石為楊食我因其十家九縣注縣賦百乘疏哀二年傳上大夫受縣論語百乘之家家即縣也六年並有爭心以徵于書而徼幸以成之愚謂叔向之意特恐法懸于書民只在法上詭避無以息其爭端所謂免而無恥也然季世民偽日滋不豫設法以禁之則扞㒺益衆故子産復書曰吾以救世也謂季世之民不可以無法齊也其與鄧析之竹刑用意固有異矣火未出而作火以鑄刑器藏爭辟焉疏教民使爭罪謂之爭辟服䖍云鑄鼎藏爭辟與五行之火爭明故為災在器故稱藏也按心星為大火三月昏見東方夏三月周五月也鄭人以三月鑄刑書故云火未出子蕩歸罪於薳洩而殺之注不以敗告故不書趙汸曰夷狄戰敗多略之而不書下文云且弔敗也魯使卿弔敗則杜氏云不告故不書非實事矣士匄相士鞅逆諸河疏學者皆以士匄是范宣子即士鞅之父不應取其父同姓名人為介當依王肅董遇古本士匄作王政王元規云古人質口不言之耳何妨為介也按士文伯是士鞅之族亦名匄此即文伯也然士文伯名古本或有作正者七年暨齊平齊求之也按此是齊求魯而與之平杜氏謂燕與齊平非也辨詳集説盟于濡上注濡水出髙陽縣東北至河間鄚縣入易水疏今髙陽無濡水也杜言不知何據今按水經濡水出涿郡故安縣西北獨山東合易水注拒馬水一統志濡水在順天任丘縣北任丘漢鄚縣地為王旌以田注王旌斿至于軫疏斿旌旗末埀者至軫謂建蛟龍之旂而埀至車軫也禮緯云禮天子旂九仭曳地諸侯七仭齊軫周禮軫去地四尺僕區烏侯反之法疏服䖍云區匿也為隱匿亡人之法好以大屈注大屈弓名疏引賈逵云寳金可以為劒出大屈也按二説未詳孰是據地志大屈即晉屈邑漢為北屈縣今平陽府吉州其地産鐵有鐵冶則賈説近之其神化為黄熊疏音義云熊獸名亦作能三足鼈解者疑獸非入水之物當是鼈也然鮌既為神矣雖獸亦能入水鼈則太下何以當夏郊乎説文字林皆云能熊屬足似鹿韓子祀夏郊晉侯有間陸粲曰夏之郊也有把存焉是天子之世守也雖晉為盟主得奸其祀乎且鬼神不歆非類鯀之神信能為妖祥以求食歟吾以為不及晉國今取夢寐怳惚之象而妄意之則惑之甚者也衛成公夢康叔曰相奪予饗命祀相寗俞不可曰相之不饗於此久矣非衛罪也不可以間成王周公之命祀其為知禮也賢於公孫成子逺矣愚按晉侯之夢禮所謂因夢也平公把出也襄二十九年嘗合諸侯城把平公葢素厚母家而夏肄之祀應不及鯀故黄熊因之見夢焉非無故而從晉平公求食也然陸子之説自正余又將殺段也注公孫段豐氏黨疏劉炫云公孫段即豐氏當言駟氏黨字之誤也子産立公孫洩及良止以撫之立良止以安民心也立公孫洩使民不疑于良止也所謂反其正以媚民者也人生始化曰魄既生魄陽曰魂疏人之生也始變化為形形之靈者名曰魄既生魄矣魄内自有陽氣氣之神者名曰魂魄在于前魂在于後故曰既生魄陽曰魂也劉炫云形有質氣無質尋形以知氣故先魄而後魂其實並生無先後也朱子曰子産此論窮理極精叔父陟恪按恪當作䧏字之訛也大雅文王陟䧏在帝左右此追命襄公也故云叔父陟降在我先王之左右余敢忘髙圉亞圉按周本紀髙圉古公亶父之曾祖也亞圉髙圉子宋忠曰髙圉能率稷者也周人報之因衛是同姓故舉先世為言如注云二圉亦受殷王追命此果何據乎聖人之後也而滅于宋注孔子六代祖孔父嘉為宋督所殺其子奔魯陸粲曰世本家語並云孔父嘉曽孫防叔始奔魯家語又云以避華氏之偪故按嘉為華督所殺其子避禍應即出奔何得至曽孫乃奔魯杜説較近理特未詳所據耳六物不同按嵗時日月星辰古人皆謂之物故桓六年子同生公曰是其生也與我同物杜氏注同日也八年桓子稽顙曰頃靈福子陸粲曰桓子授甲非以助疆氏也將承二家之敝而取之以子旗之言正也為是慙而止未㡬乘其飲酒卒伐而逐焉以分其室則無宇之情見矣二恵既亡姜族始弱陳氏之為斧斤以斵喪齊室也豈一日之故哉𫝊遜曰欒髙自崔慶既滅復任情殺閭丘嬰等以弱其宗陳氏欲圖之久矣然聞子旗之言而遂止可見誠義足以感人陰謀必有間而始發也使能終守其正二族其可動哉猶將復由注由用也魏了翁曰由義如尚書顛木之有由蘖按説文無由字惟有㕀字注云木生條也後人因省已作由此言陳人將興如已仆之木復生由蘖如此解字義既明而句法亦完矣陸粲曰由者經也從也言今嵗星猶在箕斗之間將復經由鶉火之次乃亡爾自幕至于瞽瞍無違命注幕舜之先按韋昭注國語以幕為舜後虞思大誤當取左氏此語正之寘徳于遂世守之言舜有明聖之徳其徳流及于後也史記索隱殷封遂世守之宋忠云虞思之後箕伯直柄中衰殷湯封遂于陳以為舜後是也九年魏駘芮岐畢注駘在武功始平縣所治斄城按駘當作邰即詩有邰室家之邰也魏在馮翊芮在河東俱見桓六年蒲姑商奄吾東土也疏蒲姑齊也商奄魯也二十年傳蒲姑氏因之定四年傳因商奄之民命以伯禽肅慎燕亳按肅慎即後代女真之地疏云亳近燕不知所在愚謂恐當作濮即濮陽也地在河北豈如弁髦而因以敝之疏士冠禮始冠緇布冠次加皮弁次加爵弁是三加冠也其記冠義云始冠緇布之冠冠而敝之可也劉炫云弁髦二物童子埀髦為髧彼兩髦親没乃棄之因以敝之者冠則棄弁親没則不髦也愚謂髦不可言敝弁髦是言加弁于髦耳弁有皮弁爵弁嫌緇布冠不得名弁故杜云弁亦冠也傅士凱謂傳言弁非緇布冠固矣妃音配以五成故曰五年按妃訓合天數五地數五五位相得而各有合故曰妃以五成五行家甲與已合乙與庚合丙與辛合丁與壬合戊與癸合亦是請佐公使尊注公之使人執尊酌酒請為之佐依杜注使當音所吏反或云使尊舉酌也辰在子卯謂之疾日漢書翼奉𫝊北方之情好也好行貪狼申子主之東方之情怒也怒行陰賊亥卯主之貪狼必待陰賊而後動陰賊必待貪狼而後用二陰並行是以王者忌子卯禮經避之春秋諱焉注賈氏説桀以乙卯亡紂以甲子喪故以為戒備之張晏曰子刑卯卯刑子相刑之日故以為忌必云夏亡乙卯商亡甲子不推湯武以興此説非也又飲外嬖嬖叔注外都大夫之嬖者按檀弓是李調傳云外嬖對内嬖而言必云外都泥矣十年居其維首而有妖星焉告邑姜也注客星出其地故曰妖星邑姜太公女疏維者綱也𤣥枵次有三宿女為其初是次之綱維也女星居其維首而妖星出焉告邑姜以其子孫將死也𫝊遜曰言婺女居𤣥枵之維首而妖星見于婺女之次韋昭注周語亦云須女入黿之首須女即婺女也天黿即𤣥枵也杜注客星居𤣥枵之維首太略告邑姜也如此占法甚荒唐杜云婺女為既嫁女織女為處女邑姜齊之既嫁女也妖星在婺女齊得嵗故知禍歸邑姜此亦強為之解邑姜晉之妣也天以七紀注二十八宿四七𫝊遜曰爾雅斗牛為星紀郭云日月五星之所始終故曰星紀其分尤不應有妖星女與斗牛同次故言此耳杜云二十八宿四七夫二十八宿固為四七矣而于此上下文何與乎戊子逢公以登星斯於是乎出注逢公殷諸侯疏周語説𤣥枵之次云我皇妃太姜之姪伯陵之後逢公之所馮神也孔晁曰太姜太王之妃則知逢公是殷諸侯登登天也逢公未死之先妖星嘗出婺女時嵗星不在故齊自當禍此時嵗在齊分則外孫當之故知七月戊子晉君將死以靈姑銔率注靈姑銔公旗名疏率謂率國人以戰也公與桓子莒之旁邑辭穆孟姬為之請髙唐陳氏始大愚謂晏平仲不助四家而獨勸桓子以徳讓葢平仲實睦于陳者觀其與叔向語已知齊之為陳及于辭宅又因陳桓子以請至此而桓子用其言因盡反亡公子賑恤貧約而傳以陳氏始大結之明代齊者陳而平仲之為桓子謀適以助成其大然則平仲非忠于齊者歟平仲智人也陳氏之禍惟禮可以已之平仲固以告景公矣景公既不能從而欒髙國鮑之徒又皆不可與共政則惟有委蛇觀變其間使景公信陳氏安而市宅遄臺因事納忠即梁丘據亦不得間之此平仲之所以為智也千人至將不行不行必盡用之𫝊遜曰不行在千人上見之人衆則費廣將不能行矣不能行則用之必盡非如杜所云為見新君而用也如用為見新君則其幣固在何盡費之乎孤斬焉在衰絰之中陸粲曰斬焉言哀痛之深如斬截也非注斬衰之謂元公惡寺人柳欲殺之及即位又有寵愚謂一寺人柳也向欲殺之今又寵之何哉夫小人之長惟工於媚耳以其術媚他人則知惡以其術媚己則必喜雖父子之間猶分彼此焉乃知疇昔之惡非真惡也特惡其不於己行媚也人情皆然豈獨宋元公之於寺人柳哉十一年楚子在申召蔡靈侯戰國䇿莊辛曰蔡靈侯左抱幼妾右擁嬖女與馳騁乎髙蔡之中而不知夫子發方受命乎靈王繫已以朱絲而見之也鮑彪曰經傳不書子發葢使子發召之是以無拯不可没振無拯無救助也不可没振猶没于水者不可復振而出之也物以無親此人物之物言不為人所親附杜解物事也非朝有著定疏著定謂佇立定處野㑹設表為位亦當有物記處如今之位版也葬齊歸公不慼晉史趙曰必為魯郊歸姓也不思親祖不歸也疏言必為魯人所逐而出在郊野陸粲曰昭公之出在郊野不能君魯也獨于其母姓知之乎或母非歸姓則雖臨喪不慼也而無咎乎瞽史之説迂繆至此而猶足載乎愚謂左氏禨祥之説多矣此猶無義理必後人因昭公出亡作此附㑹語耳況用諸侯乎疏世子雖未即位父死則當君處故以諸侯言之五大不在邊五細不在庭疏五大五細無字惟言五耳不知五者何謂杜氏亦無明證愚謂定三年傳職官五正注云五官之長即曲禮所謂司徒司馬司空司士司冦也以證此傳五大豈不顯然元凱蔓引金木水火土五官迂矣鄭京櫟實殺曼伯注曼伯檀伯也厲公得櫟又并京按厲公殺檀伯而居櫟事見桓十五年并京傳無其文杜以京櫟連言故知之耳十二年朝而塴注塴下棺疏周禮作窆禮記作封此作塴皆葬時下棺之事而其字不同俞琰曰塴字從土從崩是既下棺而以土掩之説文窆下棺也塴喪葬下土也微異公子憗遂如晉趙汸曰憗本從公如晉故不書非劉炫不告廟之説有肉如坻注坻山名疏爾雅小洲曰陼小陼曰沚小沚曰坻坻是小地不得對淮之大水故杜以坻為山名劉炫規杜謂山無名坻者按楚子觀兵于坻箕之山坻非山乎楚子謂成虎若敖之餘也疏經言熊傳言虎者此人名熊字虎假道于鮮虞遂入昔陽注鮮虞在中山新市縣昔陽肥國都樂平沾縣東有昔陽城疏肥鼓並在鉅鹿在鮮虞東南杜以傳云遂入昔陽八月壬午滅肥是因入而滅之故云昔陽肥國都也肥都昔陽與鼓相近晉既滅得肥國故二十二年息昔陽之門外遂襲鼓取之劉炫以昔陽為鼓都非也愚按杜既言樂平沾縣東有昔陽城又言鉅鹿下曲陽縣西南有肥累城樂平與下曲陽相去頗逺杜例凡言有者皆疑古昔陽城必不在樂平也外彊内温忠也和以率貞信也疏剛強以禦難温柔以事主為忠用和柔之性以循安正道為信陸粲曰杜解二語取喻卦象義雖近似然詳傳云坤之比者謂坤卦之比爻耳故下文惟説黄裳元吉之義亦猶七年孔成子筮得屯之比止論利建侯不取比義崔杼得困之大過陽虎得泰之需其為説皆止取本爻不及之爻也供養三徳為善疏供養董遇注本作共解云盡共以養成三徳也𫝊遜曰杜解三徳引洪範與此何涉陸子餘以為三是二之誤即上忠與共亦非葢上文本言忠信人臣之節忠信盡之為南蒯言尤宜共以事上是合忠信共為三善也下文非此三者弗當即䝉此而言杜舍共而以善益之非矣觀下文云且可飾乎欲其從下之飾而為共意益明矣楚子次于乾谿注在譙國城父縣南姜寳曰城父在今亳州東南七十里本陳夷邑楚滅陳以乾谿為南北要地築章華臺于此以駐師遊觀焉漢志汝南郡城父縣故夷有章華臺注云有乾谿在縣南即其地也秦復陶翠被注秦復陶秦所遺羽衣翠被以翠羽飾被被帔同以禦雨也按鄘風翟衣毛傳云以翟羽為衣服之飾孔氏疏不以為然謂衣服隨身卷舒非可羽飾然典籍散亡安知羽飾之服古必無之觀此傳復陶翠被之文則知毛説必有據右尹子革夕栁宗元曰古者朝見曰朝夕見曰夕詩莫肯朝夕傳朝而不夕漢儀夕則兩郎向瑣闈拜謂之夕郎昔我先王熊繹辟在荆山楚世家當周成王時舉文武勤勞之後嗣封熊繹于楚蠻姓芈氏居丹陽徐廣曰丹陽在南郡枝江縣輿地記秭歸縣東有丹陽城周迴八里熊繹始封也昔我皇祖伯父昆吾舊許是宅注陸終氏生六子長曰昆吾六曰季連季連楚之祖故謂昆吾為伯父按史記索隱宋忠曰昆吾國名已姓左傳衛侯夢見人登昆吾之觀今濮陽城中有昆吾臺是括地志濮陽縣古昆吾國昆吾故城在縣西三十里臺在縣西百步據此則昆吾國在今濮州楚靈乃曰舊許是宅舊許今許州也豈昆吾之後嘗徙封歟是四國者專足畏也注四國陳蔡二不羮疏劉炫云楚語靈王城陳蔡不羮韋昭注三國楚别都潁州定陵有東不羮許州襄城有西不羹使問范無宇曰今吾城三國賦皆千乘亦當晉矣諸侯其來乎對曰是三城者豈不使諸侯之惕惕焉彼再言三城無四國也縱不羮有二或當前後遷焉非是並時有二古四字積畫四當為三耳是能讀三墳五典八索九㐀林注三墳伏羲神農黄帝之書五典少昊顓頊髙辛唐堯虞舜之書八卦之説謂之八索九州之志謂之九丘出尚書序按賈逵張衡馬融諸説不同今以書序為正周行天下將皆必有車轍馬跡焉王樵曰穆王之事正楚靈所欲為也既得諸侯又滅陳蔡必將觀兵周郊以求九鼎以許田為名移兵臨鄭為改物之圖子革知其心事故直引穆王事以諷之祈招常遥反又音昭之詩注祈父周司馬招其名疏引馬融祈作圻即酒誥圻父賈逵云祈求也昭明也言求明徳也愚按三説皆未安杜解本之詩傳然何以知招之必為祈父名乎王肅云祈招詩名也猶齊景公作君臣相説之樂曰徵招角招耳此説是形民之力朱子曰形字今家語作刑極分曉葢言傷民之力而無厭足之心愚按如此解于上式如玉式如金意不接書傳刑用也用民之力恐當如古訓直言用民之力而無醉飽過盈之心也十三年申之㑹越大夫戮焉申㑹在四年疏戮者陳其罪以狥諸軍欲殺終亦不殺故常壽至今在楚圍固城克息舟城而居之凡城之固者皆圍之息舟固城之一也以克故有毁又城而居之舟字句今不封蔡蔡不封矣我請試之愚謂子干空䝉弑君之名而實啟棄疾之立者然始事之初棄疾不知并子干亦不知特觀從以復蔡為志嘗試為之耳其後竟復蔡當與申包胥復楚同功強與之盟強與子干子晳盟也二子知非蔡公之命欲還故觀從強盟之既盟之後襲蔡狥蔡二子惟其所用矣依陳蔡人以國依即易利用為依遷國之依陳蔡雖亡而其人尚在故依焉殺太子禄及公子罷敵王樵曰蔡公志乎為君故殺靈王之二子特以長㓜之序推比使立而因歸惡名焉金履祥曰䖍之弑君也以縊而䖍即自縊䖍之弑君也及其二子幕與平夏而䖍子禄與罷敵亦先死焉然棄疾歸罪于比而他日吳人卒鞭其墓而戮之天道洵可畏哉夏五月癸亥王縊于芋尹申亥氏趙汸曰杜經下注云靈王實以四月死楚王生失靈王本其始禍以赴此注又云經書四月誤兩注不同今按四月者比歸國之月也春秋之法凡大夫公子反國不月而弑君無不月者比歸而王弑故經没死之月䝉上文比歸為一事見比以簒逆歸而特存其歸國之月以異之杜氏不明筆削之㫖故經傳異説觀從謂子干曰不殺棄疾雖得國猶受禍也愚謂觀從豈不知棄疾勝子干而反欲子干殺棄疾哉以為子干王楚則復蔡之志可遂矣其始也本借子干以發難則子干既立亦欲固其位以報之謀不用而遂行亦所以謝子干非徒自免于禍也葬子干于訾實訾敖疏郟敖與此訾敖皆不成君無諡號也元年傳云葬王于郟曰郟敖此云葬子干于訾實訾敖並以地名冠敖未知其故又世家楚先君有若敖宵敖皆在位多年亦稱為敖不知敖是何義棄禮按棄禮指卜神之禮也杜注棄立長之禮則康王實長誤甚林注得之同惡相求注謂棄疾親恃子干𫝊遜曰同惡相求指當時同心造亂之人薳居蔓成然輩非謂棄疾也愚按下云君楚國者其棄疾乎則此不當言棄疾明矣子産以幄幕九張行注幄幕軍旅之帳疏幕大幄小幄在幕下張之幄幕九張葢九幄九幕也使諸侯嵗聘以志業注志識也疏令諸國各自記其職貢之業再㑹而盟以顯昭明注凡八聘四朝再㑹王一巡守盟于方嶽之下疏十二年一盟大明黜陟之法以光顯諸侯有昭明之徳者告誓神明尚書周官六年五服諸侯一時朝王即此再朝而㑹是也此傳之文與尚書正合杜言巡守盟于方岳與書義符同而周禮之文不載此法古書亡滅不可備知愚按盟于方岳周官及三禮並無其説乃叔向假此為辭以令諸侯耳榖梁傳云盟詛不及三王交質子不及二伯詛盟者衰世之事也豈以成周盛時而為之哉建而不斾注建立旌旗不曳其斾斾斿也疏爾雅繼旐曰斾郭注帛續旐末為燕尾者不斾謂建其旗而以燕尾纒結干頭如記所云徳車結旌也軍法戰則舒斾愚按經傳用字有虚實此傳之斾乃虚字疏語極明非指旗幟之名也小雅胡不旆旆與此同義其白旆央央方是大將所建旗寡君有甲車四千乘在疏春秋之世兵革遞興出軍多少量敵強弱士卒盡行數無定準成二年鞌之戰晉車八百乘計有六萬人惟三卿帥之昭十三年平丘之㑹叔向云寡君有四千乘在計四千乘士卒成二十四軍爾時晉惟立三軍則甲車四千屬三軍其軍豈止一萬二千五百人乎因邾莒杞鄫之怒以討魯罪間其二憂注因南蒯子仲二憂為間隙穆文熈曰邾莒無故愬魯冀免晉貢葢狃于前愬之得行耳晉人不察遂以絶魯叔向智者亦為強大刼制之辭至引南蒯子仲之事以恐之夫南蒯據費叛魯非魯之罪也晉不之念反舉其事以為魯釁而欲乘之豈盟主之義哉子産爭承言所出貢賦多少之次當承何國之下鄭伯男也疏子産自言其君伯爵卑下與子男為列奉芳勇反壺飲於鴆反氷陸粲曰鄭風抑釋掤忌注云掤以覆矢先儒相傳謂氷與掤通故此年及二十五年注皆訓氷為箭筒葢彼云釋甲執氷當如杜義此言飲氷即是氷耳飲氷以壺藏氷也猶飲羽之飲𫝊遜曰意如被執在八月周八月今六月也時正炎天又䝉之以幕當不勝渴故以壺盛氷飲之應從陸説無疑且此非戰時何緣取矢筩用之乎子服湫從注湫子服恵伯按此即子服椒也釋文云湫子小反徐音椒十四年司徒老祁慮癸疏世族譜司徒老祁為一人慮癸為一人服䖍云司徒姓也老祁字也慮癸亦姓字也簡上國之兵於崇㐀疏下云簡東國之兵亦如之知此是簡西國之兵西方居水上流故謂之上國爾晉邢侯與雍子爭鄐田趙汸曰巫臣奔晉晉與之邢雍子奔晉晉與之鄐事在襄二十六年傳孔晁云邢與鄐爭疆界殺親益榮猶義也夫注三罪惟答宣子問不可以不正其餘則以直傷義故重疑之疏劉炫曰直則為義恐非疑辭趙汸曰傳本以直為義即數其賄稱其詐皆為國事言之杜疑傷義非也傳文語助也夫二字甚多未必皆疑辭其治國制刑以下亦恐非夫子語十五年吳在蔡蔡必速飛穆文熈曰無極初讒朝吳特以嘗試平王耳乃遂惑于速飛之言而行其説所以次及大臣太子而不知忌讒之行也其有漸哉鼓人告食竭力盡而後取之疏十七年荀吳詐祭於雒以滅陸渾二十二年又負甲偽糴以入昔陽此獨得降不納者吳自度己力必能獲之故因以示義鍾惺曰降者至再不許力盡而後取之非獨示威示信而已易服易叛數服數叛數討㡬何而國不敝孔明服孟獲正得此意樽以魯壺疏燕禮云司宫尊于東楹之西兩方壺左𤣥酒是禮有以壺為樽昔而髙祖孫伯黶司晉之典籍注孫伯黶晉正卿籍談九世祖疏九世祖稱髙祖言髙逺之祖也郯子以少皡為髙祖意與此同其九世之次見世本王一嵗而有三年之喪二焉疏妻服齊衰朞而傳以后崩大子卒為三年之喪二者喪服杖朞章内有父在為母傳曰何以朞屈也至尊在不敢申其私親也父必三年然後娶達子之志也父以其子有三年之戚為之三年不娶則夫之于妻有三年之義故可通謂之三年之喪中庸疏同此義三年之喪雖貴遂服禮也疏遂者申也竟也申遂其服使終日月乃是禮也一動而失二禮𫝊遜曰杜云失二禮謂既不遂服又設宴樂杜于晉元后喪引此為證以向譏宴樂不譏除服矣于此又以不遂服為失禮不自異其説乎朱申曰失二禮謂因喪求器又宴樂以早然傳以不遂服為非似失者三而止云二禮者葢后與太子雖有三年之義而君臨萬邦自不容于終服惟哀戚之心宜以三年若求彞器而宴樂則非居喪之心矣故云二禮朱説為當十六年徐子郯人莒人㑹齊侯盟于蒲隧陳傅良曰晉自平丘之㑹不能合諸侯而齊人横納北燕伯伐徐莒今為蒲隧之㑹至鄟陵而專盟矣受脤歸脤注受脤謂君祭以肉賜大夫歸脤謂大夫祭歸肉于公皆社之戎祭也疏傳有成子受脤于社諸儒皆以脤為祭社之肉故云皆社之戎祭也劉炫謂脤亦祭廟之肉十七年大史曰在此月也注謂建巳正陽之月葉夢得曰昭子言天子諸侯之禮是已太史言用于正月則失之夏書辰弗集于房以季秋言之則先王之禮不獨在正月凡食皆舉之矣經書日食三十六言鼓用牲于社者三其二皆在六月其一在九月左氏惑于太史之言故莊二十五年誤援之夫子將有異志不君君矣王樵曰日食陰侵陽臣凌君之象平子不肯救日食故昭子知其無君也注以為安君之災者非五鳩鳩民者也注鳩聚也治民上聚疏治民上其集聚惡流散九扈為九農正注扈有九種也春扈鳻鶞夏扈竊𤣥秋扈竊藍冬扈竊黄棘扈竊丹行扈唶唶宵扈嘖嘖桑扈竊脂老扈鷃鷃以九扈為九農之號疏諸儒説竊脂皆謂盗人脂膏也即如此言竊𤣥竊黄者豈復盗竊𤣥黄乎爾雅釋獸云虎竊毛謂之虦猫魋如小熊竊毛而黄竊毛皆謂淺毛竊即古淺字其毛色不純竊𤣥淺黒也竊藍淺青也竊黄淺黄也竊丹淺赤也四色皆具則竊脂為淺白也其唶唶嘖嘖則聲音為之名矣其春鳸鳻鶞樊光云言分循也春鳸分循五土之宜乃以人事名鳥爾雅老鳸鴳字不重賈服皆云鷃鷃亦聲音為名也西及漢注孛星出大火西光芒東及天漢疏天漢在箕斗之間申須曰彗所以除舊布新也王應麟曰春秋三書孛而昭十七年有星孛于大辰申須曰彗所以除舊布新也史天官書云春秋二百四十二年之間彗星三見劉更生封事亦云則彗孛一也晏子春秋齊景公睹彗星使伯常騫禳之晏子曰孛又將出彗星之出庸何懼乎則孛之為變甚于彗矣齊有彗星見于傳而經不書愚按星書云日之精變為孛月之精變為彗是彗孛原二星特其類似而占同耳今除于火火出必布焉朱申曰言今火尚伏而彗以除之是為除舊明年大火星出必布散為災是謂布新水火之牡也疏陰陽書有五行嫁娶之法火畏水故以丙為壬妃是水為火之雄其以丙子若壬午作乎水火所以合也疏彗在大辰為多及漢為少水少而火多故水不勝火火行其意水必助之故丙子壬午之日當有火災若火入而伏必以壬午注尚未知今孛星當復隨火星俱伏不故言若疏劉炫云丙子壬午雖俱水火合日但二字之内先言強若火入而伏則連秋至春厯天陰水用事雖同其欲水當先火故疑火入而伏則必以壬午也炫雖為此釋杜既無注其壬午之事理則未詳瓘斝注瓘珪也按説文瓘玉也瓘斝以玉為斝非珪也讀左日鈔卷九
