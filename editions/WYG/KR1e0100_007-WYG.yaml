body:
  text: 讀左日鈔卷七吳江朱鶴齡撰十七年子罕聞之親執扑以行築者而抶其不勉者王應麟曰左氏載子罕分謗之事檀弓亦稱之葢賢大夫也戰國策宋君奪民時以為臺而民非之子罕釋相為司空民非子罕而善其君此即分謗之事司城宋之司空也韓非乃云宋君失刑而子罕用之故宋君見劫李斯亦云然攷左傳與宋世家並無劫君之説則非斯所云妄矣史記鄒陽曰宋信子罕之計而囚墨翟漢書作子冉文穎注以子冉為子罕未詳苴絰帶杖疏喪服云苴絰杖絞帶此傳帶不言絞當即絞帶絞帶弓繩帶也唯卿為大夫王制諸侯之上大夫卿注上大夫曰卿也家語曾子問此事孔子曰晏平仲可謂能辟害也不以已是而較人之非孫辭以辟咎義也夫林注言諸侯之制降天子一等故惟卿得用大夫之禮已乃大夫也視士故不當用大夫之禮邵寳曰父母之喪無貴賤一也齊衰饘粥自天子達今以卿大夫有異禮何居斯葢起于周之衰也衛幕布魯幕綃魯衛之所謂禮也晏子不斥時失禮而曰惟卿為大夫此巽辭以辟咎也十八年塹防門而守之廣里注防有門横行廣一里故經書圍趙汸曰此言齊人守平陰之防于書圍齊何與後十二月門其三門焚其四郭乃圍齊之事爾杜注非不能戰莫如守險孫武子敵近而靜者恃其險也堯梅臣曰險形者我先居之必居其髙陽以待敵若敵先居之引而去之弗從也曹公曰地形險隘尤不可致于人魯人莒人皆請以車千乘自其鄉入按魯莒在齊東兵自東道入齊則腹背受敵此詭言以疑齊人也晉人使司馬斥山澤之險斾而疏陳之使乘車者左實右偽以斾先輿曳柴而從之司馬法凡陳行惟疏劉寅曰凡布陳行列欲疏疏則便擊戰偽以衣服為人形建斾先驅又使衆人曳柴在車後揚塵皆張吾之勢以示有餘兵法所謂疑也魏禧曰善用兵者能使戰不戰之權在我而不在敵是故我欲戰敵不欲戰而能使之戰者城濮之役是也我不欲戰敵欲戰而能使之不戰者平陰之役是也何以知平陰之不欲戰也楚子伐隋伯比請毁軍納少師晉得秦諜必殺之絳市今晉將戰而先洩魯莒之謀故示兵車之衆吾以知晉之不欲戰也其不欲戰者何齊地大兵強耑務力以勝之未必可勝況靈公叛晉伐魯好勇而輕此可以詐謀虚聲撼也夫攻人者攻其所必救破人者必破其所恃魯莒自東而入既脅以必救之勢而齊靈所恃者兵之衆吾即以衆懾之于是齊師果遁晉人乘勢攻略不敢發一矢相向向使晉急于一戰戰未必得志即勝未必若此甚也葢兵無定勢而謀無必行顧其敵何如耳雖然使齊靈從夙沙衛守險之言固軍髙壘以老諸侯之卒役久食匱必懈而還師吾奮鋭以邀擊之晉其能果不敗乎嗚呼此又用謀之難也愚按平陰之師與鞌戰憤兵不同荀偃本無戰情特因梗陽巫言欲有事東方以免死故純用虚聲恐喝齊靈輕率自脱歸爾夙沙衛連大車以塞隧而殿𫝊遜曰前衛以防門不足為險則其所謂險者必是形勝要害之地此戰敗而奔乃連大車以塞隧豈所謂險乎隧與防門皆在平陰之境皆非險也注應刪皆衿其鴆反甲面縛陸粲曰衿結也通作紟言皆不解甲反縳之惟露其面吾驟歌北風又歌南風南風不競多死聲注歌者吹律以詠八風疏律吕十二其風有八八風者乾風不周坎風廣莫艮風調震風明庶㢲風清明離風景坤風涼兑風閶闔八方風别先有音曲師曠以律吕歌之南風音微不與律聲相應故云不競服䖍以為卯酉以北律吕為北風以南為南風非杜義也周禮疏師曠驟歌北風又歌南風服䖍注北風無射夾鐘以北南風姑洗南吕以南南風律氣不至故聲多死吹律而言歌風者出聲曰歌律是候氣之管氣則風也羅泌曰以聲召氣以律定厯取八方之全聲而寓之八方之全器於以察天地之和命乖别之妖而敵情之勝負悉未來而知之同聲相應物之情也是故殺氣并而音尚宫武王推紂之必敗事見周禮注南風委而死聲至師曠必楚之無功張獻翼曰古者太師執同律以聴軍聲葢古人出師必吹律律和則知士卒同心猶軍中風角鳥占周禮注太師吹律合音商則戰勝軍強角則軍擾多變宫則軍和徵則將急數怒軍士勞羽則兵弱少威明天道多在西北䟽嵗星右行於天一嵗行一次二十八年嵗在星紀距此十一年卻而數之此年在豕韋豕韋當亥之次也周十二月夏之十月其月又建亥故曰多在西北十九年諸子仲子戎子𫝊遜曰管子中婦諸子注云諸子内官之號又哀九年傳諸子鬻姒與此同杜云諸妾姓子者解此猶可于他處難通殖綽工僂力侯反㑹夜縋納師殖綽齊勇士也見十八年因髙唐無備潛㑹城上夜從城上懸繩以納齊師二十年言不與民同欲也趙汸曰傳序公子燮事若能諒其心者猶以不同民欲罪之則以書國討為必有罪也凡傳序事實而斷義非往往類此賦棠棣之七章以卒卒卒章自七章以至于八章也古人分章與今同君入則掩之若能掩之則吾子也陸粲曰嗟乎寗殖之愚也生而逐其君死欲其子掩之喜也又用其亂命卒以墜九世之卿族非不幸矣為喜之道奈何承父命知其不可則曷稽首而辭曰為故君賊新君非義也主之出君一過多矣又求益之諸侯之策不可改也將以掩之祗益彰焉夫忠而不貳臣之職也事是君矣而外其心其何貳如之若用主之命廢臣之職獲罪於兩君將朝夕從主主祀無乃殄乎抑寗氏之先人實不血食而主之餒於何有如是而其父不聴則亦斷以大義若魏顆之嫁妾屈建之去芰者其可也矧喜之事尤有大於二子者耶二十一年季武子以公姑姊妻之疏公姑姊杜云寡者二人劉炫規云是襄公之姑成公之姊只一人而已按成二年成公之子公衡為質及宋逃歸家語本命云男子十六而化生公衡已能逃歸則十六七矣公衡之年如此則于時成公已三十三四矣計至襄公二十一年成公若在年已七十餘何得有姊堪嫁而妻之杜説不誤愚按列女傳梁有節姑妹謂父之妹則此姑姊是父之姊也果為成公姊必無堪嫁之理邵文莊云或魯之宗女于成公為妹者故藏武仲云以姬氏妻之稱姊尊之也此亦一説以地來雖賤必書重地也凌稚隆曰以臣叛君竊其邑而奔他國有國者所共惡魯既不能絶之以大義又妻之以姬氏春秋大書于策深罪魯也而左氏曰重地失經義矣莊公為勇爵陸粲曰爵飲酒器設此以觴勇士因名勇爵杜氏注云爵位非也令倍其賦注古者家有國邑故以重賦為罰疏鄭𤣥説周禮賞地三分計税王食其一二全入于臣然則諸侯之臣受采邑者亦當三分其一而歸于公此言重倍其賦當以三分而二入公也見于嘗酎與執燔焉𫝊遜曰漢紀云正月旦作酒八月成名曰酎武帝因八月嘗酎令諸侯廟中出金助祭所謂酎金也此云見于嘗酎與執膰焉知古有嘗酎祭之禮而漢因之祭以特羊殷以少牢注四時祀以羊三年盛祭以羊豕疏少牢饋食禮諸侯大夫時祭之禮也時祭用少牢今黑肱使黜官薄祭故時祭用特羊殷祭以少牢大夫無禘祫而云殷三年祭者記言大夫有善于君祫及五世是也二十二年棄父事讐吾弗忍也遂縊而死程氏曰使子南無罪棄疾當告于其君而逃之如有罪而君殺之不可云棄父事讐也舜殛伯鯀禹不為之臣乎陸粲曰論者謂棄疾處臣子之不幸其死有足矜者信乎曰否夫孝子之心見微知著子南之不善通國患之棄疾不察耶萌芽之時從容諷諭能致其悛改上也及聞王將見討不敢洩命重刑則亦流涕沫血力言於父以内外怨疾危若朝露使釋位逃逺托異國可也否則泥首銜劔自拘司敗而冀王之見哀焉庶㡬禍有豸乎其或父不見聴則以死繼之萬一能感父衷而紆王怒若史鰌之屍諫者亦不為徒棄其生矣既依違隱忍以陷親于大僇然後死之死有益乎且曰弗忍事讐不知君之不可讐也始禍其父而終懟其君自經溝瀆忠孝兩隳吾無所取焉爾曰前此雍姬之事亦猶棄疾也君子論之則何如曰雍姬之悖義也始由其母母之言曰人盡夫也父一而已非也父者子之天夫者婦之天未始可以偏重也夫有殺父之謀而婦與聞之則當諫反覆之而不從則大義絶而父為重矣於是告於父而自殺焉以明吾志可也雍姬如此則何至于漏言以殺夫而恬然安之哉雖然遭變事而能權自春秋時賢卿大夫未足語此若棄疾雍姬者又何尤焉求亡妻者使復其所使游氏勿怨邵寳曰子展處奪妻者善矣然殺人而輙復其所可乎鄭而有政也施生戮死必有如叔向之為説者愚謂子展儉而壹鄭之良臣也必深知子太叔之才可以庇鄭故因游眅有罪廢其子良而立之葢良立則亡妻者乃其父之讐也嗣卿而遇父之讐必有執兵報復之事立弟則可以義裁情而仇隟不作此安游氏也亦所以安鄭也至于專殺不討非廢法也彼其人力能殺游眅于邑奪妻以歸無一禦者豈淺謀寡黨之人所能為哉急以治之則生亂于内亂生于内則必啟隣敵之心不得已而姑復其所又使游氏勿怨若為游氏掩其親之惡者此以安鄭也亦所以安子太叔也葢鄭之國小而世族怙亂不得不隱忍屈法以安之此等作用與子産絶相類二十三年禮為隣國闕注諸侯絶期故以隣國責之疏杞孝公晉平公之舅也禮為舅服緦麻三月緦服既輕其恩不過隣國故傳言禮為隣國闕也邵寳曰諸侯禮絶期喪不曰母有憂戚而已可以樂乎母喪不樂禮也為隣國闕亦禮也愚謂禮為隣國闕如晉侯以我喪故未之見也之類言禮尚有為隣國闕者而況母之憂戚乎如此説方明納諸曲沃注欒盈邑也𫝊遜曰杜云欒盈邑也曲沃晉宗廟所在豈以為其臣食邑葢晉卿分掌公邑曲沃屬欒氏猶絳為公邑以屬趙武耳使果欒氏邑何欒氏出奔而邑宰胥午猶不易乎且欒氏邑本今真定府欒城縣非曲沃也按欒盈乃晉靖侯孫欒賓之後故得為公族大夫而所掌之邑在曲沃我實不天子無咎焉言事雖不集而死我實不為天所祐非子之咎也杜氏解太紆曲知悼子少而聴于中行氏注悼子知罃之子荀盈也少年十七知氏中行氏同祖故相聴從疏十三年傳云荀罃卒十四年傳云盈生六年而武子卒是其少也知悼子荀首之孫中行吳荀林父之曾孫首是林父之弟首為知氏林父為中行氏是同祖也悼子為荀吳二從叔父故相聴從計悼子年十六不得為十七沈氏云後人轉冩誤王鮒使宣子墨縗冒絰疏夫人為其兄弟當大功喪服大功布縗牡麻絰冒絰者以絰冒其首也樂王鮒使宣子詐為杞夫人孝服奉公以如固宫晉語范宣子以公入于襄公之宫葢襄公有别宫牢固謂之固宫欒氏退攝車從之按説文攝持引也士鞅用劔時必下車接戰今欒氏敗走故引車以追之杜注非申鮮虞之傅摯為右注傅摯申鮮虞之子因傅摯而及其父申鮮虞此與成十六年潘尫之黨同一句法陳文子見崔武子注文子陳完之孫須無按世家須無為完曾孫度其年世曾孫為是入孟門孟門山與龍門相對一統志在平陽吉州西七十里趙勝帥東陽之師注東陽晉之山東魏郡廣平以北疏東陽地所包甚廣葢太行山以東也昭二十二年傳荀吳略東陽遂襲鼓滅之叔孫豹帥師救晉次于雍榆禮也趙汸曰魯語平丘之㑹子服恵伯見韓宣子曰晉欒氏之亂齊人間晉之禍伐取朝歌我先君襄公不敢寧處使叔孫豹帥敝賦以從軍吏次于雍榆與邯鄲勝擊齊之左掎止晏萊焉齊師退而敢還今按邯鄲勝即趙勝晏萊即晏􅈊也魯師次于雍榆葢有晉命傳偶不能詳耳臧紇曰飲我酒吾為子立之臧紇以知稱乃為人任廢適立庶之事違禮拂經美疢藥石之喻後雖痛悔何益哉公鉏奉羯立于户側疏喪大禮大夫之喪主人坐于東方此立于戸側在室之東西面南也記云坐此云立者以季孫來故立爾孟孫之惡我藥石也疏治病藥分用石見本草韻㑹服䖍云石砭石也説文砭以石刺病東山經髙氏之山多針石季世無復佳石故以鐵代之耳臧孫使正夫助之注正夫隧正疏役夫是遂正所主遂正當屬司徒臧氏為司冦而借之于臧氏者葢當時臧氏兼掌之臧孫如防使來告曰穆文熈曰武仲除道東門本非為亂而甲從則疑于為亂納龜請後本非要君而據邑則渉于要君其人葢持論有餘而守道不足動而見尤乃其自取知云乎哉下妾不得與郊弔檀弓哀公使人弔簣尚遇諸道辟于路畫宫而受弔焉曾子曰簣尚不如杞梁之妻知禮也二十四年在商為豕韋氏鄭語祝融之後八姓大彭豕韋為商伯是商之初豕韋國君為彭姓史記索隱按系本豕韋防姓在周為唐杜氏注唐杜二國名殷末豕韋國于唐周成王滅唐遷之于杜為杜伯杜伯之子隰叔奔晉四世及士㑹食邑于范復為范氏杜今京兆杜縣𫝊遜曰杜注殷末豕韋下云云此用國語韋昭注也劉炫按昭二十九年傳云夏后賜劉累氏曰御龍昭元年傳云遷實沈于大夏杜預曰大夏今晉陽縣唐人是因以服事夏商杜云唐人若劉累等累遷魯縣括地志汝州魯山本漢魯陽縣也古魯縣此在大夏是居唐者非御龍之裔矣安得云豕韋國唐也又傳言服事夏商則非殷末矣其曰滅唐遷杜何所據而知之炫又引賈逵説云武王封堯後為唐杜二國非滅唐乃封杜也陸子餘因謂二國同源異派居大夏為成王所滅者唐也初居魯縣後奔晉者杜也今合為一謬矣愚讀前後傳文自相背戾此云在夏為御龍在商為豕韋則御龍在豕韋之前昭二十九年云夏后賜劉累氏為御龍以更豕韋之後則豕韋又在御龍之前矣故杜于其下注云累遷魯縣豕韋復國至商而滅累之後世復承其國為豕韋此明以二傳附㑹強合之也昭元年傳注云累遷魯縣此在大夏此葢因二十九年傳云懼而遷于魯縣因之服事夏商遂以為此在大夏正義謂此指其子孫或同族而言強附尤甚杜所云殷末豕韋國唐成王滅唐遷之于杜者亦以昭元年傳成王滅唐而封太叔又國語杜伯射宣王于鄗是周有杜伯故遂以為成王滅唐而遷之于杜也劉炫譏其無據信矣賈逵謂武王封堯後為唐杜二國亦不知何據竊謂唐既堯後武王所封非有大罪成王何遂滅之後近楚有唐侯或成王遷之于江漢而以其地封叔虞耳傳謂滅唐亦未必可信又蔡墨云遷魯縣范氏其後也而晉語訾袥又云隰叔子違國難于晉注云隰叔杜伯子則又與蔡墨之説異矣陸所云初居魯縣後奔晉者亦豈其然耶晉主夏盟為范氏氏族考范氏堯之裔也宣王殺杜伯其子隰叔奔晉生子輿子輿即士蔿也隰叔官士師故為士氏其子孫食邑于隨及范故傳有隨氏范氏凡三族象有齒以焚其身注焚斃也疏服䖍云焚讀曰僨僨僵也為生齒牙僵仆其身陳文子曰齊將有冦陸粲曰崔杼之弑君也陳文子葢嘗出奔雖左氏不言然論語記之矣當莊公伐晉杼有不臣之言文子實與聞之見二十三年至是又知齊將有冦而進無讜言以匡君過退無石畫以折姦萌徒低囘竊語焉爾比難作則委而去之春秋士大夫自謂謀多類此國家何頼焉彼其初捐十乗之馬終守百車之木見二十八年特踽踽自好者惡足稱於君子之門哉皆踞轉而鼓琴注轉衣裝也𫝊遜曰轉字從車與衣裝何與疑是軫字之訛詩小戎俴収注収軫也謂車前後兩端横木収歛所載者踞之可以鼓琴衣裝何可踞之而鼓琴乎且下云取胄于櫜而胄則櫜固為衣裝矣學者毋泥成説愚按櫜弓衣也又樂記包以虎皮名曰建櫜鄭𤣥曰兵甲之衣曰櫜傳説有據可從齊人城郟注郟王城也榖洛鬭毁王宫按榖洛二水鬭事見國語靈王二十二年計靈王以襄二年即位往年為二十二年時二水毁壊其城故齊人今為王城之二十五年姜入于室鍾惺曰棠姜之亂齊與夏姬之亡陳也事同而情異陳以君臣宣淫而發憤于徵舒至賊其君而喪其國齊則崔杼實以棠姜啗公欲弑之以説于晉觀此段一入室一出戸情景杼之逆謀姜具知之且共之矣東郭偃猶以辨姓為諫愚若為已死而為已亡非其私暱誰敢任之陸粲曰從晏子之道則食焉而弗與其難雖死與亡皆其所不屑矣抑君子所謂死亡者異於是死則為洩冶亡則為子哀斯二者嬰將何居焉乃至睹其君之見弑則徐徐哭踊若將以是為禮者又其言曰人有君而人弑之然則凡在官者殺無赦此言非歟州吁弑君自立石碏既老猶告於陳以誅之陳恒弑簡公仲尼在魯三日齊而請討之嬰也苟知此義則何死與亡足言之有王樵曰左氏所載晏子之言多非其實夫臣死君難無容議者間有不必死而無害于義則以所居之時與位而權之若晏子者位非正卿既無當國之責又無討賊之權莊公雖殞宗社猶存以分實無必死之理然而聞難不避入哭君尸其凜然之義猶足寒亂賊之膽故崔杼雖忌而不敢殺而時之鄙夫因晏子不死遂從而附益其説夫人君遇簒弑者豈皆為社稷而為之臣者孰肯甘以私昵自處耶若是則弑君而及其大夫者非一人矣宋之殤公閔公晉之奚齊卓子皆非為社稷死而孔父仇牧荀息皆非三公之私昵春秋何以大書而深予之耶且死必其私昵則肯死君難者少矣君不為社稷死則曰誰敢任之若是則背君忘義孰不藉口以求自免乎吾故曰此非晏子之言鄙夫附益之言也四翣所甲反檀弓周人墻置翣禮器天子八翣諸侯六翣大夫四翣䟽方言云自關而東謂扇為翣則翣是扇之類也男女以班疏劉炫曰哀元年蔡人男女以辨與此同謂男女分别示晉以恐懼服罪也皆有賂注皆以男女為賂按劉炫云以貨財賂之勝杜趙汸曰傳見晉失盟主之義夫討弑君之賊而杜氏謂齊有喪師自宜退諸侯其無討賊者矣子美入數俘而出注子美子産也邵寳曰子産之才大可以霸然無圖霸之心者鄭當晉楚之衝知其力之不足也齊有太公之賜履晉有文侯之彤弓葢其所𫝊者舊矣故桓文修之以備三恪注周得天下封夏殷二王後又封舜後謂之恪疏樂記武王克殷未及下車封黄帝之後于薊帝堯之後于祝帝舜之後于陳下車而封夏后氏之後于杞投殷之後于宋郊特牲天子存二代之後猶尊賢也尊賢不過二代鄭𤣥以杞宋為二王之後薊祝陳為三恪葢二代之後行其正朔用其禮樂王者之深也帝在二代之前其禮轉降封其後示敬而已故曰恪此注通二代言之與鄭義不合趙汸曰二代以王者之後各自用其禮樂不但示敬而已故不得言恪則三恪當從鄭氏通薊祝陳數之為是趙文子曰其辭順犯順不祥王樵曰子産對晉之辭皆強為文飾恐傳者附㑹之過也陳侯鮀卒五父殺太子免而代其位鄭莊公奉而立之是助簒賊也其可以為功乎征伐出于天子而以惟罪所在各致其辟為先王之命是無王也大國之地數圻信非侵小不至然皆欲效之可乎鄭文公戎服輔王以授楚㨗今以將事于晉是王晉也乃云不敢廢王命不亦重誣乎左氏謂士莊伯不能詰非不能詰也是時晉政偷矣志于和合南北以苟無事非復昔者同外楚之心故于鄭之伐陳亦聴其所為而已趙文子以為辭順豈其然哉表淳鹵注淳鹵埆薄之地表異輕其賦税或曰淳鹵地宜鹽者可資國用故表異之數疆潦注疆界有流潦者計數減其租入疏賈逵以疆為疆㯺磽确之地㯺堅也按依此當讀疆為強疆㯺見周禮地官砂礫之田也牧隰臯注隰臯水厓下濕為芻牧之地疏周禮鄭注云隰臯之地九夫為牧二牧而當一井也成而不結注不固結也陳傅良曰傳言齊楚固相交秦晉盟而不結是以宋之役諸夏始判遂成南北之勢注此傳當繼前年之末而特跳此者傳冩失之疏晉儀注冩章表别起行頭者謂之跳出故杜以跳言之二十六年瑗不得聞君之出敢聞其入遂行從近關出陸粲曰伯玉始聞孫寗逐君之謀不對而去之矣至是謀再及焉而亦如之夫服冕乘軒以事兩君比其亡與死也皆弗與知亂則逃之安則反國人臣而若此末之難矣雖然伯玉孔子所嚴事也吾未之敢非意者晚雖居衛而不仕於剽若子臧叔肸之為者衛人以為國老大事訪焉故得去就自如而弗踐其難兹孔子之所賢耶吾受命于先人不可以貳愚謂思及父命亦自難已若喜者銜父命于終身伺間而𤼵可也弑一君而立一君則犯不韙之誅矣殺子叔及太子角注子叔衛侯剽疏剽是穆公孫黑背之子于獻公為從父昆弟成十年衛侯之弟黑背侵鄭傳曰衛子叔背侵鄭是黑背字子叔即以子叔為族也元年衛侯使公孫剽來聘傳言衛子叔來聘是舉族而稱之也專禄以周旋戮也程氏曰此義施之常人則可林父出君而君入畏誅而叛豈特專禄哉先八邑注以路及命服為邑先八邑三十二井疏周禮小司徒四井為邑故杜以八邑為三十二井趙武不書尊公也傳以趙武㑹公侯故貶書人以尊魯公胡氏辨其非是見集説國子賦轡之柔矣注逸詩見周書按逸詩云馬之剛矣轡之柔矣馬亦不剛轡亦不柔志氣麃麃叶必幽反取與不疑叶疑尤反見汲冢周書鄭七穆罕氏其後亡者也疏鄭七穆謂子展公孫舍之罕氏也子西公孫夏駟氏也子産公孫僑國氏也伯有良霄良氏也子大叔游吉游氏也子石公孫段豐氏也伯石印段印氏也穆公十一子謂子良公子去疾也子罕公子喜也子駟公子騑也子國公子𤼵也子孔公子嘉也子游公子偃也子豐也子印也子羽也子然也士子孔也子然二子孔已亡子羽不為卿故止七也左師聒而與之語過期乃縊而死按宋平公信伊戾之譛殺其世子其愚暗殘忍不必言矣向戌先媚夫人文致世子罪使佐過期以死又脅夫人而受其饋何以稱賢于列國哉多鼓鈞聲以夜軍之孫武子夜戰多火鼓晝戰多旌旗所以變人之耳目也呉子戰法晝以旌旗旙麾為節夜以金鼓笳笛為節欒范易行以誘之注易行謂簡易兵備欲令楚貪已疏簡易行陣少其兵備示弱以誘之也賈逵鄭衆皆讀變易之易楚語説此事云雍子謂欒書曰楚師在中軍王族而已若易中下楚必歆之韋昭注中下中軍之上下歆猶貪也簡易欒范之行示之弱以誑楚是韋昭已讀簡易之易故杜從之也陸粲曰今按國語若易中下楚必歆之韋注鄭司農以為中軍與下軍易卒伍也中軍之卒良故易之時欒書將中軍范燮佐之如此則易讀如字而簡易之意已在其中於義為勝四萃于其王族注四萃四面集攻之疏楚語作三萃以攻其王族韋昭云晉有四軍言三萃者中軍先入而上下及新軍三集以攻之韋葢因彼為三字故説之使通二文不同必有一誤則苖賁皇之為也疏此與楚語俱述聲子之言傳言鄢陵之敗苖賁皇為之楚語云雍子為之二文不同劉炫以為國語非丘明所作為有此類子木懼言諸王陳傅良曰隨㑹在秦而六卿謀椒子在晉而子木懼此晉楚所以代興也于傳聲子之辭知戰國策士之漸晉士起將歸時事于宰旅注諸侯大夫入天子國稱士時事四時貢職宰旅冢宰之下士疏劉炫曰知時事四時貢職者大行人云春入貢秋獻功王親受之齊烏餘以廩丘奔晉注烏餘齊大夫廩丘今東郡廩丘縣故城是疏廩丘地在東郡是衛之邦域烏餘齊大夫得以廩丘奔晉者葢齊人往前取得衛邑以賜烏餘如鄭公孫之得州宋樂大心之有原也二十七年且鱄實使之遂出奔晉託于木門馮時可曰子鮮負羈絏從君于外十二年矣君既定而自甘于木門之託其愛信也甚於愛禄誠足矜已雖然獻公之無信奚必背喜而後知之乎以喜之不臣也將任其弑主任其專國而亦曰以全吾信乎政由寗氏祭則寡人非所以約也君者政之出也失政而又何君之有一諾之輕後遂至於不可復而又必欲復之以成其信難矣哉公喪之如税服終身注税即繐也喪服繐縗裳縷細而希非五服之裳本無月數痛愍子鮮故特為此服疏凡布細而疎者謂之繐喪服之文在大功之下小功之上是非五服之常也既𦵏除之是本無月數也陸粲曰禮衰麻已除日月已過乃聞喪而追服謂之税服此疏引服䖍説也杜以税為繐非是傅遜曰疏原杜意以為兄弟之服當齊衰期税乃服之輕者何得云如税故以税作繐謂是聲相近而字改易耳不知諸侯絶期無為兄弟追服之禮今公獨服此服故曰如税于義本通且税為追服當隨本服之輕重何云服之輕乎今改作繐牽強甚矣汪琬曰疑税即小功不税之税又禮雜記士襲有税衣獻公所服雖不能明必非繐衰可知唯卿備百邑注此一乘之邑非四井之邑疏卿大夫之邑邑有百乘是百乘為采邑之極仲尼使舉是禮也以為多文辭疏使舉謂使弟子記録之也王應麟曰服䖍云後世謂之孔子聘辭不知何所出實享禮而謂之聘舉舊辭而目曰孔氏亦不必然也子木謂向戌請晉楚之從交相見也王樵曰自鄢陵之後鄭叛吳興楚少懦矣而悼公既殁晉亦不能服諸侯時兩國皆厭兵故向戌得迎合其意為宋之盟雖然弭兵可也晉楚之從交相見則中國之大勢盡失故楚人此請其關係甚大使趙武能應之曰諸侯間于王事則相朝謂同方岳之邦也越千里而相朝非天子誰敢當之雖先君文公及齊桓公皆未有也二三友邦咸有封疆之守社稷之事使廢其常守闕其時事敝于道路以為君憂亦君之所恤也君聞諸侯之苦于兵革而欲安靖之固大恵也終君之恵莫若晉楚之從各即其守敝邑獲繼先君之好以事君二三大夫固將朝夕于君庭也其又奚必于諸侯以是拒之楚必無辭而退惜乎趙武不能乃曰晉楚齊秦匹也晉之不能于齊猶楚之不能于秦也而楚子遂曰釋齊秦他國請相見也斯言出而中國之大勢遂去齊桓晉文數十年攘夷匡夏之烈盡舉而棄之趙武之為也愚按方麓此論甚善但當時諸侯其旅見于晉久矣今不許楚楚其能終已乎況楚氛甚惡又欲駕晉而上之乎黄池之㑹吳晉爭㰱趙鞅責以介圭之命命曰吳伯不曰吳王吳無辭以對也為趙武者當曰周室雖衰猶守府也我先君文公躬率諸侯以朝王遂為盟主固有令典矣楚若能貶其王號諸侯之旅見者率之以朝于京師敢不許諾如此或可以塞子木之請乎單斃其死陸粲曰單斃其死此句難通據孔疏所解則其當作以單盡也言匹夫不信猶不可立于世盡斃踣以死也食言者不病注不病者單斃于死按此解亦難通不病言不能為人病病害也且吾因宋以守病則夫能致死邵寳曰因宋以守謂入宋城也病楚攻而病也夫猶言人人也夫能致死言人人能致死晉人以諸國同心故力倍于楚也曰弭兵以召諸侯而稱兵以害我吾庸多矣非所患也王樵曰楚誠欲劫盟豈先使晉知之葢形我而使我懼則可以獲所求爾是以欲晉楚之從交相見則許之爭長則讓之一一不較趙武叔向如嬰兒寄玩于人之股掌乃曰弭兵以召諸侯而稱兵以害我吾庸多矣諸侯歸晉之徳只非歸其尸盟也此虚為大語耳觀孔子相夾谷之㑹可以得制事待人之法趙武信楚而以藩為軍設楚乘其無備雖左還入于宋不亦晚乎唐渾瑊與吐蕃盟于平涼吐蕃劫盟即其事也彼不在堅城之下乎故不書其族言違命也劉敞曰蔡沈失位左氏貶之今魯欲自同人之私失位甚矣大夫出竟有可以重社稷者猶曰專之今命出季氏而曰不可違非也按豹不書族當從公羊一事再見之例辨見集説小國固必有尸盟者小國主備辦盟具謂執牛耳此叔向之權辭書先晉晉有信也注葢孔子追正之趙汸曰周制㑹以班爵為重㰱血則先同姓説見定四年是盟與㑹序次本異今屈建所爭者㰱血之先後耳其大夫之㑹楚固未嘗先晉也宋公兼享晉楚之大夫趙孟為客則當時人情可見況宋之盟諸侯雖曰兩屬終未嘗以事晉者事楚楚雖駕晉先㰱魯史豈遽以楚先晉晉有信也已失之不詳杜云孔子追正之亦非傳意崔明夜辟之大墓辟疑當作避逃之大墓以避難也或曰開先人之冢以藏杼尸嫳復命于崔子御而歸之至則無歸矣乃縊愚謂崔成崔疆發難以禍崔氏者也成疆既殺東郭姜何以遽縊乎其時盧蒲嫳帥師攻崔氏實慶封使之助杼也杼歸而何以亦遽縊乎葢盧蒲嫳者慶氏之私人也其言曰彼君之讐也天或將棄彼矣又曰崔之薄慶之厚也嫳何知有君讐當報哉崔敗則慶專權利故可以効力于慶者無不為名雖助杼實以隳其家杼見家破而孤立禍必及身遂憤然自縊焉觀崔明來奔而慶封遂當國當時情狀可識矣吾以為此其中有天焉崔杼之惡逆已極故天生明以啟成疆之釁而假手慶封之黨以斃之不然何杼之彊舉國莫敢問而盧蒲嫳殪之若除狐兎也十一月乙亥朔日有食之辰在申司厯過也再失閏矣釋例云魯之司厯漸失其閏至此始覺有謬遂頓置兩閏以應天正前閏建酉後閏建戌劉敞曰頓置兩閏眩聴駭俗非人情也周密曰杜長厯置閏疎密不齊如此年則一嵗兩閏然前此二十一年二十四年二十六年皆有閏矣何縁至此失閏之再而獨置兩閏乎此其立法殆不可曉趙汸曰傳言司厯過也葢指王朝厯官猶桓十七年傳云官失之耳杜以為魯之司厯此實承劉歆之誤劉説見漢志愚謂長厯既可疑則經書十二月未必為誤二十八年嵗在星紀而淫于𤣥枵以有時菑陰不堪陽注嵗嵗星也星紀在丑斗牛之次𤣥枵在子虛危之次此年嵗星在星紀明年當在𤣥枵今淫行失次時菑無氷也陰不勝陽地氣𤼵洩疏嵗星自淫行時自温煖其温不由嵗星梓慎以其年有二事故總言其占耳蛇乘龍龍宋鄭之星也注蛇𤣥武之宿龍嵗星嵗星木也木為青龍失次出虚危下為蛇所乘嵗星本位在東方東方房星為宋角亢為鄭故以龍為宋鄭之星疏嵗星天之貴神福徳之星今被乘勢屈是不能祐其本國之象故知宋鄭饑也土虚而民耗不饑何為注嵗星淫入虚耗之次時復無氷地氣𤼵洩故曰土虚民耗疏于時魯國無氷是魯亦地氣𤼵洩下子服恵伯云饑寒之不恤是魯亦饑矣經不書饑饑當差于宋鄭邾悼公來朝時事也趙汸曰春秋大國事天子惟聘而不朝故韓起聘周稱歸時事于宰旅知言聘之非也小國事大國乃朝而不聘故子産相鄭伯朝晉言㑹時事無異于事天子矣左氏不能解因以時事釋邾子來朝過在不見周禮宋之盟君實親辱注君謂鄭伯按宋之盟鄭伯不在君實親辱謂盟時約言如此即所謂晉楚之從交相見者也嵗棄其次而旅于明年之次以害鳥帑周楚惡之注嵗星棄星紀之次客處在𤣥枵失次于北禍衝在内南為朱鳥鳥尾曰帑鶉火鶉尾周楚之分疏子午之位南北相衝淫于𤣥枵衝當鶉火南方為朱雀之宿帑者細弱之名于人則妻子曰帑于鳥則鳥尾曰帑子為人之後尾為鳥之後鶉火周分鶉尾楚分使諸亡人得賊者以告而反之注亡人辟崔氏難出奔者邵寳曰亡人莊公之黨崔氏名之為賊者也得賊以告猶今律所謂能自捕得癸言王何而反之家鉉翁曰盧蒲癸王何莊公之倖臣也殺慶舍逐慶封而崔杼之黨盡殪莊之弑也倖臣與之俱死者十人今為之討賊亦倖臣也卿大夫無能為君討賊復讐而倖臣乃能之亦卿大夫之恥也去其肉而以其洎饋疏説文洎灌釜也周禮士師祀五帝則洎鑊水注云洎增其沃汁也葢添水以為肉汁遂名肉汁為洎此盧蒲癸王何之謀欲以激公族之怒對曰得慶氏之木百車于莊六軌之道文子曰可慎守也已邵寳曰此陳氏父子為隱語以相諭也知禍將作而以何得問其子既得得木之對則知其知所從違矣故以慎守堅之守謂守志非守其木愚按慶封本與崔杼同惡積木百車于逵道葢儲之為武備也陳無宇對以得木則是空其儲胥與後濟水而戕舟𤼵梁意同故文子戒之以慎守慎守者恐其復為慶氏所得也舊解都未及杜注謂喜其子不志于貨財謬甚姜曰夫子愎莫之止將不出我請止之凌稚隆曰盧蒲姜與雍姬正相反姜為其夫謀則善矣而忘其父姬為其父謀則善矣而忘其夫不若嬴氏之于晉懐不敢言亦不敢從為善處夫與父之間盧蒲癸自後刺子之王何以戈擊之陸粲曰齊人此舉曰討慶封之賊也似矣顧釋慶封弗誅而獨肔解其子則非罪之在也亦何以伸大義乎孫琮曰慶封一酒色妄男子耳舍之愎又甚焉然以陳鮑而畏其強以平仲而為中立向非癸為之主何為之輔事㡬不濟矣釋甲束馬飲酒觀優適逢其㑹諸慶授首誅亂賊者貴有其人尤貴有其時哉慶封汜祭注汜祭逺散所祭不共疏公食大夫禮云祭鉶羮于上鉶之間祭飲食于上豆之間是祭食之禮各有其處吳勾餘子之朱方注勾餘吳子夷末也疏服䖍云勾餘是餘祭史記索隱曰餘祭以襄二十九年卒則二十八年賜慶封邑者不得為夷末也勾餘夷末音字各異或别是一人崔氏之亂喪羣公子按襄公二十一年傳齊侯討公子牙之黨執公子買于句瀆之丘公子鉏來奔叔孫還奔燕此又以三子之逐歸之崔氏之亂傳文前後相乖如此與子雅邑辭多受少與子尾邑受而稍致之按子雅子尾所謂二恵競爽者也二子亦與討慶之役以鑑于敗轍故辭多受少然實因晏子不受􅆁殿為之倡耳晉欒黶讓羣帥莫敢不讓況重以晏子之名徳哉武王有亂臣十人崔杼其有乎陸粲曰儗人必於其倫武王崔杼可比同而論乎此非叔孫穆子所宜言齊東野人之語爾君子曰北宫氏之宰能滅齊豹以定衞國則其主用免于惡名且受上賞崔杼而有臣也亦將輔之以誼使生為良臣没為永舉如是一而足矣奚待十人而後葬耶季蘭尸之敬也注季蘭季女之服蘭草者尸之謂為祭主按召南詩誰其尸之有齊季女是此句法所祖讀左日鈔卷七
