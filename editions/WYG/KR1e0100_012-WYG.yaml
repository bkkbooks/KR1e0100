body:
  text: 讀左日鈔卷十二吳江朱鶴齡撰哀公元年里而栽注栽設板築為圍壘周匝去蔡城一里疏築墻立板謂之栽葢豎木以約板也楚慮外人救蔡則已表裏受敵故築壘周匝去蔡城一里以圍之内置兵以攻蔡外憑壘以禦救者夫屯晝夜九日疏劉炫曰夫屯謂夫役屯聚晝夜不止九日而壘成夫者别有城夫非戰士吳王夫差敗越于夫椒史記索隠夫椒賈逵云越地得之但未詳所在杜預以為太湖中椒山非戰所夫椒與椒山不得為一且夫差以報越為志悉兵伐越則當及越地何乃不離吳境近在太湖中耶逃奔有虞注梁國有虞縣疏舜始國于虞在河東太陽縣禹封舜後未必在河東梁國有虞縣其地以虞為名疑是夏時虞國杜于地名言有者皆疑辭器不彤鏤注彤丹也鏤刻也國語注彤謂丹楹鏤謂刻桶二年郢不足以辱社稷君其改圖邵寳曰郢有命于靈公何為不立也君薨于寢而嗣定焉禮也遊非其時也郊非其地也如其時與地郢亦可以從之矣是故郢之辭禮也葢有慕于季札之風者也又曰靈公欲立郢郢曰輙在是有見于適庶無見于昭穆也雖然父䘮而無子則孫可以承重父喪而有子則孫不可以襲尊可以承重者禮之變不可以襲曽者禮之常三揖在下注三揖卿大夫士疏周禮司士孤卿特揖大夫以其等旅揖士旁三揖鄭𤣥云特揖一一揖之旅揖爵同者衆揖之三揖士有上中下陽虎曰右河而南必至焉注是時河北流過元城界戚在河外疏此春秋時河道與杜氏時異土地名云戚頓丘衛縣西戚界在枯河東是春秋時戚在河東也從晉而言河西為内東為外故云戚在河外也是時晉軍已渡河矣師人皆迷不知戚處陽虎憶其渡處在戚之北河既北流據水所向則東為右故欲出河右而南行也使太子絻音問注絻者始發喪之禮疏禮不至喪所不得括髪故始發喪服絻鄭𤣥注禮云免之制未聞舊説以為如冠狀廣一寸喪服小記曰斬衰括髪以麻免以布此用麻布為之狀如今之著幓頭矣自項中而前交于額上郤繞紒也汪琬曰免之為絻猶衰之為縗程泰之嘗辨袒免謂免如字如免冠之免非冠名其説誤也以兵車之斾與駟罕兵車先陳注斾先驅車也以先驅車益以兵車以示衆陸粲曰杜解未明按㐮十八年晉伐齊使乘車者左實右偽以斾先此傳文亦此意蓋設斾於車盛為軍容與駟罕兵軍在前者相對結陳駟罕自後至見之必懼其衆也克敵者上大夫受縣下大夫受郡注周書作雒篇千里百縣縣有四郡疏昭五年傳晉有四十縣遺守四千乘是縣别有百乘與作雒之言合也上大夫受縣縣則為百乘之家言得進為卿也縣有四郡則郡方五十里下大夫得此五十里之采邑士田十萬疏王制云方一里者為田九百畝士田十萬為方百里有餘志父無罪注志父趙簡子之一名也疏服䖍云趙鞅入晉陽以叛後得歸改名志父春秋仍舊猶書趙鞅桐棺三寸不設屬音燭辟歩厯反疏棺用難朽之木桐木易壊故以為罰夫子制于中都棺四寸三寸亦罰也屬次大棺也辟親身棺也王棺四重被水牛及兕之革為一重辟為二重屬為三重大棺為四重君再重屬與辟為一重大棺為二重大夫一重無辟惟屬與大棺為一重今云不設辟者僣君制耳非正禮也素車樸馬疏樸馬謂髦不翦落按樸者對文而言翦鬛則為文馬矣無入于兆注兆葬域疏周禮冡人云凡兵死者不入兆域鄭𤣥云戰敗無勇投諸營外以罰之登鐵上括地志鐵丘在衛南縣東南十五里孟喜曰可矣注喜太子前怯今更勇傅遜曰非喜太子也下𫝊傁曰雖克鄭猶有知在於太子勇不相接蓋鄭敗則范中行失援糧竭必將亡而𫝊傁應之以猶有知在也駕而乗材兩靷皆絶按靷引軸也以皮約馬胸而引車軸也欲明其靷之將絶故不以乘人而以乘材材小木也既而果絶則前之將絶騐矣三年濟濡帷幕鬱攸從之注鬰攸火氣也濡帷幕于水中出以濟用從火氣所向而為之備二句皆倒字法南氏生男正常載以如朝邵寳曰正常之告南孺子男可謂不負桓子矣于時康子即位矣告不亦晚乎娠有期日始卒而告請需焉固愈于既𦵏而徒告也雖然康子之立固必有君命矣君將奈何因其請退而辭之可也俾遂攝焉而約反嗣于他日亦可也則或殺之矣即康子為之也朱子所云康子奪適謂此四年諸大夫恐其又遷也承注承音懲蓋楚言疏懲創往年州来之遷恐更復遷徙承懲音相近聲轉而字異耳單浮餘圍蠻氏史記正義括地志故蠻城謂之蠻中在汝州梁縣界左傳單浮餘圍蠻氏杜預云城在河南新城東南伊洛之戎陸渾蠻氏城也俗以為麻麻蠻聲相近耳按新城今陸渾縣是也以臨上雒按上雒在今商州形勢所在斯時為晉地下云將通于少習以聽命注云少習商縣武闗也即沛公入秦之道使謂隂地之命大夫士蔑注命大夫别縣監尹疏隂地者河南山北東西横長其間非一邑也若是典邑大夫則當以邑冠之今言隂地之命大夫則是特命大夫使總監隂地故為别縣監尹也以其去國遥逺别為置監以畀楚師于三戸注今丹水縣北三戸亭按史記楚雖三户亡秦必楚即此地時楚人圖北方勢甚張謀甚狡而晉何其懦也斯時有范中行之難故不能與抗然諸蠻無罪誘而致之執而畀之晉世主夏盟而今乃京師楚乎弦施逆之遂墮臨疏趙稷初奔臨本欲據臨距國今弦施逆稷欲納之他邑以臨險固故毁之按林注謂墮臨邑以處趙稷誤也下文弦施㑹鮮虞納荀寅于栢人則稷亦從之矣五年王生授我矣遂死于栢人王生之舉張栁朔與祁奚之舉解狐絶相類栁朔卒死范氏以報王生尤為千古義俠怨自若焉不以蔽賢無私徳焉不以負舉兩人惟一心事主故磊落如是後世人臣恩怨明而國事僨矣趙鞅伐衛范氏之故也遂圍中牟按孔子世家云孔子去衛佛肸為中牟宰趙簡子攻范中行伐中牟佛肸畔使人召孔子蓋佛肸本晉邑宰而助范中行者魯亦援范中行佛肸所以来召孔子也夫佛肸與公山不狃論語作弗擾之事蓋不同矣不狃猶名張公室佛肸則黨范中行為逆者也二氏伐晉侯敗而出奔不狃在吳猶不忘宗國佛肸則與范中行俱滅亡而不悔者也其時趙鞅已歸晉奉君命而討不臣二氏豈有復存之理夫子乃欲往其召哉所云欲往者猶云居夷浮海無所復之而云然耳六年國人追之國夏奔莒遂及髙張晏圉弦施来奔愚謂國人之追國髙以陳氏厚施于民之故且國夏髙張阿景公意而立荼已大拂國人之情矣能無助陳氏乎陳乞之以詐去國髙為欲廢孺子荼也其欲廢孺子荼為欲立陽生也孺子荼之立景公不託陳乞而託國髙固乞之所甚惡也再敗楚師注前敗栢舉今若退還亦是敗按劉炫云再敗謂今戰更敗觀下云棄盟逃讎方説退意劉解是子閭退曰君王舍其子而讓羣臣羣臣敢忘君乎與子西子期謀潛師閉塗逆越女之子章立之而後還馮時可曰楚昭時救陳在城父三軍從焉鄀都一空國耳越女之子章傫然一賤者也冡嗣未定羣公子旁睨章保不為魯之公子班齊之孺子荼耶是故讓子西讓子期又譲子閭者凡以安章也楚子知子閭之賢足以安章也故讓之獨數不然均庶兄也何至於子閭而五讓歟子閭許而後可定立章之謀矣潛師閉塗立子章於軍中而敵人不知楚國按堵其辭也非矯也其許也非貪也吾以為昭王之明過於宋宣而子閭之順過於宋穆遠矣楚子使問諸周太史王應麟曰春秋書災異不書祥瑞所以訓寅畏防怠忽也隕石六鷁宋㐮以問周内史衆鳥夾日楚昭以問周太史可見災異古史官之職後世委之星厯卜祝之司而修省之意微矣江漢睢漳水經睢水經襄陽至南郡枝江縣入江漳水經襄陽至南郡當陽縣入江僖子不對而泣悼公意欲僖子殺荼僖子不忍故泣甚哉陳氏之得民也國人知之而不言所以敢召陽生自魯入齊自陳入宫詐脅鮑子斥逐君夫人無一人與為難者不對而泣似亦良心然安知非詐也舉齊國而詐之何有于一朱毛哉七年制禮上物不過十二疏周禮掌客云王合諸侯而饗禮則具十有二牢大行人云上公九牢侯伯七牢子男五牢陸粲曰上物亦通言之如冕十二旒玉路繁纓十二就之類牢亦在其中太伯端委以治周禮仲雍嗣之斷髪文身臝力果反以為飾疏史記太伯仲雍二人奔荆蠻文身斷髪此云太伯端委仲雍斷髪者太伯初往未為彼君故服其本服自治周禮及仲雍民歸既多既為彼君宜從彼俗曲禮云君子行禮不求變俗是也漢書地理志越人文身斷髮以辟蛟龍之害應邵曰常在水中故斷其髪文其身以象龍子故不見傷害黄震曰蘇黄門謂子貢言泰伯端委以治吳則未嘗有斷髪文身之事至仲雍而後斷髪文身太泥左傳夫斷髪文身者泰伯仲雍始入吳之事隨其俗也端委而治者吳人尊信之後泰伯君吳之事也泰伯果端委于其先矣仲雍繼之為君而乃斷髪文身豈人情耶王樵曰斥吳先君之事此非所宜言傳者傅㑹之耳八年師待之此宋師也宋之殿兵不行故師待之入國林注以曹師言誤問于叔孫輙定十二年叔孫輙襲魯兵敗奔齊後又自齊奔吳若使子率子必辭王將使我疏率謂在軍前引導率領先行非謂軍前之將帥也故不狃云子辭王將使我以其知魯道者惟此二人故也禇師圃脱衛侯中牟之阨公山不狃拒叔孫伐魯之謀皆志不忘宗國君子有取焉其云君子違不適讎國又云君子不以所惡廢鄉並長者之言拘者道之以伐武城克之王犯常為之宰澹臺子羽之父好焉國人懼疏克之非實克也蓋鄫人道吳人之言謂必可克之以吳人王犯常宰武城與澹臺子羽之父相善也國人懼者武城人懼子羽父為吳内應也愚按劉炫謂其時已克武城國人懼懼其害魯非武城也陸子餘取此説蓋武城在今費縣西北為吳魯孔道吳克武城將駐兵深入况王犯與子羽父二人相得恐其堅心事吳故國人皆為之懼也卒三百人有若與焉羅景綸曰吳師壓魯魯亡無日有若視父母之邦阽危如此慨然與宵攻之列即因是而死豈不賢於子路之死乎葉水心以刧寨病之過矣以王子姑曹當之而後止魯雖為城下之盟吳人行成全是微虎懼之一夕三遷之力及景伯負載書出盟諸大夫因求吳王子交質以當景伯吳王不欲遂兩止也吳人盟而還注不書盟恥吳夷趙匡曰吳之伐魯為邾故也若實為城下盟則魯懼甚矣何得不便歸邾子而待齊重請師乃歸之乎經不書盟信經可也九年故圍宋雍丘按雍丘本杞所封此曰宋雍丘蓋杞遷而宋得之遇水適火疏服䖍曰兆南行適火卜法横者為土立者為木邪向經者為金背經者為火因兆而細曲者為水盈水名也注趙鞅姓盈水盈坎乃行按史記秦伯翳之後嬴姓也趙氏之先與秦同祖嬴盈字同音然此解本牽强難通而下又取水盈坎為義與鞅姓何渉十年齊人弑悼公赴於師傳不言弑者為誰按齊世家云鮑子田世家作鮑牧與悼公有郤四年吳魯来伐鮑子弑公赴於吳然經文齊侯書卒恐無被弑之事辨詳集説於是乎取犂及轅注犂一名隰濟南有隰隂縣疏犂即犂丘也二十三年傳齊晉戰于犂丘知伯親禽顔庚庚即涿聚也二十七年陳成子召顔涿聚之子晉曰隰之役而父死焉是犂一名隰我請退以為子名務徳而安民乃還愚謂季子身雖不入吳國心未嘗一日忘吳也是時夫差方結怨于齊安可復搆兵于楚以務徳為名遇子期而去之誠不欲殘民取勝以厚夫差之毒而速其亡也劉氏曰左氏云延州来季子推驗其年季子近百嵗矣似異時事傳附著其説耳十一年一室敵車優矣言以一都邑之室而敵一兵車自有餘力非謂以魯一室敵齊一車也小人慮材而言量力而共者也冉求之意謂武叔未堪戰我故不答戰事蓋以激之故武叔云是謂我不成丈夫也杜云非已才力所及故不能言失其㫖矣有子曰就用命焉就即陳力就列之就言須雖弱使之就于行伍必用命焉就字微讀冉有樊遲皆忠于魯史記載夫子之言曰夫魯父母之國也國危如此二三子何為不出此夫子之訓也師及齊師戰于郊公為與嬖僮汪錡乘皆死陸粲曰公為乃昭公之子謀逐季孫以成乾侯之禍至是乃死或曰彼蓋悼前事之失而以晚蓋者也夫然曷若盡節于昭公歟使其從公而出也能彊勉與子家子同心而無與羣小相比公存則䝉死圖入如甯俞之于衛侯公沒則泣血求援如申包胥之於楚國不濟則刎頸絶脰以謝君父可也今靦然讎人共國已再易世雖隕于原野而非其死所曷足貴乎命其徒歌虞殯注虞殯送𦵏歌曲示必死疏禮啓殯而𦵏下棺反日中而虞蓋唘殯將虞之歌謂之虞殯今之挽歌是也困學紀聞左𫝊有虞殯莊子有紼謳挽歌非始於田横之客人尋約吳髪短注約繩也八尺為尋吳髪短欲以繩貫首凌稚隆曰令人具繩為俘獲用以吳俗斷髪不可縛欲以繩貫其首取之公孫夏諸人誓死則志决何反被禽其氣怯也公孫揮獨志在獲人卒不為人所獲而免于死其氣壯也故知戰以氣為主王及列士皆有賂孫武子卑而驕之劉寅曰卑辭厚賂使彼志驕則怠而不為備故可襲而破之如越子率衆朝吳列士皆有賂子胥以為豢吳冒頓以千里馬閼氏與東胡東胡志驕不為備卒滅之是也屬其子於鮑氏為王孫氏注私使人至齊屬其子改姓為王孫傅遜曰按史記吳越春秋皆云吳王使子胥于齊子胥屬其子于齊鮑氏而還報吳今考傳文此云使于齊下云反役明是子胥身自使齊若子胥使人當云使使于齊而無反役之文矣衛人立遺使室孔姞注遺疾之弟孔姞孔文子之女疾之妻按孔文子始令太叔疾出其妻而以己女妻之繼又惡其淫乃奪己女而妻太叔之弟二事皆不列人類夫子以他善而稱其文其取人之恕哉季彭山云或傳文有誣辭胡簋之事注夏曰胡周曰簋疏明堂位有虞之兩敦夏后氏之四璉殷之六瑚周之八簋如記文則夏器名璉殷器名瑚而包咸鄭𤣥等注論語賈服等注此傳並云夏曰瑚杜亦同之將止魯人以幣召之乃歸金履祥曰按世家稱孔子自楚反衛在哀公六年其後自衛反魯首尾又六年何久于衛如此及考之陳世家則楚昭卒之年孔子在陳非反衛也考之衛世家則齊弑悼公之年孔子始自陳至衛明年反魯則非久于衛也然猶至衛何也孔子在陳思魯狂士曰盍歸乎来則自陳至衛蓋過衛耳意則主于歸魯也以夫子門人如子夏子貢子羔之徒亦多衛人而魯為父母之邦其出也既以司寇去國則其反也不可以無故而復國故明年召之即歸也十二年用田賦按作丘甲者一丘而出一甲一甸出四甲也用田賦者丘出牛馬之賦又藉井而取之不待丘也杜氏皆不可從辨詳集説季氏不絻放絰而拜注孔子始老故與弔也孔子以小君禮弔季孫不服喪故去絰從主節制疏大夫之喪服弁絰弁絰者如爵弁而加環絰曲禮云凡非弔喪非見國君無不答拜者此何以言放絰而拜蓋喪賔不答拜謂喪主既拜賔賔不答拜耳其初見主人或弔者先拜傅遜曰曲禮言賔主弔喪之常弔君母自不同意孔子于時必已弔之于朝矣弔而後適季氏非適季氏弔也拜乃賔主相見交拜之禮見季氏不絻則亦放絰而拜以為稱耳弔喪不答拜于此何與然杜注所云亦有誤孔子仕于定公十年距此已遠何云始老又以去絰為從主節制此豈弔季氏而乃云從主哉愚按孟子之卒實吳女也故娶不告宗廟沒不赴諸侯葬亦不稱小君觀季氏不服喪冠則當時不以夫人禮待之可知矣孔子去絰而拜固不欲矯季孫之失亦所以掩昭公之非禮也公及衛侯宋皇瑗盟注盟不書畏吳竊盟愚按自哀二年盟句繹以後凡内外盟經皆不書以匱盟要盟不足書且不忍書也若云畏吳而竊與衛宋盟故不書恐不可信盟㰱大事也誰能掩之且吳人主㑹寜不慮為吳所覺而三國敢竊自為盟耶今火猶西流司厯過也注猶西流言未盡沒知是九月厯官失一閏疏月令季夏之月火昬中詩傳流下也火星七月昬而見于西南漸下流也周禮季冬納火是九月之昬火始入十月之昏則伏火猶西流言未盡沒是夏九月也十三年越子伐吳為二隧注隧道也愚按吳語勾踐命范蠡舌吳越春秋作洩庸卒師㳂海泝淮以絶吳路敗王子友於姑熊夷韋昭曰姑熊夷吳郊也勾踐乃率中軍泝江以襲吳入其郛焚其姑蘇臺徙其大舟蓋越兵入吳一截淮一泝江所謂二隧也戰國䇿吕氏春秋淮南子皆作千隧干隧地無考疑二隧之訛吳晉爭先疏國語説此事云吳公先㰱晉侯亞之今經書公㑹晉侯及吳子傳稱公㑹單平公晉定公吳夫差吳俱在下晉實先矣國語之文多與傳異傅𤣥云國語非丘明所作二文不同者必語虚而𫝊實趙鵬飛曰是時吳强晉弱然吳方在㑹而越入吳之報忽至吳子倉荒刎報者七人則内惕而不敢固爭恐左氏先晉是愚按此時晉實不兢吳公先㰱晉侯亞之當以外傳為實辨見集説伯帥侯牧以見于王注伯王官伯侯牧方伯疏曲禮五官之長曰伯是職方也九州之長入天子之國曰牧于外曰侯職方者二伯各主一方州長者州牧各主一州周禮所謂八命作牧九命作伯也按康王之誥云太保率西方諸侯入應門左畢公率東方諸侯入應門右此即伯率侯牧以見王之禮魯將以十月上辛有事于上帝先王季辛而畢魯有祈榖之郊而無冬至之郊上辛盡下辛乃前一月卜郊之禮然春秋所書郊無定月景伯云云特權辭以紿吳耳不可以典制求之呼曰庚癸乎則諾庚金屬秋榖以秋熟故以庚主榖諾者諾其請而與之十四年叔孫氏之車子鉏商獲麟家語作叔孫氏之車士曰子鉏商王肅云車士將車者子姓鉏商名括地志獲麟堆在鄆州鉅野縣東十二里都城記云鉅野故城東十里澤中有土臺廣輪四十五歩俗云獲麟堆去魯城可三百餘里及即位使為政愚謂陳氏之謀齊日耽耽然在其側簡公之寵闞止適予之以隙耳闞止輕率寡謀復寵陳豹而欲盡去陳氏卒之殺其身以及其君方信平仲之外善陳桓子而内則以禮告景公不為無見子我夕注夕視事傅遜曰昭十二年傳右尹子革夕注云莫見栁文朝日説引此傳文亦以為莫見按此與子革不同下云陳逆殺人逢之遂執以入可見為視事也子我盟諸陳于陳宗陳宗陳氏之宗廟也與下盟辭有如陳宗同有謂陳氏宗主即陳成子者非是子行舍於公宫愚謂陳逆初逃陳氏後何以忽在公宫哉陳豹之事闞止陳逆之隠公官皆成子之謀也自古奸臣竊國必密置私人為内間然後其計得成闞止寵豹正墮成子術中逆復在宫則成子出入皆無所忌簡公動息無不知而可以㺯之於股掌之上矣成子兄弟四乘如公注成子之兄弟昭子莊簡子齒宣子夷穆子安廩丘子意茲芒子盈惠子得凡八人二人共一乘史記索隠按世本昭子是桓子之子成子之叔父又不名莊杜注强相證合言四乘有八人耳又按田完世家云田常兄弟四人如公宫即此事今此惟稱四乘不言人數知是謂兄弟四人乘車而入非二人共乘也然其兄弟不見者蓋時或不在不同入公宫不可强云兄弟八人増叔父為兄弟之數服䖍杜預皆失之聞公猶怒將出曰何所無君陸粲曰陳恒之力於弑逆若撥䵄矣聞公怒而將出豈其情哉姑以是觀國人之心激私黨之怒而已意如之被伐也請以五乘亡彌牟之拒輙也欲自北門出姦人飾詐大抵然耳愚謂成子欲出亡所以激陳逆之怒也成子亡逆必為闞止所屠自不得不刦而止之陳恒執公於舒州史記舒作徐索隠曰徐音舒齊邑薛縣是也正義曰齊之西北界上地名在渤海郡東平縣逢澤有介麋焉注地理志言逢澤在滎陽開封縣東北遠疑非介大也疏臣瓉案汲郡古文梁惠王廢逢忌之藪以賜民今浚儀縣有逢忌陂是也開封縣逢澤去宋都睢陽四百餘里非輕行可到故杜以逺疑非也司馬請瑞焉注瑞符節以發兵疏周禮典瑞云牙璋以起軍旅若今以銅虎符發兵司馬牛致其邑而適吳吳人惡之而反卒於魯郭門之外阬氏𦵏諸丘輿傳詳司馬牛卒𦵏所在愍賢者之失所也使宋景念向戌之賢不絶其把召牛而復之不亦稱乎而卒使之死於亡也悲夫十五年廢日其積一日遷次廢日二句難解或曰廢與費音同積去聲言日費吳國之供給委積故一日即遷一次急於致君命也有朝聘而終以尸將事之禮邵寳曰禮賔終有于入竟者有于未將命者於入竟者主人為之殯介攝其命於未將命者以尸將事太子焉用孔悝雖殺之必或繼之蘇轍曰季路志厲而識闇事衛出公雖父子爭國而不知其危也方其攻莊公于臺上使幸而莊公舍孔悝季路與悝偕出猶可言也莊公方質孔悝以取衛其不釋悝明矣孔悝不出遂攻而勝之則為臣弑君季路雖存將安所容身乎嗚呼學于孔子其慮害曽不若召獲悲夫十六年夏四月己丑孔丘卒注魯哀二十二年生至今七十三也四月十八日乙丑無己丑日月必有誤疏公羊傳於㐮二十一年下云十有一月庚子孔子生榖梁傳於二十一年冬十月下云庚子孔子生賈逵服䖍皆定為㐮二十一年生也孔子世家云魯㐮公二十二年而孔子生年七十三哀公十六年夏四月己丑卒杜元凱從史記愚案公羊以襄公二十一年十一月庚子孔子生榖梁年與日同獨冬十月少異世家謂二十二年生者蓋誤以周正十一月屬之明年耳洪興祖主榖梁而謂周家改月十月二十一日庚子即夏八月二十一日也宋景濓辨之曰公榖傳經之家講師相授其言必有據依且又先於司馬遷者也自當從之但考春秋長厯㐮公二十一年己酉嵗十一月無庚子庚子在十月之二十一日則月當以榖梁為正矣孔子卒之年月日具詳左氏然哀公十六年乃壬戌嵗也是嵗四月戊申朔有乙丑而無己丑己丑是五月十二日已與乙文相近故誤耳乙丑則四月十八日以夏正言之實二月十八日也自壬戌嵗上遡己酉孔子得年七十四謂七十三者非也無自律嘆已無所取法使貳車反祏於西圃注祏藏主石函疏禮大夫之祭無主悝有主者當時僣為之不洩人言以求媚者去之何以知其不洩人言於承劍不動知之蓋不怵人者亦不必媚人也子西以袂掩面死子西之死在孔子沒後或人及其生存時舉以為問蓋震矜其定楚之功也然子西忠而實闇卒召白勝之亂䝉面以死是尚不得與葉公並稱况子産管仲乎十七年良夫乗衷甸兩牡紫衣狐裘至􅃝裘不釋劍而食疏甸即乗也四丘為甸出車一乗故以甸為名衛侯本許良夫服冕乗軒則衛侯既入良夫為大夫矣兵車一轅兩馬夾之其外更有二驂是為四馬今止乗兩牡謂之衷甸者衷中也四馬為上乗兩馬為中乗大事駕四小事駕二為等差也紫衣為君服禮無明文玉藻𤣥冠紫緌自魯桓公始也管子齊桓公好服紫衣齊人尚之五素而易一紫蓋當時人主好服紫衣君既服之臣不得僣玉藻君衣狐白裘錦衣以裼之是裘上有裼衣裼衣之上乃有朝祭正服裘上有兩衣也襲則二衣皆重之裼則􅃝正服露裼衣玉藻云裘之裼也見美也君在則裼盡飾也服之襲也克美也然則在君之所於法惟有露裼衣無露裘之時今良夫以食熱故偏􅃝其裘則并裘亦􅃝是不敬也劍不得近至尊故近君則解劍吳師分以禦之劉寅曰越為左右句卒吳分兵禦之越遂潛渉破吳夫形人而我不形則我專而敵分我專敵分則我衆敵寡能以衆擊寡則我之所與戰者約矣我之戰地不可知不可知則敵所備者多敵備多則我所與戰者愈約矣李靖曰越伐吳以左右二軍鳴鼓而進越分兵潛渉襲敗吳師此變客為主之驗也姬澹逺来伐石勒勒遣孔萇逆擊之萇退澹来追勒以伏兵夾擊大敗之此變勞為佚之驗也古人如此取勝者多太子又使㭬之注㭬訢父欲速得其處愚案㭬疑當作諑即謡諑之諑蒯聵之居戚也其子輙拒之於衛其入衛也太子疾又愬之於晉春秋子禍之烈未有若蒯聵者也豈非戲陽速之事已實有以誨之哉傅遜曰觀蒯聵輙疾之事人道㡬絶矣夫子何以有正名之説余謂蒯聵欲殺南子出於羞忿與簒弑者稍殊且靈公未有廢之之命也何不可以君國設已廢則輙豈獨得立乎若夫子為政當使輙以國譲父而身為太子蒯聵雖不仁得國於輙必不廢之而立疾其事甚易而子路以為迂何也緜緜生之瓜古叶乎攻切音姑余為渾良夫呌天無辜良夫誠小人太子疾自以私怨殺之未當其罪故死而猶能見夢於莊公也如魚竀頳同尾衡華肓反流而方蒲郎反羊裔焉大國滅之將亡闔門塞竇乃自後踰注竀赤也横流方羊不能自安裔水邉言衛侯將若此魚疏鄭衆以緜言如頳尾之魚方羊遊戲於横流之中喻蒯聵滛縱也劉炫云方羊與下句將亡自相為韻裔焉二字宜向下讀言邉逺之大國將来滅之愚按方羊古與彷徉通楚辭􅂓彷徉以逍遥劉以裔焉大國為句稍强然較之連上彷徉者差成文也韻㑹云竇集韻或作窬説文引圭竇亦作圭窬上羊亡為韻此窬踰為韻正繇辭之體孔氏阿杜而非劉失之矣武伯曰然則彘也按執牛耳即㐮二十七年叔向所云尸盟也國君在則當以人臣執之吳姑曹衛石魋皆然故武伯自以為當執杜云執者無常恐非叔青如京師敬王崩故也疏案左氏敬王崩在此年世族譜云敬王四十二年崩敬王子元王十年春秋之傳終矣則敬王崩當在哀十七年史記周本紀及十二諸侯年表敬王四十二年崩子元王仁立則敬王是魯哀十八年崩也六國年表起自元王及本紀皆云元王八年崩子定王介立定王元年是魯哀公之二十七年與杜預世族譜為異又世本云魯哀公二十年是定王介崩子元王赤立衆説不同未詳其正也二十一年魯人之臯數年不覺使我髙蹈臯覺皆讀去聲與蹈叶注臯緩也疏士喪禮始死復魂云臯其復鄭𤣥云臯長聲也緩聲而長引之是臯為緩也唯其儒書以為二國憂憂叶衣虚切音於易林出入休居安居無憂注二國齊邾也傅遜曰二國以齊魯賔主言之邾國小從齊其事輕矣魯為齊責顧不憂耶王應麟曰儒書為二國憂春秋之季已輕儒矣至戰國而淳于髠有賢者無益之譏秦昭王有儒無益之問末流極於李斯二十二年孤老矣焉能事君乃縊越人以歸史記作自剄死以歸以其尸歸也越絶書越王棲夫差於秦餘杭山卒因𦵏焉吳志云夫差冢在陽山陽山一名秦餘杭山與傳不合愚案傳哀二十年越圍吳二十二年滅吳蓋首尾三年也國語曰居軍三年吳師自潰越世家亦曰留圍之三年與左傳合吳越春秋繫其事於二十一年以為圍守一年而滅吳誤也二十三年使肥與有職競焉按説文競訓彊職競謂强力於職事也亦倒字法杜云競遽也不然其可以稱旌繁歩干反乎注稱舉也繁馬飾䌓纓也劉用熈曰稱讀稱副之稱謙言不腆之馬不知能稱旌䌓之飾否二十四年是躗言也林注躗過也過謬之言陸粲曰躗是踶蹋之義此當作㦣説文字林皆云㦣言不慧也使因太宰嚭而納賂焉按史記越王滅吳誅太宰嚭以為不忠而歸此云因太宰嚭則嚭又用於越也未知孰是二十五年君將㱿之注㱿嘔吐也按説文作嗀音壑傅云韻書無此字蓋嗀之誤也宜改正公㦸其手注抵徙手屈肘如㦸形傅遜曰以手抵徙既非㦸形矣曰屈肘又非手矣且屈其肘安能如㦸乎考字書單枝曰戈雙枝曰㦸雙枝與中幹列而為三此必屈二指而以其三指為㦸形耳乃載寳以歸拳彌以衛盗恐輙而載其寳以歸衛言輙之愚為其臣所弄如此二十六年申開守陴而納公注申重也開重門而嚴設守備按杜注解申開二字似僻疏云衛人申開守陴得之蓋申開嚴設守備聲言納輙輙知衆情不附故不敢入也公怒殺期之甥之為太子者愚謂蒯聵與輙皆出而復反反而復出均之不令終者也然瞶欲弑母其後太子疾㭬之於晉以召晉兵身死戎州而疾亦不免焉輙據國拒父其後夫人之弟期謀亂卒以逐輙輙惡期以及其甥而己之子亦不免焉父子效尤為天下笑積惡貽殃信夫二十七年盟於平陽注西平陽疏宣八年城平陽彼注云今太山有平陽縣故此云西平陽也髙平南有平陽縣季康子卒公弔焉降禮注禮不備也陸粲曰降禮猶言降於喪食公過自貶也公弔季氏敢不備禮乎讀左日鈔卷十二
