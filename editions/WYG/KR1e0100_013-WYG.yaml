body:
  text: 讀左日鈔補卷上吳江朱鶴齡撰隠公元年謂之鄭志按莊公為人多忌而好名其志豈真欲殺段特欲甚其罪而出之爾左氏譏失教也與詩序不勝其母以害其弟持論甚平辨詳春秋集說及詩經通義五年則公不射疏肉登於俎公則射之此云不登於俎不登於器者謂田獵之時小禽小獸不可升於宗廟之俎皮革之屬不可以飾法度之器者則君不親射之此劉炫之說周禮􅈄人凡祭祀共其魚之鱻薧特牲少牢之禮皆有魚為俎實今公觀魚非為祭祀故臧孫非之使曼伯與子元潛軍軍其後顧炎武曰按子元疑即厲公之字昭十一年申無宇之言曰鄭莊公城櫟而寘子元焉使昭公不立杜氏以為别是一人厲公因之以殺曼伯而取櫟非也蓋莊公在時即以櫟為子元之邑如重耳之蒲夷吾之屈故厲公於出奔之後取之特易而曼伯則為昭公守櫟者也九年公子突請為三覆以敗戎桓五年子元請為二拒以敗王師固即厲公一人而或稱名或稱字耳合三事觀之可以知厲公之才略而又資之以巖邑能無篡國乎十一年周之宗盟異姓為後疏宗盟杜無明解服䖍以為同宗之盟得之天子盟諸侯令其同奬王室未聞離逖異姓但周人貴親先序宗族故謂之宗盟盟則同姓在先朝則各從其爵異姓為後者謂王官之伯降臨諸侯以王命而盟者耳其春秋之世狎主齊盟者不復先姬姓也師出臧否亦如之疏臧否謂善惡得失也按春秋之初師出貴有名不言勝敗而言臧否者以理之曲直兵之强弱舉其本末來吿史臣因據以書之於䇿非徒勝敗之謂也立桓公而討寪氏有死者顧炎武曰言非有名位之人蓋㣲者爾如司馬昭族成濟之類杜氏云欲以弑君之罪加寪氏而復不能正法誅之非也桓公二年孔父嘉為司馬顧炎武曰杜氏以孔父名而嘉字非也孔父字而嘉其名按家語本姓篇曰宋湣公生弗父何何生宋父周周生世子勝勝生正考父考父生孔父嘉其後以孔為氏然則仲尼氏孔正以王父之字而楚成嘉鄭公子嘉皆字子孔亦其證也説文孔从乙从子乙至而得子嘉美之也故古人名嘉字子孔鄭康成注士喪禮曰某甫字也若言山甫孔甫甫父通是亦以孔父為字劉原父以為己名其君於上則不得字其臣於下竊意春秋諸侯卒必書名而大夫卒命卿稱字無生卒之别劉原父亦云大夫再命稱名三命稱字亦未嘗以名字為尊卑之分桓十一年鄭伯寤生卒𦵏鄭莊公宋人執鄭蔡仲杜氏以仲為名而足字亦拘於例也十七年蔡侯封人卒蔡季自陳歸于蔡名其君於上字其臣於下也昭二十二年劉子單子以王猛居於皇劉子單子以王猛入于王城二十三年尹氏立王子朝二十六年尹氏召伯毛伯以王子朝奔楚爵其臣於上名其君於下也然則孔父亦必其字而學者之疑可以渙然釋矣君之名變也命卿之書字常也重王命亦所以尊君也愚按杜氏以父為名嘉為字特拘於古例之失至云孔父有罪而稱名則於義尤舛辨詳集說靖侯之孫欒賔傅之註靖侯桓叔之髙祖父疏按晉世家靖侯生僖侯僖侯生獻侯獻侯生穆侯穆侯生桓叔是靖侯為桓叔髙祖父非謂髙祖之父也六年公與文姜宗婦命之注蓋同宗之婦疏以上所引皆内則文襄二年𦵏齊姜傳曰齊侯使諸姜宗婦來送𦵏諸姜是同姓之女知宗婦是同宗之婦也公與夫人共命之故使宗婦侍夫人不以國顧炎武曰注云國君之子不自以本國為名焉有君之子而自名其國者乎謂以列國為名若宣公名宋哀公名蔣十年虢仲譖其大夫詹父於王注虢仲王卿士詹父屬大夫疏周禮每卿之下皆有屬大夫傳言譖其大夫知是屬己之大夫非虢大夫也若虢大夫虢仲自得罪之無為譖之於王且若虢人不得以王師伐虢也十五年六月己亥昭公入按經書鄭世子忽則突之篡明矣杜氏之論殊乖大義辨詳集説及詩經通義十六年夀子載其旌以先疏世家云與太子白旄而吿盜曰見白旄者殺之蓋以白旄為旌也莊公十一年宋公靳之注戲而相愧曰靳公羊傳宋萬與閔公博婦人皆在側萬曰甚矣魯侯之淑魯侯之美閔公矜此婦人妒其言曰此虜也魯侯之美惡乎至萬怒搏閔公絶其脰是戲而相愧之事也十三年冬盟于柯始及齊平也按柯之盟左傳不詳其故公榖皆載劫盟事公羊云曹子蓋曹沬也榖梁直云曹劌劌之論戰與諫觀社不類劫壇者太史公好奇遂以列刺客之首王伯厚深疑之辨詳集說十四年莊公之子猶有八人顧炎武曰注云莊公子𫝊惟見四人子忽子亹子儀並死獨厲公在八人名字記傳無聞按猶有八人者除此四人之外尚有八人見在也桓十四年鄭伯使其弟語來盟𫝊稱其字曰子人亦其一也十九年楚人以為大閽謂之大伯注若今之城門校尉官疏周禮天官閽人掌守王宫中門之禁天官掌戮墨者使守門刖者使守囿則閽不使刖而鬻拳為閽者地官有司門下大夫二人掌授管鍵以啓閉國門鄭𤣥云若今城門校尉主王城十二門此注亦云然蓋鬻拳本是大臣楚人以其賢使典此職非為刑而役之當如地官之司門以主晨昏開閉通名閽焉謂之伯者伯長也為門官之長也二十二年山嶽則配天顧炎武曰注云得太嶽之權則有配天之大功非也詩曰崧髙維嶽駿極于天言天之髙大惟山嶽足以配之林注云山嶽之大興雲降雨有配天之功此却勝杜二十五年夏六月辛未朔日有食之鼓用牲於社非常也顧炎武曰周之六月夏之四月所謂正月之朔也然則此其常也而曰非常者何蓋不鼓於朝而鼓於社不用幣而用牲此所以謂之非常禮也杜氏不得其說而云以長厯推之是年失閏辛未實七月朔非六月也此則咎在司厯不當責其伐鼓矣又按惟正月之朔以下乃昭十七年季平子之言今載於此或恐有誤凡天災有幣無牲疏日月食大水天之見異所以譴吿人君非為求人飲食既遇天災即當吿請是故有幣無牲若亢旱歴時霖雨不止然後禱祀羣神設禮以祭祭必有牲雲漢詩靡愛斯牲是也非日月之眚不鼓注月侵日為眚疏杜但據日食為說傳文日月並言則月食亦有鼓周禮太僕云凡軍旅田役贊王鼓救日月亦如之是日食月食皆有鼔也榖梁傳天子救日置五麾陳五兵五鼓諸侯置三麾陳三鼓三兵大夫擊門士擊柝三十二年初公築臺臨黨音掌氏注黨氏魯大夫按哀十一年傳俟於黨氏之溝注云黨氏溝朝中地名彼黨氏當即此黨氏而杜氏異釋蓋黨氏本魯大夫之家偪近公朝後其地遂名為黨氏之溝耳閔公元年趙夙御戎畢萬為右疏趙世家夙生共孟孟生衰晉語云趙衰先君之戎御趙夙之弟也杜以夙為衰兄從晉語也魏世家畢萬生武子世本畢萬生芒季季生武仲州州即犫也杜以萬為犫之祖父從世本也安而能殺疏震之為殺傳無明文晉語云震車也震有威武故為殺林注屯之下卦有震震為雷霆擊物有殺之象以坤承震之變故曰安而能殺二年立戴公以廬于曹注其年卒而立文公疏戴公為君不過數十日耳以滅而後興不是嗣位故成喪為諡年表亦以此年為戴公元年文公繼之明年始稱元年伐東山臯落氏注赤狄别種也疏狄有赤狄白狄成十三年傳云白狄及君同州則白狄與秦相近在晉西此云東山當在晉東故知此為赤狄别種也僖公元年諸侯救邢注實大夫而曰諸侯總衆國之辭按公羊榖梁皆以為齊師宋師曹師皆是侯伯身行杜氏以為實大夫將蓋拘於將卑師衆稱師之例獲莒子之弟挐非卿也嘉獲之也按非卿言非天子命卿也莒無大夫於例不得書經特書獲莒挐所以嘉季子之功而大之也杜氏注及公羊傳本明白林注乃云傳言非卿明挐在行非帥師若非帥師何以在行也挐既非帥師何以特見于經林本不學其注之謬誤多類此今不能悉辨二年齊寺人貂始漏師于多魚豎貂有寵此齊之禍本也是年桓公城楚丘服江黄左氏多鋪張霸功之盛忽伏此一語覺桓公氣燄索然國家之事無重於軍機者此而洩之則他可知矣後十七年桓公卒寺貂遂因内寵殺羣吏而立公子無虧齊以大亂正與此語遥相接應筆力之髙針神之密開太史公無限法門四年昭王南征而不復顧炎武曰注云不知其故而問之非也蓋齊侯以為楚罪而問之然昭王五十一年南征不復至今惠王二十一年計三百四十七年此則孔文舉所云丁零盜蘇武牛羊可并案者也五年登觀臺以望周禮疏天子有靈臺諸侯有觀臺皆所以視天文馮相氏掌天文之不變保章氏掌天文之變太伯不從顧炎武曰不從者謂太伯不在太王之側爾史記述此文曰太伯虞仲太王之子也太伯亡去是以不嗣以亡去為不從其義甚明杜氏誤以不從父命為解而後儒遂傅合魯頌之文謂太王有翦商之志太伯不從此與秦檜之言莫須有者何以異哉宫之奇以其族行晉語宫之奇諫而不聽出謂其子曰將亾矣吾不去懼及焉以其帑適西山韋昭云西山國西界榖梁傳則云挈其妻子以奔曹八年秋禘而致哀姜焉經書七月禘于太廟周七月今五月也榖梁傳注禮記明堂位云季夏六月以禘禮祀周公於太廟雜記又云孟獻子曰七月日至可以有事於祖七月而禘獻子為之也按宣九年仲孫蔑如京師獻子始見經襄十九年卒然則失禮非獻子所始明矣雜記之言所未詳不殯於廟按檀弓殷朝而殯於祖周朝而遂𦵏注云殷大殮之後奉柩朝祖而遂殯於廟周殯於寢及𦵏而後朝廟據此則周禮不殯於廟矣此何以云不殯於廟則弗致也蓋周人兼用殷禮如戎車之大白魯廟之白牡養老之食禮皆是晉文公己卯卒庚辰將殯於曲沃柩如牛鳴此當時殯廟之一證也杜氏云將𦵏時以殯朝廟此務合檀弓之說耳余竊以為不然禮記疏引服氏云廟謂殯宫鬼神所依謂之廟亦曲說觀傳以殯廟次赴同祔姑之前必非言𦵏時甚明九年凡在喪王曰小童杜氏疑禮無稱小童者按顧命康王答羣臣自謂眇眇予末小子小童猶小子之稱十二年命曰泛舟之役疏秦都雍雍臨渭晉都絳絳臨汾渭水從雍而東至𢎞農華隂縣入河從河逆流而北上至河東汾隂縣乃東入汾逆流東行而通絳故杜云從渭水運入河汾也十五年晉侯許賂中大夫晉語夷吾謂秦公子縶曰中大夫與我矣吾命之以汾陽之田百萬㔻鄭與我矣吾命之以負蔡之田七十萬賂秦伯以河外列城五東盡虢略注河外河南也從河南而東盡虢界疏河自龍門而南至華隂而東晉在西河之東南河之北以河北為内河南為外虢略獻公所滅虢地之竟界也列城五者自華山而東盡虢之東界其間有五城也傳稱許君焦瑕是其二其餘不可知也解梁城則在河北非河外五城之數秦伯伐晉卜徒父筮之吉曰其卦遇蠱至獲其雄狐汪琬曰此蓋筮得蠱之䝉也互變震為諸侯千乘之象也巽為進退去之象也三去者初二三三爻皆巽也之卦成坎坎為狐巽為近利市三倍獲之象也故曰獲其雄狐或謂卜徒父所筮六爻皆不變者非也夫果六爻不變何以不引彖辭觀晉語重耳入國筮得泰必引小往大來之辭則可以知占例矣三敗及韓愚謂此時秦師已涉河而東矣晉侯大軍雖未出安知不先遣偏師逆戰而敗特小小剉衂史文不詳耳杜氏以為晉侯車三壞既失之劉炫謂秦伯之車三敗尤不然秦伯之車何以無故而三敗既三敗矣何以遂深入韓地也張脈僨興僨禮記注引作憤疏云言馬之血氣狡作憤怒也晉戎馬還濘而止此即秦筮所云涉河侯車敗者也上文三敗與晉侯車何涉十八年狄師還顧炎武曰注云獨言狄還則邢留距衞非也狄强而邢弱邢從狄而來伐者也言狄師還則邢可知矣其下年衞人伐邢蓋憚狄之强不敢伐而獨用師於邢也注云邢不速退所以獨見伐亦非二十一年公欲焚巫尫按巫尫注具二說檀弓云穆子問縣子曰天久不雨吾欲暴尫而奚若又曰吾欲暴巫而奚若則尫與巫是二人或説是也二十二年大司馬固諫曰顧炎武曰注以大司馬為莊公之孫公孫固非也大司馬即司馬子魚固諫堅辭以諫也隠三年言召大司馬孔父而屬殤公焉桓二年言孔父嘉為司馬知大司馬即司馬也文八年上言殺大司馬公子卬下言司馬握節以死知大司馬即司馬也定十年公若藐固諫曰知固諫之為堅辭以諫也愚按亭林此解與史記合公孫固之官司馬蓋與子魚先後為之公羊傳述宋襄此事亦作公子目夷目夷歸守國及迎宋公復國事詳集說二十三年有三士足以上人注三士狐偃趙衰賈佗晉語宋公孫固言於襄公曰晉公子好善不厭父事狐偃師事趙衰而長事賈佗此三人者實左右之公子居則下之動則諮焉傳文前後從者五人不及賈佗偶遺之耳魏禧曰意五人從公子在一時佗或稍後因而遺之二十四年晉侯求之不獲以緜上為之田顧炎武曰蓋之推既隠求之不獲未幾而死故以田祿其子爾楚辭九章説此云思久故之親身兮因縞素而哭之明文公在時之推已死史記則云聞其入緜上山中於是環緜上山中而封之以為介推田號曰介山然則受此田者何人乎於義有所未通矣好聚鷸冠疏釋鳥云翠鷸李巡曰鷸一名翠其羽可以為飾郭璞云似燕紺色生鬱林說文云翠青羽雀也二十八年曰王謂叔父禮記疏禮五官之長曰伯是職方也天子同姓謂之伯父時晉文公為侯伯不稱伯父者以州牧之禮命之也然昭九年云伯父惠公歸自秦而誘以來又云我在伯父猶衣服之有冠冕皆曰伯父又以二伯之禮稱之也周公分陜為二伯詩稱王曰叔父成王自以本親命之晉文侯為伯書直云父義和不稱伯者尤親之也言非其地也按陽樊溫原襄王雖以與晉猶為畿内之地故天子得往狩焉傳於莊二十一年言王巡虢守文元年言王在溫晉侯朝王於溫虢與溫皆王畿也可證是時巡狩之禮雖廢而其名尚存襄王以後周地益狹人并不知河陽之為王畿而傳亦以非其地言之矣二十九年陳轅濤塗秦小子憖按經文陳人下有蔡人而傳無名字注云即㣲者夫㣲者不書經文固有此例傳主詳核豈以非卿而略之況王人下臨晉卿主盟蔡何得以㣲者往㑹此恐傳有闕文杜强為說耳三十年白黑形鹽注白熬稻黑熬黍周禮疏爾雅有秬黑黍故知黑是黍也三十一年重館人吿曰魯語說此事云獲地於諸侯為多臧文仲復命為之請曰地之多重館人之力也臣聞之曰善有章雖賤賞也今一言而辟境其章大矣請賞之乃出而爵之三十二年中夀爾墓之木拱矣疏正義曰上夀百二十嵗中夀百下夀八十按洪範書傳與此同觀此語知古人宰冢之木皆生前自樹之櫬具即取諸此襄四年傳季孫為己樹六檟於蒲圃東門之外注云欲自為櫬此可證也文公元年于是閏三月非禮也顧炎武曰古人以閏為嵗之餘凡置閏必在十二月之後故曰歸餘于終考經文之書閏月者皆在嵗末文公六年閏月不吿月猶朝于廟哀公五年閏月𦵏齊景公是也而左傳成公十七年襄公九年哀公十五年皆有閏月亦并在嵗末又經傳之文凡閏不言某月者以言閏即嵗之終可知也今魯改厯法置閏三月故為非禮漢書律厯志曰魯厯不正以閏餘一之嵗為蔀首是也孟康曰當以閏盡嵗為蔀首今失正未盡一嵗便以為蔀首又按漢書髙帝紀後九月師古曰秦之厯法應置閏者總致之於嵗末蓋取左傳所云歸餘於終之意何以明之據漢書表及史記漢未改秦厯之前屢書後九月是知厯法故然愚考厯始於顓頊置閏在一嵗之末堯厯考中星定分至隨月置閏故四時不差秦變三代之制復用顓頊厯漢初因之至三統厯成然後復用堯厯之舊據亭林云云則魯厯即行顓頊厯從前諸儒未有及此者觀春秋二百四十二年之間惟兩書閏月皆在嵗終又不書閏某月則亭林之言信矣然史官紀事之體雖則如是而置閏應在某月當時厯官必占候而知之如昭二十年二月己丑日南至梓慎以是日望氛是也不然分至啓閉茫然無紀民事必爽其令而禴祠烝嘗亦何所憑以為時享哉周四時之祭皆在夏正仲月二年陳侯為衞請成於晉執孔達以說顧炎武曰此即上文所謂我辭之者也執孔達以求成也注謂晉不聽而變計更執孔達者非六年書曰晉殺其大夫侵官也按榖梁所載襄公漏言事與左傳侵官不同今春秋家多用之或兼取兩義詳集説十三年文子賦六月顧炎武曰注云不欲適晉以傳考之但云成二國不言公復適晉四月之詩當取亂離瘼矣維以吿哀之意爾十五年請承命於亞旅疏書牧誓司徒司馬司空亞旅傳云亞次也旅衆也衆大夫其位次卿華孫不敢當卿故受大夫之宴伐鼓於社注責羣隂疏郊特牲云社祭土而主隂氣也日食隂侵陽故責隂以救日尚書傳云凡日食天子伐鼓於社責上公也諸侯用幣於社請上公亦以請羣隂也互相備宣公二年觸槐而死公羊傳云俯而闚其户盾方食魚飱勇士曰嘻子仁人也入其大門無人焉入其閨無人焉上其堂無人焉易也子為晉國正卿而食魚飱儉也吾不忍殺子吾亦不忍復見吾君矣遂刎頸而死與左氏稍異晉世家略同左提彌明死之公羊傳作祈彌明於嗾獒之前云靈公欲觀盾利劒欲推刃殺之盾將進劒彌明自下呼之而出不言彌明之死晉世家作􅅘眯明又云明反擊靈公伏士脫盾出因亾去則合靈輒事為一人誤也詛無畜羣公子疏國内因驪姬之亂乃設此詛檢傳文及國語文公之子雍在秦樂在陳黑臀在周襄公之孫談在周是晉之公子悉皆出在他國成公今始革之亦為餘子注亦治餘子之政疏言亦為餘子知餘子之官亦治餘子之政令主敎卿大夫適妻之次子也下云庶子掌率公之戎車則公行不敎庶子意卿大夫之妾子亦餘子之官敎之十二年待諸乎林注言且待楚師之來與之戰乎不以人子吾子其可得乎言我不以善矢射他人之子吾子不可得作先君宫吿成事而還禮曽子問稱古者師行必以遷廟生出載於齊車以行每舍奠焉而後就舍作先君宫吿成事謂祭吿所載主十四年於是乎有容貌采章嘉淑而有加貨注言往共則來報亦備疏劉炫云采章加貨謂聘享獻國所有亦庭實也按上文言小國之免於大國也下文言謀其不免也則庭實加貨等皆屬賓言與來報何與孔仲達每絀劉而伸杜吾無取焉十五年使解揚如宋鄭世家云伯宗諫晉君毋伐楚乃求壯士得霍人解揚字子虎誆楚令宋毋降解揚能成君命故史著其地與字以傳之當以補注疏所未及十六年王享有體薦宴有折俎國語禘郊之事則有全烝王公立飫則有房烝親戚宴享則有殽烝韋昭注禘郊之祭全其牲體而升於俎謂之全烝立飫即享禮也禮之立成者為飫半解其體而升於俎謂之房烝傳言體薦即房烝也親戚宴享皆體解節折乃升於俎謂之殽烝公當享卿當宴按周禮上公三享三宴侯伯再享再宴子男一享一宴春秋時天子宴侯國之卿亦無不先行享禮者此以享宴分屬蓋各舉所重言之十七年齊頃音傾公帷婦人使觀之按左氏不言卻克跛故笑杜元凱注有之蓋本公羊傳卻克與臧孫許一跛一眇語榖梁又云季孫行父秃晉卻克眇衞孫良夫跛曹公子手僂同時而聘於齊齊使秃者迓秃者使眇者迓眇者使跛者迓跛者使僂者迓僂者蕭同姪子處臺上而笑之聞於客客不說而去此必好事者為之考經文則成二年四國同伐齊非同聘齊也王方麓有辨詳集說續補桓公五年先偏後伍伍承彌縫注司馬法車戰二十五乘為偏五人為伍以車居前以伍次之承偏之隙而彌縫闕漏也顧炎武曰古車戰之制營陳遇闕處仍以車補之周禮車僕掌闕車之萃注闕車所用補闕之車也宣十二年𫝊楚子使潘黨率游闕四十乘注游車補闕者即闕車也魚麗陳先偏後伍伍承彌縫卒不隨車遇闕即補斯已異矣大鹵之師魏舒毁車以為行五乘為三伍為五陳以相離專任步卒取其捷速然亦必山林險阻之地而後可用也步不當騎于是趙武靈王為胡服騎射之令而後世因之所以取勝者益輕益速而一敗塗地亦無以自保然後知車戰之為謀逺矣莊公七年星隕如雨與雨偕也顧炎武曰星隕如雨言多也啖氏曰奔流者衆如雨之多也漢五行志成帝永始二年二月癸未夜過中星隕如雨長一二丈繹繹未至地滅至雞鳴止谷永對言春秋記異星隕最大自魯莊以來至今再見此其證也不言石隕不至地也左氏云與雨偕也然則無雨而隕將不為異乎僖公十五年戰于韓原顧炎武曰上言秦伯涉河下言及韓又曰寇深矣是韓原在河東故杜氏解但云韓晉地史記正義引括地志韓原在同州韓城縣西南非也愚按今韓城縣在河西去河止十里春秋時為秦晉之界秦伯或由此涉河必非獲晉侯處也古今地志之誤賴亭林始正之韓原當在蒲坂臨晉間今無考三十年昌歜顧炎武曰注昌歜昌蒲葅而釋文音在感反正義曰齊有邴歜魯有公父歜其音為觸說文歜盛氣怒也從欠蜀聲此昌歜之音相傳為在感反不知與彼同異今考顧氏玉篇有􅩃字徂感切昌蒲葅也然則傳之昌􅩃正合此字而唐人已誤作歜廣韻亦誤作歜是知南北之學陸孔諸儒猶有不能徧通哀公二十五年若見之君將嗀之今本作㱿廣韻注曰說文從口蓋經典之誤文又不自天寳開成始矣文公三年取王官及郊顧炎武曰此在濟河焚舟之下則王官當在河東今臨晉縣之西南七十里王官谷司空圗記謂有王官廢壘是也其下云遂自茅津濟則又踰中條過平陸之東二十里絶河而至陜州也地理甚明括地志以王官在澄城則距河之西北二百餘里非是十二年二月叔姬卒不言杞絶也按杞桓公在位最久至襄六年始卒安有一人之身兩娶魯女皆字叔姬又皆被出之理傳蓋因經文連書杞伯來朝子叔姬卒故以成四年歸叔姬事誤置之此耳啖叔助吳幼清趙子常皆有辨詳集說讀左日鈔補卷上
