body:
  text: 讀左日鈔卷六吳江朱鶴齡撰十五年書曰晉侯執曹伯不及其民也趙汸曰凡稱人執者史策之恒辭稱君執者經變文與伯主以討賊之義也傳例不知篡奪之罪重于虐民諸侯將見子臧于王而立之子臧辭曰按曹伯殺太子自立乃罪之大者晉侯執之歸于京師正天討所加獨是戚之㑹曹伯在列則當時已赦之矣赦之而又執之所以國人屢為之請子臧辭位逃宋全是為曹伯地子臧立則曹伯不得歸國矣假令晉執在先曹伯不與于㑹其時即使子臧承王命而為君子臧雖守節亦安能不立哉魚石自止華元于河上趙汸曰華元出入皆挾晉為重魚石所以止華元實畏晉耳華元自止之不可乃反按華元先自罪出奔欲挾晉以制桓族也魚石追之許討亂而後反使桓族不能怨己也及五大夫出奔又偽自止之既不從遂閉門拒之節見見華元機智出人是定亂妙手但魚石既請討蕩澤何事又出奔疑魚石直與蕩澤同惡耳辨詳集說伯州犁奔楚注伯宗子王應麟曰晉語索士庇州犂得畢陽及欒弗忌之難諸大夫害伯宗畢陽實送州犂于荆畢陽之孫豫讓見戰國䇿祖孫皆以義烈著所謂是以似之者太史公不書于𫝊故表而出之又曰伯宗好直言而不容于晉武子好盡言而不容于齊小人衆而君子獨也漢士習于諂䛕故以朱游為狂晉士習于曠達故以卞壼為鄙十六年敗諸汋陂按注汋陂宋地或以為即鄧艾芍陂屯之地在今壽州然春秋時恐屬楚境宋不應敗鄭于此更詳之詳以事神𫝊遜曰正義云詳者祥也古字通用李廵曰祥福之善也事神得福乃獲其祥愚謂詳者慎也詳慎乃所以事神也如李說于文未順致死以補其闕闕謂軍國之事有所闕乏杜云戰死者非晉楚遇于鄢陵范文子不欲戰愚謂范文子外懼之說誠有逺見但此說當堅持于未濟河之前既遇楚師則不可中止使晉師先却而楚以乗廣全力蹙之于河能無蹈邲之覆轍乎楚晨壓晉軍而陳晉尚未陳楚陳偪之晉不得出故范宣子欲陳軍中欒武子欲堅壘而待塞井夷竈林注軍屯必鑿井結竈以自給今為楚壓晉軍戰地迫狹故自塞其井自平其竈以為戰地劉寅曰塞井夷竈即項羽沈船破甑持三日糧之意欲専一士心奮勇而戰䖍卜于先君按邲之戰楚為先君宫告成事鄢陵之戰晉䖍卜于先君可證古者出師必載遷廟之主以行皆曰國士在注晉侯左右皆憚伯州犂在楚知晉之情邵寶曰皆曰二字即䝉上伯州犂苗賁皇言之二人各以本國之情告故州犂則以賁皇為國士賁皇則以州犁為國士愚按此服䖍說也較杜氏為順或疑賁皇既言不可當何故下復有必大敗之之說然先稱其强後乃為晉侯畫䇿此亦何不可通耶射其元王中厥目注離為諸侯又為日疏離為諸侯者禮器大明生于東君西酌犧象鄭云象日出東方而西行也說卦離為日故為諸侯蹲甲而射之徹七札焉陸粲曰注不解札義按太𤣥曰比札為甲考工記注革堅者札長疏云一葉為一札戰國䇿身自削甲札注云札木簡之簿者甲之革縁如之有韎韋之跗注詩注韎茅蒐染也茅蒐今茜草賈逵云一染曰韎跗注戎服自要以下注于脚跗諜輅五嫁反之疏諜所以間敵者輕兵覘敵亦謂之諜子在君側敗者壹大我不如子時石首御鄭伯在君側者敗則君亦敗矣故曰敗者壹大唐苟為車右稍逺君矣故曰我不如子葢言分當死也若之何憂猶未弭傅遜曰憂猶未弭謂君薨太子弑杜舍之而以將從子臧為言謬矣子叔聲伯使叔孫豹請逆于晉師注僑如于是遂作亂豹因奔齊傅遜曰昭四年傳云穆子去叔孫氏宿庚宗婦人私為食而宿焉後歸婦人見子豎牛又云適齊娶國氏生孟丙仲壬至宣伯奔齊穆子饋之則豹實先在齊僑如始往故服䖍以為豹此時從齊國佐在師聲伯令人就齊師使豹豹不忘宗國白國佐為魯請逆正義强欲宗杜乃云豹既在齊非復魯臣聲伯安得使之魯人豈更無可使者而必使他國之人耶愚謂豹避兄亂而奔何罪之有其賢必聞于國故聲伯使之且豹必在齊數年而後豎牛為奉雉又娶國氏而生二子亦豈一二年間事此必先奔齊無疑傳逸之耳若豹之使晉不復命而奔齊則為罪大矣果因使而奔傳何以不言服䖍之說得之食使者而後食注使者豹之介疏時豹以僑如之難因逆晉師遂奔齊故惟介反命召叔孫豹于齊而立之按豹先時在齊故僑如奔齊之後即召豹歸魯立為叔孫之後杜以召豹為言其終恐不然十七年使其祝宗祈死邵寳曰膏肓以人生有三命有壽命以保度有隨命以督行有遭命以摘暴未聞死可祈也然范文子祈死而死叔孫昭子祈死而亦死豈冥冥者實有以聴之耶抑適當其數盡之時耶死之不恤而受敵使穆文熙曰欒書之譖郤至其機甚深豈惟厲公中主亦必惑之然鄢陵之役方戰而受敵遺弓亦至有以招之耳仲尼曰鮑莊子之知不如葵葵猶能衛其足陸粲曰䝉衣乗輦之事路人恥之卿大夫知而弗言則奚以正國矣鮑子雖亡足不為病而仲尼顧笑之歟洩冶死曰無自立辟鮑牽刖曰知不如葵立論若此為善者懼矣葢周之衰士不聞義而以苟容為賢又藉口于當時之大人以䕶飾其短者皆是類也是豈可以訓後世耶君盍嘗使諸周而察之周語晉孫談之子周適周事單襄公之孫襄公之孫惠伯談晉自驪姬之譖不畜羣公子故周適周事單襄公抽戈結衽而偽訟者注衽裳際偽為清沸魋訟長魚矯以戈藏于裳際偽與清沸魋訴曲直于郤氏者出郤氏之不意而殺之舊注未分明孟姬之讒吾能違兵韋昭曰違兵者能違其兵難卒存趙氏今未可脅與弑君十八年齊侯使士華免以戈弑國佐于内宫之朝士士官也士官掌刑故使殺國佐疏夫人宫有朝羣妾之處葢齊侯召入與語而殺之師逃于夫人之宫按注云伏兵内宫恐不勝此誰之兵耶國佐自外庭而入必無伏兵之理若以為齊侯恐不勝而伏兵則國佐既誅矣師又何逃焉愚謂國佐自盟徐闗之後不臣之形已著其入内朝也齊侯葢以計誘之佐心懐疑懼必挾其徒衆而入華免揮戈其衆遂蒼黄駭散逃于夫人之宫此亦事理所宜有以為伏兵殆不然矣右行辛為司空疏僖二十八年晉作三行彼云屠擊將右行辛即屠擊之子孫也魏絳為司空疏世族譜魏顆魏絳俱魏犨子顆别為令狐氏絳為魏氏葢顆長而庶絳㓜而適也以塞夷庚按夷庚正義云平道也文選補亡詩蕩蕩夷庚善注夷常也辨亡論旋皇輿于夷庚注引繁欽辨惑吳人以巨海為夷庚皆非書順也十二公中薨𦵏皆得其正者惟成公成公蓋賢君也于其處穆姜安季孟逐僑如見之襄公元年晉師自鄭以鄫之師侵楚焦夷及陳注孟獻子自鄫先歸不與侵陳楚故不書按杜此語不可信疏亦疑之傳云以鄫之師則魯師在内矣凡諸侯即位小國朝之大國聘焉趙汸曰諸侯不服天子之䘮自東遷則然傳初無一語及之于是以朝聘為禮葢無足辨杜云未赴胡云已赴皆其末爾二年于是子罕當國子駟為政疏子駟為政已是正卿知當國者為攝君葢鄭介晉楚之間成公顧命使之當國非常法也官命未改疏言建官命臣悉皆未改不可即違先君陸粲曰官命猶言公命耳疏解非請城虎牢以偪鄭王應麟曰齊晉之覇皆先服鄭范睢李斯之謀皆先攻韓葢虎牢之險天下之樞也在虢曰制在鄭曰虎牢在韓曰成臯虢叔恃險而鄭取之鄭不能守而韓滅之韓又不監而秦并之秦之亡也楚漢爭之在徳不在險信夫三年使鄧廖帥組甲三百被練三千以侵吳疏賈逵謂組甲車士服之被練帛也以帛綴甲歩卒服之馬融云組甲以組為甲裹公族所服被練以練為甲裹卑者所服按甲貴牢固二說皆不愜杜言組甲漆甲成組文今時漆甲有為文者被練不言甲必非甲名故以為練袍被于身上雖並無明證要為近之吳人要而擊之獲鄧廖按是役也傳言楚子重克鳩兹至于衡山一統志衡山在今湖州府城南一十八里即横山楚何以越長江之險深入吳地至此葢子重以鄢陵之敗勢稍不振懼呉之合於中國也故先威吳以制之不知千里趨利必蹶上將軍固兵法之所忌也吳人要其歸路鄧廖就禽此可為越險輕進之戒晉欲修吳好為合諸侯凌稚隆曰晉人以楚强難制而與呉修好使之數反于其内以分楚勢深得事機嗣後漢髙帝令彭越數反梁地為項王害其謀葢本此對曰赤也可大戴禮孔子云國家有道言足以興國家無道黙足以容葢銅鞮伯華之所行觀于四方不忘其親苟思其親不盡其樂葢介山子然之所行也説苑孔子歎曰銅鞮伯華無死天下有定矣晉太康地記銅鞮晉大夫羊舌赤之邑世號赤曰銅鞮伯華按羊舌赤之賢如此而其事不甚著于春秋四年金奏肆夏之三按三夏周禮謂之肆夏韶夏納夏魯語謂之繁遏渠故杜以為一夏而有二名周禮注引吕叔玉云肆夏時邁也樊遏執競也渠思文也劉炫曰杜解未甚當上言文王之三文王是其一大明綿是其二鹿鳴之三鹿鳴是其一四牡皇皇者華是其二然則肆夏之三亦當肆夏是其一樊遏渠是其二若樊即是肆夏何須重舉二名陸子餘以劉說為然三夏天子所以享元侯注元侯牧伯疏元長也牧是州長伯是二伯雖命數不同俱是諸侯之長也周禮大宗伯八命作牧九命作伯鄭司農云牧一州之牧也伯長諸侯為方伯也季孫曰畧傅遜曰杜云不以道取為畧此謬解也姒氏襄妾母文子之意以妾不可僣適故曰畧葢謂簡畧其禮也匠慶以為小君之喪云云文子不敢拒之故以夫人之禮書薨夫子亦因之而不改耳志所謂多行無禮必自及也陸粲曰定姒非守適也季文子不欲成之為夫人不得已於匠慶之諫而猶欲簡於禮焉故請木而微應之曰畧用蒲圃之檟而禁之則嫌於為已也故不禦季孫之志如是而已謂之多行無禮必自及不已過乎伯明后寒棄之疏伯明君此寒國之時棄不收采靡奔有鬲氏杜氏謂靡夏遺臣事羿者眞文忠公辨之云靡忠于王室如此攷其本末乃事相非羿也豈有夏之忠臣而肯靦顔事讐者哉愚按哀元年傳羿既篡夏相奔二斟浞用師伐二斟以滅相靡是時不知何事此傳云家衆殺羿靡方奔有鬲豈靡前此嘗自相而往事羿耶或以羿好田姑事焉而乗其釁以圖之耶不可臆斷存疑可也魏禧曰據傳文夏故臣靡事羿迨寒浞滅羿靡奔有鬲氏以興少康按羿逐后相二十八年而浞殺羿浞篡四十年少康復辟靡當相逐時為夏臣非㓜弱可知身歴羿浞垂七十年然則祀夏配天之日靡當年百歳矣上古雖氣運敦龎然年百歳者亦少靡身事賊臣三十年羿敗而後竄伏草土又四十年靡固有老謀獨不念上壽難倖得此七十年間脫令先少康死則萬世後當與莽大夫唐六臣並列然靡且安然為之何耶哀元年傳說少康之興不及臣靡恐此傳所云未實以滅浞而立少康注少康夏后相之子疏傳言羿代夏政又言在帝夷羿羿必自立為天子矣當是逐出后相羿乃自立相依斟灌斟尋夏祚猶尚未滅葢與羿並稱王也及寒浞殺羿因羿室而生澆澆已長大自能用師始滅后相相死之後始生少康少康生杼杼又年長已能誘殪方能滅浞而立少康計少康失邦及少康紹國向有百載乃滅有窮夏亂甚矣而夏本紀云仲康崩子相立相崩子少康立都不言羿浞之事是馬遷之疎也公曰然則莫如和戎乎愚謂晉悼公英武人也其好田豈滛于原獸者之比不過為諸戎荐居欲一舉滅之所以不忘武事耳魏絳先有和戎一䇿在其胸中恐遽陳吾說未必迎刃而解故以后羿遊田之戒及辛甲虞人之箴層次引入悼公遂恍然悟到和戎然後以五利之說進此納諫英主之法也戎狄荐居疏釋言謂荐再也孫炎曰荐草生之再即荐是聚也服䖍云荐草也言狄人逐水草而居徙無常處劉炫按莊子云麋鹿食荐即荐是草也服說是陸粲曰今按古字荐薦也漢書終軍傳北胡隨畜薦居蘇林曰薦草也國人逆喪者皆髽側􅏨反疏髽字從髟是髪之服也杜用鄭衆說言麻髪合結當麻與髪相半結之檀弓魯婦之髽而弔也自敗于臺駘始也臧之狐裘敗我于狐駘裘古叶渠之切駘釋文徒來反叶音當讀怡五年君子謂楚共王于是不刑劉敞曰傳言壬夫貪則共王殺之當矣何謂不刑解經若此取舍安從哉傅遜曰春秋諸國惟楚英賢最多葢楚親疎參用而執政者皆其公族一有僨事旋即誅死無少貸與晉齊魯諸國殊異所以强大累世而威權畧無下移後之用人者可以監矣六年司武而梏于朝難以勝矣陸粲曰謂不堪司武之任杜注云不足以勝敵非子罕善之如初按注云子罕雖見辱不追忿所以得安服䖍云子蕩之罪大矣子罕初逐之以正國法及子蕩射其門乃復善之如初是為茹柔吐剛非所以守法也此論較杜為優七年夫郊祀后稷以祈農事也按此謂祈榖之郊也祈榖之郊在孟春周為三月月令孟春之月天子乃以元日祈榖于上帝衡而委蛇必折按衡古横字横者不順道也言以横道而為委蛇其人必將毁折子駟使賊夜弑僖公按鄭世家云子駟使廚人藥殺釐公與傳畧同而經不言弑下又書葬王方麓云此與楚子麇書卒楚公子比書弑之類皆當闕疑辨詳集説九年備水器注盆􅧲之屬周禮凌人春始治􅧲音咸去聲令隧正納郊保奔火所疏周禮有遂大夫五縣為遂鄭司農云王國百里内為六鄉外為六遂鄭𤣥云郊内比閭族黨州鄉郊外隣里鄼鄙縣遂異其名者示相變耳尚書費誓魯人三郊三遂亦以郊内郊外别之郊内屬鄉郊外屬遂華臣言具正徒不言其事者以是郊内之民供救火百役即上畜水潦積土塗之類非惟救火若郊保之民既逺故使隨火所起奔往救之直救火而已使樂遄庀刑器注刑器刑書疏鄭鑄刑鼎而叔向責之晉鑄刑鼎而仲尼譏之此言刑器必不在鼎或書之于板號為刑器耳二師令四鄉正敬享注二師左右二師也鄉正鄉大夫也疏周禮鄉大夫屬司徒此鄉正言二師命之者二師分掌其方左右各掌其二鄉也宋大國不過三軍而有四鄉者當時所立非正法宋置六鄉况四鄉乎或食于心或食于咮竹又反以出内音納火疏周禮司爟掌行火之政令季春出火民咸從之季秋納火民亦如之鄭𤣥曰火所以用陶冶民隨國而為之林注建辰之月鶉火星昏在南方則令民放火是謂出火建戍之月大火星不見則禁民放火是謂納火劉用熙曰食于心食于咮猶食邑之食謂封火正于火之分野使掌出納之政令非如注謂死而配食也下云以出納火則不在既死之後又下云火正閼伯居商丘甚明咮為鶉火心為大火疏春秋緯文耀鈎曰咮謂鳥陽七星為頸宋均注陽猶首也栁謂之咮咮鳥首也七星為朱鳥頸也咮星為火之候故于十二次咮為鶉火釋天云大辰房火尾也大火謂之大辰孫炎曰龍星明者以為時侯大火心也在中最明故時候主焉九月則伏在日下始往而筮之遇艮之八疏周易之爻惟有九六此筮乃言遇艮之八二易皆以七八為占故此筮遇八謂艮之第二爻不變者是八也揲蓍求爻繋辭有法其揲所得有七八九六說者謂七為少陽八為少隂其爻不變也九為老陽六為老隂其爻皆變也周易以變為占占九六之爻連山歸藏以不變為占占七八之爻二易並亡不知實然與否賈鄭諸儒相傳為此說者此言遇艮之八下文穆姜云是于周易晉語重耳筮得貞屯悔豫皆八其下司空季子云是在周易並于遇八之下别言周易知此遇八非周易也林注遇艮之八葢艮卦六爻三上以九變初四五以六變得二得八不變此朱文公之說是于周易曰隨元亨利貞無咎疏若一爻獨變則得指論此爻或二爻三爻皆變則毎爻義異不知所從則當總論彖辭故姜亦以彖為言斬行栗疏行道也行栗道上之栗周語云列樹以表道知此行栗是表道之樹三分四軍分四軍為三部杜用鄭衆說也更休送出以逸待勞此制人於不戰者子胥用此法楚於是乎始病大夫門子周禮小宗伯掌三族之别以辨親疏其正室皆謂之門子鄭𤣥云正室適子也文選注門子卿之適子將代父當門者以諸侯復伐之十二月癸亥門其三門啖助曰左云冬十月諸侯伐鄭下又云諸侯復伐之十二月癸亥門其三門葢誤重說也古史或用周正或用夏正作𫝊者承兩國之舊史月數不同遂兩載之王樵曰荀罃欲分兵以敝楚後來三駕即用此䇿也左氏于乃盟而還之下又記晉人不得志于鄭十二月癸亥復伐之門其三門杜氏不悟其誤因云晉果三分其軍各攻一門與前注自相戾閏月戊寅按閏月二字宜依杜氏作門五日葢後人傳寫誤合門五為閏又誤轉日為月耳晉侯以公宴于河上趙汸曰公有適祖母之䘮晉侯不當與宴季武子不能以公固辭皆非禮晉平湨梁之㑹亦與諸侯宴于温諸侯在喪廢禮其來逺矣孔氏謂傳皆無譏則卒哭後得宴樂何其謬歟是謂一終一星終也一終猶今俗語一匝也疏知是歳星者厯書木星三百九十八日行星三十三度十二年而彊一周以先君之祧處之疏天子有二祧諸侯無祧聘禮云不腆先君之祧是謂始祖也諸侯五廟則祧始祖是亦廟也傅遜曰魏鶴山云祧取廟外之兆域為義此說是也周禮守祧云其廟則有司修除之其祧則守祧黝堊之爾雅地謂之黝墻謂之堊非兆域而何愚按祭法逺廟為祧固然魏說亦有據故存之口血未乾而背之疏凡盟用牛牲故襄二十六年傳云㰱用牲又哀十七年傳云諸侯盟誰執牛耳是也其殺牛必取血及耳以手執玉敦之血進之于口定八年傳渉佗捘衛侯之手及腕又襄九年傳與大國盟口血未乾是也輸積聚以貸傅遜曰此委輸之輸杜訓盡也非十年㑹呉子壽夢也注壽夢吳子乗疏十二年吳子乗卒則乗是名也城小而固孫武子城有所不攻張預曰拔之而不能守委之而不為患則不須攻也又若深溝為壘卒不能下亦不可攻如偪陽城小而固荀罃謂勝之不武弗勝為笑是也縣門發聊人紇抉之以出門者疏縣門者編板廣長如門施闗機以縣門上有冦則發機而下之諸侯之士攻偪陽之門已有入者縣門乃發郰人紇抉而舉之以出門者門者謂攻門者也服䖍云抉縣門使舉令下容人出按林注云偪陽人發縣門以閉攻城之士與疏解不同然非也據襄二十六年傳楚子伐鄭門于師之梁縣門發獲九人焉渉汜而歸時鄭以子産之言不禦冦則發縣門而獲九人者乃楚師也林亦主鄭人言與此同失左執之右拔㦸以成一隊林注狄虒彌左手執車輪䝉甲之楯右手自拔一㦸以當一隊之軍㦸長一丈六尺每隊百人親受矢石疏服䖍謂古者以石為箭鏃引國語楛矢石砮為證則猶是矢也何須矢石並言周禮職金國有大故而用金石則掌其令鄭𤣥云用金石者作鎗雷之屬雷即礧也兵法守城用礧石以擊攻者陳思王征蜀論下礧成雷榛殘木碎是也請以桑林注桑林殷樂名疏經典言殷樂為大濩此復云桑林者葢殷家本有二樂如周人之大武象武也或曰湯禱桑林而得雨遂以桑林名其樂魯有禘樂賔祭用之注禘三年大祭則作四代之樂别祭羣公則用諸侯樂疏明堂位季夏以禘禮祀周公于太廟朱干玉戚冕而舞大武皮弁素積裼而舞大夏惟周公之廟得用天子之禮知别祭羣公則用諸侯之樂謂時王所制之樂大武是也然則禘為禮之大者羣公不得與同而賔得同之敬隣國之賔故得用大祭之樂也劉炫曰享賔用樂禮傳無文但賔禮既輕必異于禘魯以享賔當時之失用之既久遂以為常荀偃士匄引過謬之事以諂晉侯使聽宋耳納諸霍人禮也注霍晉邑疏知霍人為霍邑者漢樊噲傳云攻霍人是霍人邑也兆如山陵有夫出征而喪其雄疏繇辭皆韻古人讀雄與陵為韻詩無羊正月皆以雄韻蒸韻陵是也牲用備具按書微子犧牷牲用孔傳云器實曰用觀此傳文牲用明為二事杜獨言犧牲誤騂旄之盟陸粲曰騂赤牛旄旄牛也爾雅有犣牛郭注旄牛也其能來東底乎按說文底下也東底猶後漢馮異傳所云崤底杜訓底為至于此難通十一年各征其軍注三家各征其軍之家屬疏言軍之家屬者丁壯從軍家無所稅其家屬不入軍者乃稅之三子各毁其乗疏往時民皆屬公國有二軍非征伐不屬三子故三子自以采邑之民為己私乗如子産出兵車十七乗之類是私家車乗也今既三分公室所分得者即是己有不須更立私乗故三子各自毁壊舊時車乗部伍分以足成三軍以其役邑入者無征疏役謂共官力役今之丁也邑謂賦稅今之租調也孫琮曰陳氏謀齊以家量貸以公量收誘其民使歸已季氏專魯入者無征不入倍征驅其民使去公奸人竊國權術大畧相類孟氏使半為臣若子若弟叔孫氏使盡為臣邵寳曰于三分得一之中使半為臣臣其子則父歸公臣其弟則兄歸公所謂半也盡為臣則子弟父兄皆歸已矣愚按昭五年傳追說此事云季氏盡征之叔孫氏臣其子弟孟氏取其半焉叔孫臣其子弟不臣父兄謂一家之中取二分而二歸公也孟氏取其半如叔孫所取而又于其中課取子弟之一分半以歸公也彼傳順序此傳倒言之邵解非是司慎司盟疏司慎不知指斥何神但在山川之上知其是天神耳鄭人賂晉侯以師悝師觸師蠲陸氏曰夫子嘗言惡鄭聲恐其亂雅樂樂之雅鄭不别於詩而别於聲其聲中正和平則雅姚冶輕儇則鄭鄭聲靡靡當時尚之如師筏師慧師悝師觸師蠲之徒鄭人往往以之賂列國夫子懼其聲之曼衍蕩人心志而不自知也故復著之戒曰放鄭聲晉悼八年之中九合諸侯覇功之盛莫比焉鄭㑹蕭魚始以師悝等為賂斯其所奏豈非所謂靡靡而蕩人心志者耶悼公自此覇業少衰㑹吳伐秦皆不自行至戚之㑹反為孫氏謀定衛亂或鄭聲之潛移其心志歟魏絳辭金石之樂而規以願思其終有以也夫廣車軘車淳十五乘疏廣車横陳之車軘車屯守之車射禮二算為純一算為竒是淳為耦也廣軘車相耦凡十五乗歌鐘二肆注肆列也縣鐘十六為一肆疏周禮小胥凡縣鐘磬半為堵全為肆此言歌鐘二肆則兼有磬矣無磬不得成肆八年之中九合諸侯疏九合諸侯謂五年㑹戚又㑹城棣救陳七年㑹鄬八年㑹邢丘九年盟戲十年㑹柤又伐鄭戍虎牢十一年同盟毫城北又㑹蕭魚也按齊桓九合諸侯其數不止于九故論語集註定作糾晉悼恰有九㑹晉語以為七合葢不數救陳與戍鄭也藏在盟府注司盟之府疏司盟見周禮司盟之府掌藏功勛典䇿故有賞功之制十二年臨于周廟禮也注周廟文王廟也愚按趙伯循謂魯無文王廟猶周禘無帝嚳廟只是臨禘時設文王主與尸而祭之此周廟杜預以為文王廟與趙說不同據傳文周廟與周公之廟别言之則周廟為文王廟矣鄭祖厲王立所出文王廟知魯亦立文王廟也哀二年蒯聵禱云敢昭告皇祖文王是衛亦立文王廟也郊特云諸侯不得祖天子而魯鄭衛皆立文王廟此後世之失也劉敞曰魯君僭而立周廟三家僭而立公廟左氏謂之禮豈不誤哉凡諸侯之喪異姓臨于外同姓于祖廟同宗于禰廟及姑姊妹疏釋親父之姊妹為姑樊光曰春秋傳云姑姊妹然則古人謂姑為姑姊妹葢父之姊為姑姊父之妹為姑妹列女傳梁有節姑妹十三年孟獻子書勞于廟禮也注告廟飲至書勞三事偏行一禮即書至悉闕乃不書趙汸曰當時諸侯以善事伯主内外無虞為勞績衰世之意也書勞即是書至杜說非使其什吏率其卒乘官屬以從于下軍疏什吏謂十人長也從軍曰卒在車曰乘新軍將佐皆遷其軍内十人之長率其歩卒車士與新軍官屬軍尉司馬之類令下軍將佐兼領之周禮夏官軍制不言什人有長此云什吏者晉人為軍則然使歸而廢其使怨其君以疾其大夫而相牽引也不猶愈乎言鄭使良霄如楚期楚來救以退諸侯之師也今既不能而遣之歸其君與大夫必以奉使無狀廢棄之良霄因此怨恨其君憎疾其大夫牽引令鄭國不和而事晉之心不固豈不愈于久執之乎舊解都不明白十四年昔秦人負恃其衆貪于土地逐我諸戎惠公蠲其大徳賜我南鄙之田疏僖二十二年傳云秦晉遷陸渾之戎于伊川昭九年傳云惠公歸自秦而誘以來此言秦人逐之惠公與田三文不同者此戎本處𤓰州逺在秦之西北秦貪其土晉貪其人二國共誘而使遷僖傳是其實也昭傳主專責晉故指言晉耳子叔齊子注齊子叔老字也陸粲曰叔老公子嬰齊之子不應以父名為字齊是諡也愚謂父名不可為字獨可為諡乎當是二名不偏諱耳秦人毒涇上流孫武子無迎水流張預曰卑地勿居恐决水溉我舟戰亦不可處下流以彼㳂我泝戰不便也兼慮敵人投毒于上流春秋諸侯之師濟涇而次秦人毒涇上流師人多死是也敗公徒于阿澤鄄人執之注濟北東阿縣西南有大澤公徒因敗散還故為公執之疏鄄人為公執公徒之散走者劉用熙曰公雖居鄄鄄人反執公徒言公失民也愚謂公必不安于鄄故復居郲詳當時事勢劉說得之成國不過半天子之軍疏鄭𤣥云方四百里以上為成國若困民之主匱神乏祀按釋文云乏祀本或作之誤也又說苑引此傳文作困民之性乏神之祀或曰古字生性通用豈此乃生字之誤歟范宣子假羽旄于齊而弗歸齊人始貳愚謂晉自悼公之後覇業衰矣實始于齊人之貳晉楚之爭衡也齊秦時倔强其間為晉霸梗秦在西陲晉蔽之害不及諸國齊居山東一與晉異即加兵魯衛而邾莒助之為魯患尤甚士匄乃以一羽旄啟其貳罪可勝道哉十六年書曰㑹鄭伯為夷故也疏特言書曰是仲尼新意舊史當書荀偃在前傅遜曰齊子本㑹荀偃而經特以㑹鄭伯為文列之于諸臣之上不使夷之于諸大夫也按此說于義無取當以陳止齋後傳為正陳義見集說讀左日鈔卷六
