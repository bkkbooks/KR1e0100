body:
  text: 讀左日鈔卷五吳江朱鶴齡撰十二年荆尸而舉荆尸陳法之名莊四年傳楚武王荆尸授師孑焉以侵隨方言云孑㦸也葢參用㦸以為陳法夷于九縣疏九縣莊十四年滅息十六年滅鄧僖五年滅弦十二年滅黄二十六年滅夔文四年滅江五年滅六滅蓼十六年滅庸傳稱楚武王克權使鬬緍尹之又稱文王縣申息凡十一國不知何以言九按春秋時多有滅其國而後復封之如陳蔡之類此十一國中或有先滅後封者故止言九耳先縠佐之注彘季代林父陸粲曰劉炫云傳文皆稱彘子縠非彘季也按晉有士魴稱彘季杜或緣此而譌孔疏以季友季路為比謬矣右轅左追蓐注在車之右者挾轅為戰備在左者追求草蓐為宿備疏兵車一乗甲士三人歩卒七十二人甲士不共卒役所言左右者歩卒為之也兵車一轅服馬夾之而言挾轅者歩卒分左右軍行之時又分之使在兩廂挾轅以為戰備楚陳以轅為主故以轅表車使挾車嚴兵備不虞也其應在左者則使之追求草蓐令離道求草為卧具故云為宿備也此在道時則然至於臨戰必各在車之左右也按詩詁車前曲木上勾衡者謂之輈亦曰轅又周禮車宫轅門注止宿險阻之處當備非常次車以為藩則仰車以其轅表門杜云挾轅為戰備恐亦是此意傅遜曰如注解以車之右左為用則下所謂前後與中者抑亦其車之前後與中耶且一車之中而凡在右者挾轅凡在左者追蓐亦太煩擾矣葢古之為陳者必有前後左右中軍楚亦分軍為五而以右軍專挾轅為戰備左軍專追蓐為宿備前軍專斥堠以慮有無後軍為殿以拒後中軍任權謀出令五軍各有所任部分既定號令齊一杜以楚止三軍故為此解獨不觀晉知罃曰吾三分四軍以逆來者四可分而為三三不可分而為五乎前茅慮無疏茅明也在前者明為思慮其所無之事恐猝有非常當預告軍中使知而為之備也按杜氏解慮無為斥候蹹伏見騎賊舉絳幡見歩賊舉白幡皆與軍人為私號者然此乃假晉制而言不知春秋時如何前茅具二說茅為旌識近之百官象物而動注物猶類也疏類謂旌旗畫物類也百官尊卑不同所建各有其物象其所建之物而行動周禮大司馬中秋教治兵辨旗物之用即其事也以務烈所陸粲曰烈所者功烈之處所也猶民知義所之所衆散為弱川壅為澤有律以如已也故曰律否臧且律竭也陸粲曰坎為衆衆聽于一則彊今變為兊兊少女而弱衆散之象也又坎為川川流則不竭今變為兊兊澤止水川壅之象也葢將帥之貴有法律者能使其下如己之志故謂之律所云順成而臧也否臧則律有不敗乎當讀以如己也故曰律為句盈而以竭夭且不整所以凶也陸粲曰夭且不整亦就行師言之說文夭屈也言其軍法屈而不伸散而不整所以凶也杜注非是惡有所分朱子曰左傳分謗事近世士大夫多如此只要徇人情當時荀林父為主帥先縠違命先濟韓厥乃謂與其專罪六人同之是何等語為林父者只合按兵不動召縠誅之按朱子此論甚正但先縠違命如此豈肯應召况春秋時偏將皆命卿無主將專殺之法改乘轅而北之按太史公列孫叔敖于循吏吾觀城沂之役使封人慮事三旬而成不愆于素知敖之能用衆敖鄗之役南轅反斾繼以伍參之言改乗轅而北之車馳卒奔以乗晉師大敗之又知敖之善用謀也此真相才也夫參特嬖人爾一聞其謀即舍己以從不䕶前不求勝不妬能所以能光輔楚莊而上與子文比烈也聽而無上衆誰適從陸粲曰杜云聽彘子趙同趙括按同括有言在楚師北轅之後此時未也且伍參獨言先縠不仁何嘗及同括乎蓋謂林父之將令不行軍衆欲禀聽進止而無上令不知所從也于民生之不易注于曰也本爾雅一云吁同歎辭廣有一卒卒偏之兩注十五乗為一廣司馬法百人為卒二十五人為兩車十五乗為大偏今廣十五乗亦用舊偏法復以二十五人為承副疏下云楚子為乗廣三十乗分為左右知十五乗為一廣也成七年九乗為小偏所以此為大偏也桓五年二十五乗為偏又不與此相對為大小邵寳曰楚人易古偏法而為廣廣之所有百人故曰一卒亦古偏法也一卒之外又有承副之卒焉其數如偏之兩兩二十五人也車法在古為偏在今為廣葢舉今古錯言之不直言若干人而必曰卒曰偏曰兩者今法不離于古也傅遜曰注云十五乗為一廣而傳云廣有一卒則所謂百人者將分屬于十五乗耶抑别有百人耶又云司馬法十五乗為大偏而傳云卒偏之兩則旣云廣又云偏而二十五人亦何所麗耶杜葢以下文楚子為乗廣三十乗分為左右與司馬十五乗為偏之制同而此偏字又即十五乗為偏之偏故强解之耳愚合下文觀之則廣兵車名楚子即以名其親兵以其兵分為左右二部故名二廣每車用百人故曰廣有一卒其云偏者葢車之半耳五十人為偏以百人四分之一為承副則逸多勞少自精專無廢事矣傳文太簡奥故難通内官序當其夜注内官近官序次也疏為次序以當其夜邵寳曰當夜若今直宿遞持更也與日中之事無與左射以菆注左車左菆矢之善者疏兵車自非元帥皆射者在左御居中央故注云左車左樂伯居左故稱左也下云抽矢菆納諸厨子之房選好矢而留之知菆是矢之善者兩馬掉鞅而還注兩飾也掉正也疏飾無明訓宜是刷刮兩馬訓飾未詳邵寳曰兩馬掉鞅掉兩馬之鞅也葢驂馬車旋則其鞅須掉之而示閒暇之意亦在其中矣陳啟源曰據疏杜解同服說必有本又釋文兩徐云或作􅧇此决非雙兩之義若解為掉兩馬之鞅則傳語為不辭矣士季帥七覆于敖前按前云晉師在敖鄗之間杜氏注敖鄗二山在滎陽縣西北敖山之下平曠可以屯兵蘙薈可以設伏故士㑹設七覆于此車攻詩建旐設旄摶獸于敖即此地也先濟者有賞魏禧曰方楚之逐旃而薄晉林父以先濟有賞鼓于軍中中下軍爭舟不得濟是以大敗吾觀鞌之戰郤克傷于矢流血及屨鼓音不衰遂大敗齊師使林父以先濟之賞賞陷陣之士以鼓先濟者而鼓三軍下令曰楚人薄我我退不得濟必殲于河進而死敵可以生林父請先之如此則士氣必倍有死無二吾未見楚之必勝而晉必敗也士㑹郤克僅殿上軍而不敗况以三軍之衆而不能抗楚乎上軍未動注經所以書戰言猶有陳趙汸曰據傳上軍雖未動下言殿其卒而退是亦未嘗出陳也杜以上軍未動得言戰則言戰為虚名矣葢晉人恥以未陳見敗告諸侯因下軍從荀首獲連尹襄老囚公子榖臣故以戰告也屈蕩尸之注尸止也或曰尸古本作戸按說文戸䕶也半門為戸有止之義漢王嘉傳坐戸殿門失闌免師古曰戸止也嘉掌守殿門止不當入者而失闌入之故坐免左氏傳屈蕩戸之據此尸為戸之誤甚明晉人或以廣隊不能進疏襄十一年鄭賂晉侯以廣車定四年史皇以乗廣死是兵車稱廣不獨楚也此言晉人廣隊下言拔斾投衡軍行則斾在軍前不是車皆有斾也此是晉人在軍前載斾之車楚人惎之脫扄注惎教也扄車兵闌一曰車前横木西京賦車不脫扄薛綜云扄所以旗也傅遜曰兩國交兵乗敵之困執俘獻馘其常也豈有敵車既陷顧教之使脫扄乎教之脫扄已不情馬旋而復教之不尤甚乎脫扄拔斾投衡凡在車者皆能何晉人必待楚人之教乎說文云惎毒也葢楚人見車墜不能進即惎而欲害之晉人脫扄乃免馬旋楚人又欲害之晉人拔斾投衡乃出既出而曰吾軍偶敗非如大國之數奔葢以戲之此于事理甚明且傳于宋之狂佼倒㦸出鄭人以為違禮若楚人以此教晉與狂佼何異而傳獨無譏乎愚按定四年傳管蔡啟商惎間王室哀元年傳惎澆能戒之杜云惎毒也此何獨異訓𫝊說甚有理宜從之有山鞠起弓反窮乎按說文藭香草也韻㑹云今文作穹穹藭江蘺根也江蘺一名蘼蕪其根療頭痛寒痺腹痛左傳鞠窮即藭也司馬相如賦藭菖蒲軍中不得正言故為隠語哀十三年傳若登首山以呼曰庚癸乎與此相類河魚腹疾奈何疏叔展言必須入水故以水厄告之云如河中之魚久在水内則生腹疾無此二物其奈濕何若為茅絰哭井則已疏此亦叔展之言也無社既解意令展視井拯己但廢井必多不可知處故教無社令結茅為絰置於井上又恐無社錯應他人更教之云若號哭向井則是己身已叔展自謂也晉原縠疏按傳先軫或稱原軫此葢先軫之後也上文稱為彘子服䖍以為食菜于彘今復稱原原其上世所食也于時趙氏有原同葢分原邑而共食之十三年清丘之盟唯宋可以免焉疏清丘晉宋衛盟既而衛背盟而救陳晉背盟而不救宋故曰惟宋可免責晉衛也趙汸曰晉景公初年楚方得志于中國晉是時乃以先縠合諸大夫于清丘而稱同盟則豈足以敵楚乎故三國大夫稱人譏在晉也傳不知此義而以不實其言均責三國故復為宋解之歸罪于先縠而殺之盡滅其族張洽曰越椒將攻王楚莊尚思子文而復克黄之所先縠原軫之孫而滅其族葢晉之徳刑皆不足以敵楚矣清丘之盟晉以衛之救陳也討焉金履祥曰邲之師晉亦盍知而懲艾息民修政于國而布徳加禮于諸侯庶為可耳顧汲汲討貳使彘子主清丘之盟且楚方加恩于陳而使宋伐之衛方有恤陳之師而晉又討之遂使宋致楚師而不能救卒亦并宋失之矣豈非謀之不臧所以失霸乎十四年亦使公子馮聘于晉趙汸曰楚子忿晉伐鄭欲伐宋而無名故不假道以起怨其聘于晉亦非好也以怠晉之救宋也投袂而起吕氏春秋楚子方削袂聞之曰嘻投袂而起屨及于室直結反皇疏莊十九年鬻拳𦵏于絰皇注云絰皇冢前闕闕闕門也此作窒彼作絰字異音同未知孰是按孔氏之意葢以窒皇即是絰皇然非也杜氏于絰皇云冢前闕于此云寢門闕分别甚明皇即堂皇之皇凡門有闕者皆得名之窒皇在寢門之内安得有冢乎車及于蒲胥之市邵寳曰寢門之外逺于窒皇蒲胥之市逺于寢門之外屨人進屨追而及于窒皇前此未及屨也劒人進劒追而及于寢門之外前此未及劒也車人駕車追而及于蒲胥之市前此未及車也葢與師之速如此于是有庭實旅百注主人亦設籩豆百品實于庭以答賔疏劉炫曰莊二十年庭實旅百杜云諸侯朝王所陳此聘而獻物亦實百品于庭非謂主人也仲孫勸君行聘惟當論聘義不宜言主之禮修豈慮楚不見報而言此乎十五年築室反耕者注築室於宋分兵歸國示無去志孫武子拔人之城而非攻也張預曰或攻其所必救使敵棄城來援則設伏取之若耿弇攻臨淄而克西安脇巨里而斬費邑是也或外絶其强援以久持之坐俟其斃若楚師築室反耕以服宋是也此皆不攻而拔城之義也華元夜入楚師登子反之牀注兵法因其鄉人而用之必先知其守將左右謁者門者之姓名而利道之華元葢用此術得以自通按杜氏云云兵法所謂用間用諜也然楚之軍政素嚴子反不應疎脫如是公羊傳云楚使子反乘闉而闚宋城宋華元亦乘闉而出見之其說比左氏為有理子反懼邵寳曰子反何為而懼懼華元之脅也盟豈得已哉論者謂華元輕見情實以為非純臣殆非知華元者故文反正為乏許慎説文序蒼頡作書葢依類象形謂之文其後形聲相益謂之字文者物象之本字者孳乳而生是文謂之字也制字之體反正為乏服䖍云言人反正者皆乏絶之道也人反徳則妖災生妖災生則國亡滅乃乏絶之道也冬蝝生饑幸之也趙汸曰秋生螽冬又生蝝經本為一歳再生紀異文偶與下饑相連傳通饑釋之以為幸之也注又以為喜而書之誤益甚矣十六年且為大傅疏天子太傅三公之官也諸侯太傅孤卿之官也周禮典命云公之孤四命鄭衆云上公九命得置孤卿一人春秋晉為伯主侯亦置孤卿文六年有太傅陽子太師賈佗則晉嘗置二孤于是晉國之盜逃奔於秦列子晉國苦盜有郄雍者能視盜之貌察眉睫之間而得其情晉侯使視盜千百無遺一焉晉侯大喜告趙文子文子曰君恃伺察而得盜盜不盡矣且郄雍必不得其死俄而羣盜謀曰吾所窮者郄雍也遂共殘之晉侯聞大駭立召文子而告之曰果如子言郄雍死矣然取盜何方文子曰周諺有言察見淵魚者不祥智料隠匿者有殃且君欲無盜莫若舉賢而任之使教明於上化行於下民有恥心則何盜之為於是用隨㑹知政而羣盜奔秦焉十七年凡太子之母弟公在曰公子不在曰弟凡稱弟皆母弟也疏劉炫曰再言凡者前凡據適妻子為文後凡嫌妾子為君母弟不得稱弟故更言凡也趙汸曰太子之母弟謂適子也適子之生禮雖降于世子而視庶子則有加矣故世子為君適子得稱弟此周制也庶子為君而母弟亦稱弟者時君以同母故優其禮秩使異于他庶子故史亦稱弟此禮之變也十八年欲去三桓以張公室愚謂此時孟獻子季文子皆賢大夫也歸父欲去三桓亦非善謀姜鳯阿云晉徴斷道之盟魯不得不往既受盟魯又不得不修好此歸父所以如晉也使果欲去三桓仗晉以行事則歸父被逐何以不如晉而如齊乎左氏云云恐傳聞非實此說得之使我殺適立庶以失大援者仲也夫大援謂晉也行父不欲事齊故云然按傳文明是行父忌歸父之寵而追治其父襄仲之罪時宣公已没故昌言于朝而無忌耳遂逐東門氏王樵曰行父始與襄仲同謀以成宣公之篡後因歸父欲去三桓又假殺適立庶之說以逐東門氏季氏不臣之跡于此見之矣臧孫許身為司寇陽怒而不力爭反代為逐之謂非季孫私黨吾不信也陸粲曰許者季氏之孚也始則陽為正言以微立異同繼而曰許請去之則其本情著矣自昔强臣欲除異己者未始不有奸人左右之是故臧孫奰怒東門遣陽畢造謀欒逞族陳豹獻佞闞止誅卒皆以闕翦公室而潛移國命吁可畏哉成公元年為齊難故作丘甲袁黄曰周禮鄉遂之民以五起數一家出一人為兵萬二千五百家為鄉故萬二千五百人為軍六軍凡七萬五千人都鄙之民以四起數七家出一人為兵王畿千里六十四萬井出車萬乗萬乗凡七十五萬人大國三軍千乗凖此計之自晉惠公作州兵則二千五百家成一軍而一鄉一軍之法廢矣魯成公作丘甲則一丘十六井出一乗而一甸一乗之法亡矣按此說丘甲依杜氏注胡氏非之說州兵亦與注疏不合姑存之備考二年辭請曲縣繁纓以朝注曲縣軒縣也鄭氏曰樂縣謂鐘磬之屬縣于筍簴者軒縣去南面避王也其下有判縣去北面又有特縣縣于東方或階間而已周禮巾車掌王之五路天子諸侯皆有繁纓之飾鄭氏云樊讀鞶带之鞶今馬大带也纓今馬鞅也玉路金路象路其鞶及纓皆以五采罽飾之卻子使速以徇吿其僕曰吾以分謗也韓非子郤子之言不可不詧也非分謗也韓子之所斬若罪人則不可救救罪人法之所以敗也法敗則國亂若非罪人而勸之以徇是重不辜重不辜民之所以起怨也起怨則國危郤子之言非危則亂不可不詧也且韓子所斬若罪人郤子奚分焉若非罪人則已斬之矣而郤子乃至是韓子之謗已成也郤子曰以徇不足分斬人之謗而又生徇之謗是何言分謗也昔者紂為炮烙崇侯惡來又曰斬渉者之脛也奚分於紂之謗且民之望於上也甚矣韓子弗得且望郤子之得之也今郤子俱弗得則民絶望於上矣故曰郤子之言非分謗也益謗也且郤子之往救罪以韓子為非也不道其所以為非而勸之以徇是使韓子不知其過也夫下使民望絶於上又使韓子不知其失吾未得郤子之所以分謗者也桀石以投人呉澂老子注用兵示弱者謀深敵輕而玩之故勝恃强者慮淺敵懼而備之故不勝兵法始如處女敵人開戸示之弱也後如脱兎敵不及拒斯能勝之矣秦師過周超乗三百竟敗于崤齊兵入晉桀石投人竟敗于鞌此恃强不勝之驗也三周華不注水經注濟水又東北逕華不注山虎牙桀立孤峰刺天青崖刺發望同點黛山下有華泉左傳逢丑父使如華泉取飲即此水也留青日札左傳華不注人皆讀入聲誤也伏琛齊記引摯虞畿服經不作跗得之言此山孤秀如華跗之注于水太白詩昔我遊齊都登華不注峰兹山何峻秀綵翠如芙蓉此其證也韓厥俛定其右注俛俯也車右被射仆車中故俯安隠之疏言此者為下丑父與公易位由厥之俯故不覺其易綦母張葢助厥定右故並不見之也丑父寢于轏中注轏士車疏轏與棧同周禮士乗棧車按丑父寢轏中以下是叙戰前一夕事葢丑父卧轏車中擊蛇肱傷及旦而隠匿之仍為車右故不能推車為韓厥所及若是戰日方為齊侯車右安得寢于轏車中耶丑父寢轏之上疑有闕文丑父使公如華泉取飲酉陽雜俎華不注泉齊頃公取飲處方員百餘歩北齊時有人以䋲千尺投石試之不窮石出赤如血齊侯免求丑父三入三出按齊世家云郤克舍丑父丑父遂得亡歸齊是時丑父已脫歸齊而齊侯不知故出入晉軍以求之也楯冒之以入于衛師愚謂楯所以捍敵者狄卒皆抽戈欲犯齊侯齊侯冒之以楯而復入于衛師衛師不敢犯故齊侯得免也杜氏注欠分明齊侯使賔媚人疏經書齊侯使國佐如師故知賔媚人即國佐也賔媚人未詳是何等名號按定九年傳齊侯致禚媚杏于衛注云三邑在齊西界可證媚乃齊邑媚人邑大夫時使之接對賔客故云賔媚人耳盡東其畝注使壟畝東西行按晉師至齊必渡河經齊之西境故齊之耕者遷其壟畝于東留西隅以便晉之驅驅侵注西字衍文耳物土之宜而布其利陸粲曰物土之宜猶後傳物土方之物物相也相土之所宜使之或南或東也杜注播殖之物各從土宜非是五伯之霸也孫復曰周禮九命作伯得專諸侯孟子所謂五霸者伯也李泰伯持此說顧炎武曰有三代之五伯有春秋之五伯杜氏左傳注夏伯昆吾商伯大彭豕韋周伯齊桓晉文是三代之五伯也趙岐孟子注齊桓晉文秦繆宋襄楚莊是春秋之五伯也二說不同據國佐對晉人言其時楚莊之卒甫二年不當遂列為五亦不當謂繼此無伯而定于五也其通指三代無疑國語祝融能昭顯天地之光明其後八姓昆吾為夏伯大彭豕韋為商伯莊子彭祖得之上及有虞下及五伯李軌注彭祖名鏗堯臣封于彭城歴虞夏至商年七百歳是所謂五伯者亦商時也國佐以前其有五伯之名也久矣若孟子稱五霸而以齊桓公為盛則止就東周以後言之如嚴安所謂周之衰三百餘嵗而五伯更起者也然趙氏以宋襄並列亦未允宋襄求霸不成傷泓以卒未嘗霸也史記言越王勾踐遂報强吳觀兵中國稱號五伯子長在臺卿之前所聞異辭然則言春秋五伯者當列勾踐而去宋襄斯得之矣愚謂五伯者當以杜預説為正穀梁傳交質子不及二伯是周時止有二伯也宋襄不成伯秦穆止霸西戎耳楚莊則以夷猾夏而乃與桓文並列哉孟子注所云五霸乃俗儒陋説杜氏注五霸本於應劭風俗通當以此為定論公㑹晉師于上鄍陳傅良曰傳言四卿要公故不書上卿之㑹杜云史闕非司馬司空輿師侯正亞旅皆受一命之服按周禮大夫再命此司馬司空皆一命者春秋之時其事異于周禮故大夫一命用蜃炭疏周禮掌蜃掌共闉壙之蜃鄭注以蜃禦濕也又掌炭掌灰物炭物之徴令劉炫云用蜃炭者用蜃復用炭也是天子蠻殺御叔弑靈公戮夏南出孔儀喪陳國列女𫝊夏姬美好無匹内挾伎術老而復壯三為王后七為夫人公卿爭之莫不迷惑失志姚寛曰徴舒弑靈公姬當四十餘歳乃魯宣十一年至巫臣竊以逃晉又相去十餘年後又生女嫁叔向計其年六十餘矣而尚能有孕姬凡九為寡婦當之者輒死宇文士及粧臺記序云春秋時有晉楚之諺曰夏姬得道雞皮三少彭名御戎蔡景公為左許靈公為右疏此王車雖行王身不在故不立戎右使御者居中令蔡許二君居王車上當左右之位若夾衛王然卿不書匱盟也陳傅良曰傳釋六國之大夫皆書人以其從楚也按匱乏也于文反正為乏未有職司于王室林注鞏朔為上軍大夫名位卑微未達于王室按大國三卿其二卿命于天子觀此語則當時周禮尚未全廢三年次國之上大夫至下當其下大夫永嘉徐氏曰此臧宣叔之言禮記王制刺取為說葢春秋時士大夫以為大國之卿當小國之君藉口周制如此故每以臣而敵君偃然主盟㑹而不辭于是垂隴之㑹三國之君在焉而士縠專之新城之盟七國之君在焉而趙盾專之未幾而棐林之師以四國之君令晉大夫而敵齊侯湨梁之盟以大夫而傲其君皆始于大國之卿當小國之君之說也而君臣之分紊矣國雖有大小君臣之分豈可紊哉左氏所言乃當時之失周初班爵五等必不然君為婦人之笑辱也宣十七年傳郤克徵㑹于齊頃公帷婦人使觀之郤子登婦人笑于房獻子怒先歸謀伐齊注跛而登階故笑之穀梁𫝊蕭同叔子處臺上而笑之五年山有朽壤而崩壤國語作壊按壤壊二文相近故有譌然說文釋崩亦曰山壊也六年說欲襲衞伯宗曰不可葉夢得曰傳文與經絶不類晉伯宗為主帥不應不見于經且夏陽說合衛師侵宋而反欲侵衛亦首尾自相戾合依經文沃饒而近盬注盬鹽也猗氏縣鹽池是説文盬河東鹽河東鹽池袤五十一里廣七里周百一十六里盬雖是鹽獨此池之鹽名為盬也周禮作苦鹽直用不凍治散鹽䰞之其惡易覯傅遜曰惡即下汾澮以流其惡之惡杜以為疾疹字同訓異何也據獻子言沉溺重膇之疾猶在墊隘之後不應于此遽云其疾易成又按爾雅訓覯為見其惡易見言水淺故垢穢易見耳民愁則墊隘陸粲曰墊隘孔疏言地之下濕狹隘此正訓也或疑此傳文有誤當作易覯則墊隘墊隘則民愁于文理為順近寳公室乃貧林注國近寳則民皆逐末而不務本貧富不等富者不可増稅貧者易致流亡公室所由以貧也按林解最明盤庚去耿遷殷不取沃饒之利亦此意以申息之師救蔡一統志今汝寜府信陽縣古申伯國唐為申州春秋時為息侯國林之竒曰楚以申息為經營中國之本故三軍二廣不常出大抵用申息之師僖二十五年以申息之師戍商密二十八年敗城濮曰其若申息之老何成六年以申息之師救蔡其後囊瓦敗申息之師于桑隧昔宣王之世申伯實以王舅為南國之屏翰所以扞城王室秦漢之時南陽為要地故楚有圖北方之志其君恒居于申大合諸侯亦在焉武子曰善鈞從衆陳禹謨曰夫人三為衆固也如以常情論莫衆于八人而三人為少不欲戰者三人而惟是之從不幾違衆乎不知此正其善從衆也蘇子曰從衆者非從其口之所欲言而從其心之所不言而同然者是真從衆也武子得之矣鄢陵之役不欲戰者惟范文子而郤至不能從卒以貽其内憂彼葢知從衆而不知從善也七年以兩之一卒適吳舍偏兩之一焉注司馬法百人為卒二十五人為兩車九乘為小偏十五乗為大偏葢留九乗車及一兩二十五人令呉習之邵寳曰言一卒必曰以兩者謂乗車之卒也巫臣以車卒百人適吳故曰兩之一卒于其中舍二十五人于吳偏偏法也兩之一一兩也傅遜曰如杜解則卒大于兩傳當言卒之一兩不當言兩之一卒也下偏兩之一傳當言偏兩皆一不當言偏兩之一矣今順文觀之則所云兩者即車也漢書注輪轅兩兩而耦故曰兩詩所云百兩孟子所云三百兩非指二十五人為兩也楚廣之制車用百人故云以兩之一卒其云舍偏兩之一者葢車之半邊為偏每偏有二兩共五十人今留二十五人非偏兩之一而何若泥司馬法之偏兩便難解矣孔氏疑傳文有誤今從傅說文義似順而于二十五人為兩之解亦可通教吳乗車玉海陳祥道曰古之用兵也險野人為主易野車為主險野非不用車而主於人易野非不用人而主於車車之制動則足以衝突止則足以營衞將卒有所芘兵械衣裝有所齎鄭魚麗之陳先偏後伍伍承彌縫邲之戰楚君之戎為二廣廣有一卒卒偏之兩楚巫臣以兩之一卒適吳舍偏兩之一焉考之周禮五伍為兩四兩為卒司馬法二十五人為兩百人為卒卒兩則人也偏則車也杜預云十五乗為大偏九乗為小偏其尤大者有二十五乗之偏則鄭魚麗之偏二十五乗之偏也楚二廣之偏十五乗之偏也巫臣所舍之偏九乗之偏也先偏後伍伍從其偏也卒偏之兩兩從其偏也先其車足以當敵後其人足以待變則古者車戰之法畧可知也吳利舟檝非得車騎之用不可通於上國巫臣以此强呉卒亦以此䘮吳蠻夷屬于楚者吳盡取之林之竒曰楚人禦呉以江故用舟師吳人撓楚以淮故用車戰吳伐巢伐徐淮西也入州來淮北也吳楚爭淮自此始自雞父之師一敗而吳得入州來滅巢及鍾離矣是則亡郢始于入淮八年晉討趙同趙括武從姬氏畜于公宫注莊姬晉成公女趙朔妻朔盾之子也疏史記趙朔娶晉成公姊為夫人按傳趙衰嫡妻是晉文公女若朔妻成公姊則亦文公女父之從母不可為妻且文公之卒距此四十六年莊姬此時尚少不得為成公姊也賈服先儒皆以為成公女故杜從之史記又稱屠岸賈有寵靈公此時為司冦追論趙盾弑君之事殺趙朔趙同趙括而滅其族按成二年傳鞌之戰欒書將下軍則于時朔已死矣同括為莊姬所譛至此年見殺趙朔不得與同括俱死也是時晉君明諸臣强無容有屠岸賈輒厠其間如此專恣又說云公孫杵臼取他兒代武死程嬰匿武山中居十五年因晉侯有疾韓厥乃請立武為趙氏後與左氏違背馬遷妄說不可信也愚考左𫝊原屏之殺實莊姬為之非由屠岸賈也且莊姬畜子武于公宫則武無亡匿之事矣莊姬既畜武而朔客程嬰又持其子匿山中將有二趙武乎只此一端史記之謬顯然若夫莊姬之非成公姊趙朔之不與同括偕死孔氏疏已辨之矣又考趙武朔之子也趙朔之死經傳不載史記晉景公三年屠岸賈追討趙盾弑君之罪攻趙氏于下宫殺朔朔妻有遺腹走匿公宫此當是實傳云武從姬氏畜于公宫以其田與祁奚乃追序殺朔時事不在討同括時也不然莊姬譛殺同括與朔何與而乃誅及其子乎王樵曰據左傳則趙氏之禍由莊姬據史則趙氏之禍由屠岸賈其說牴牾不可合余嘗深考之則屠岸賈弑趙朔自一事也趙莊姬譛殺同括又一事也觀鄭人追討歸生弑君之罪斵其棺而滅其族則屠岸賈之事安可謂無乎崔杼弑君崔慶黨之滅崔慶之族者盧蒲嫳及莊公之嬖人盧蒲癸王何也屠岸賈亦猶是矣但史記謂同括及嬰同見殺于下宫之難則傳聞之訛耳至于趙武畜于公宫則左氏史記脗合葢朔死于下宫之難盾之系幾絶而盾之異母弟同括嬰專趙氏之政嬰通莊姬同括因而逐之然中心未必不出于争權故内則莊姬怨之而行其譛外則欒郤成之而為之徴趙武之匿始則虞屠岸賈之害終則以武之尚存必非原屏利故從姬氏畜于公宫及原屏既死韓厥始言于公而立之事之本末如此唯或思或縱也陸粲曰有思啟封疆者有縱弛不設備者故得兼并以成大國勇夫重閉况國乎按巫臣之為莒慮非愛莒也懼莒之不戒折而入于楚也觀明年楚遂入莒可見九年稱太子抑無私也疏稱太子少小之事以明己之至誠無所私也十年居肓之上膏之下注肓鬲也心下為膏杜注本賈逵之說傅遜曰考素問刺禁論鬲肓之上中有父母楊上善曰心鬲上為肓心為陽父也肺為隂母也愚謂鬲者隔也自鬲以上皆心肺潔清之屬自鬲以下皆腸胃汙濁之屬故晉人言酒有鬲上鬲下之分是心在上鬲在下固已而心下有微脂為膏鬲上有薄膜為肓素問痺論云熏于肓膜注云肓膜謂五臟之間鬲中膜也此正與心下之微脂相對者二豎居膏肓之上下則于腑臟畧無所係為至虚之處非經絡所闗故攻之不可達之不及藥不至焉也今韻書釋肓皆云心上鬲下其謬甚矣饋人為之為之注疏讀如字言治麥食也十一年聲伯以其外弟為大夫而嫁其外妹于施孝叔按此外弟外妹是謂出母之子女先嫁管子夷所生者與舅之子曰外兄弟不同氏族考魯惠公之子尾字施父其孫以為氏又有少施氏愚按禮記有少施氏孟子有孟施舍即此施氏也趙岐孟子注孟姓施發語辭本誤而集注因之失之未考也十二年盟于宋西門之外按此傳與經不合疑傳文有誤劉原父王方麓已辨之詳集說金奏作於下金奏肆夏本天子享元侯之樂而又作之于地下無禮甚矣故詩曰赳赳武夫公侯腹心按舉詩之正以駮亂義詩言治世則武夫能合徳諸侯外為扞城内制其腹心陸粲曰所引二詩分屬治亂上文云及其亂也畧其武夫以為腹心股肱爪牙即繼之以此詩則所謂公侯腹心者非治世之美詞矣古人引詩大率斷章取義杜亦云春秋傳引詩不與今說詩者同此乃為舉詩之正以駮亂義得毋與前指異乎愚謂杜此注全與引詩意相反恐是下文天下有道三句注語誤置之此耳疏晉楚世為仇敵嘗有相害之心故郤至言世治則自守世亂則相侵以答一矢相加遺之語十三年殄滅我費滑注滑國都于費今緱氏縣括地志緱氏故城古費城在緱氏縣東南二十五里即滑國顧炎武曰春秋時有兩費其一成十三年殄滅我費滑注云滑國都于費今緱氏縣襄十八年楚蒍子馮公子格率鋭師侵費滑葢秦滅滑後遂屬鄭耳其一僖元年賜季友汶陽田及費齊乗云費城在費縣西北二十里魯季氏邑按隠元年已有費伯字庈父豈即此費後以之封季友歟白狄及君同州君之仇讐而我之昏姻也注季隗廧咎如赤狄之女也白狄伐而獲之納諸文公陸粲曰經傳書赤狄白狄皆標其號文公所奔之狄傳不言赤白此杜臆說耳孔氏云未必晉于白狄别無昏姻獲秦成差及不更女父注不更秦爵疏此傳有不更女父襄十一年有庶長鮑庶長武春秋之世已有此名葢後以漸増之商君定為二十非商君盡新作也按秦爵二十等四不更十左庶長十一右庶長見漢書春秋之時秦楚皆不從周制故官名與諸國不同十四年先君宗卿之嗣也疏世本孫氏出于衛武公至林父八世春秋之稱微而顯只言春秋之善所以可稱者云耳非杜氏權衡之說讀左日鈔卷五
