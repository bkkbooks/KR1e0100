body:
  text: 讀左日鈔卷二吳江朱鶴齡撰八年治兵于廟劉氏譏廟中非治兵之所按孔疏云治兵于廟者告于廟習于巷也但傳終未盡仲慶父請伐齊師疏公子慶父氏曰孟氏傳文實然而經稱仲孫杜無明釋八年傳稱仲慶父舉諡稱之則謂之共仲蓋慶父雖為庶長而以仲為字至後子孫以字為氏是以經書仲孫時人以其庶長稱孟故傳稱孟孫其以諡配字而謂之共仲猶臧僖伯管敬仲之類也奉公子糾來奔注子糾小白庶兄程子以小白為兄子糾為弟朱子從之愚按左傳注子糾實小白庶兄薄昭與淮南王書曰齊桓殺其弟以反國程子據此以糾為小白弟然荀子謂桓公殺兄越絶書謂管仲臣於桓公兄公子糾皆與昭不合黃楚望云春秋立子以貴子糾母魯女魯女貴班在衛上明子糾當立考史記襄公次弟糾奔魯其母魯女也管仲召忽傅之次弟小白奔莒鮑叔傅之其母衛女也有寵於僖公觀兩次字兄弟之序可見矣又按經書齊小白入於齊則小白固宜有齊者也小白曷為宜有齊也小白不立則管仲不相管仲不相則周室日卑不胥天下而夷狄不止夫子既恕管仲之不死安得不恕桓公之得國若夫子糾之為兄歟為弟歟固所不必論矣九年桓公自莒先入史記雍林人殺無知議立君髙國先召小白於莒魯聞無知死亦發兵送子糾而使管仲别將兵遮莒道射中小白帶鈎小白徉死管仲使人馳報魯魯送糾者行益遲六日至齊則小白巳入高徯立之是為桓公桓公之中鈎徉死以誤管仲已而載溫車中馳行有髙國內應故得先入立發兵拒魯按左氏載桓公入齊事太略應據此補之召忽死之管仲請囚馮時可曰管子大匡篇齊使至魯魯君乃束縛管仲與召忽仲謂忽曰子懼乎忽曰何懼乎令子相齊之左必令忽相齊之右雖然殺君而用我身是再辱我也子為生臣忽為死臣忽也知得萬乘之政而死公子糾可謂有死臣矣子生而霸諸侯公子糾可謂有生臣矣死者成行生者成名子其勉之乃行入齊境自刎而死管仲遂入君子聞之曰召忽之死也賢其生也管仲之生也賢其死也此文必出於戰國以後其中亦有與左氏小異者左氏云殺子糾於生竇生竇魯地而大匡以忽為行入齊境自刎夫魯人從鮑叔之請必殺糾於國召忽必以是時俱死若行入齊境而死非忽所以致命也左氏以忽死而仲囚大匡以仲忽俱縳而忽死顧忽能死則必不縛忽甘縛則必不死又鮑叔之稱夷吾於公也左氏以為管仲已至堂阜大匡則謂言於未召之前愚謂鮑叔慎者也其以身使魯知必不預言也由此言之左氏之文尚未逺於春秋而大匡逺矣使相可也史記桓公既得管仲與鮑叔隰朋高徯同修國政連五家之兵設輕重魚鹽之利以贍貧窮祿賢能齊人皆悅按管仲治齊事詳在齊語故內傳不及亦應據此補之按內政之法五鄉一師萬人為一軍比之周制萬二千五百人為軍者誠簡便矣故曰桓文節制之師十年一鼓作氣再而衰三而竭張預曰氣者戰之所恃也敵人新來而氣盛則且以不戰挫之俟其衰倦而後擊故彼之鋭氣可以奪也曹劌言一鼓作氣者謂初來之氣盛也再而衰三而竭者謂陳久而人倦也蒙臯比而先犯之公從之大敗宋師于乘丘注臯比虎皮疏禮記武王倒載干戈蒙以虎皮名之曰鞬櫜字或作建臯故服虔引以解此他書未聞檀弓云魯莊公及宋人戰于乘丘縣賁父御卜國為右馬驚敗績公隊佐車授綏御與車左右皆死之與此不同孔氏謂記言為妄陳氏曰記不過言公車敗而已易車之後因二士死敵遂大敗宋師乃與春秋傳互相發明戰幾敗復勝如韓原之戰幾獲秦伯後世如此者多矣經有不悉書傳或不能備不可以檀弓所載與經傳不合即云記妄也十一年宋師未陳而薄之吳子凡敵有不卜而與之戰者陳而未定舍而未畢行阪涉險半隱半出如此者擊之勿疑臧孫達曰臧孫達見桓二年氏族考魯孝公之子公子彄食邑于臧因以為氏世本達生伯氏瓶瓶生文仲辰三桓之先臧氏展氏為魯世卿十二年蕭叔大心按蕭邑大夫字叔名大心杜以叔為名非也趙汸曰疏云以此年有功宋人以蕭邑别封其人為附庸今按昭十一年傳申無宇曰宋蕭亳實殺子遊時蕭為宋邑莊二十三年蕭叔無爵而稱朝知是附庸國也十四年諸侯伐宋趙汸曰經文已序則傳皆稱諸侯經總稱諸侯則傳為序列意與日月互見同傳瑕殺鄭子鄭子子儀也趙汸曰殺鄭子不書者魯人始終君突自鄭忽復歸後鄭歷三君皆不通於魯故鄭伯入國經不書人之所忌其氣焰以取之傅遜曰言子儀所畏忌者其氣方焰焰而盛故蛇妖應之蓋謂厲公也杜氏注似以氣焰屬忌人者言夫忌人則其氣怯矣何焰焰之有厲公入遂殺傅瑕太史公曰語有之以權利合者權利盡而交疏傅瑕是也傅瑕雖以劫殺鄭子納厲公厲公終背而殺之此與晉之里克何異按鄭厲之殺傅瑕晉惠之殺里克以其二也衛獻之殺寧喜以其專也此三君者信無君人之道矣而三臣反覆不免誅夷亦可為賣國之戒繩息媯注繩譽也按説文作譝戲曰靳譽曰繩古語如此疑是方言秋七月楚入蔡趙汸曰蔡哀侯在楚而蔡人會于北否此荆所以人蔡也傳以為由息媯故蓋采輯小説舉其細而遺其大十六年鄭伯殺公子閼注祭仲黨疏按隱十一年鄭有公孫閼距此三十五年不容復有公子閼若非閼字誤則子當為孫王使虢公命曲沃伯以一軍為晉侯詩疏左傳桓八年王使立緡于晉至莊十六年王使虢公命曲沃伯為晉侯不言滅晉之事晉世家晉侯緡立二十八年曲沃武公伐晉滅之盡以其寶器賂周釐王王命曲沃武公為晉侯蓋虢公命晉侯之年始併晉未命晉之前有使適晉晉大夫就之請命無衣之詩所由作也吕祖謙曰以史記左傳考之平王二十六年晉昭侯封成師于曲沃專封而王不問一失也三十二年潘父殺昭侯欲納成師而王又不問二失也四十七年曲沃莊伯弒晉孝侯而王又不問三失也桓王二年莊伯攻晉王不能討反使尹氏武氏助之及曲沃叛王王尚能命虢公伐曲沃立晉哀侯使其初師出以正豈至此乎四失也十三年曲沃武公弒晉小子侯明年王猶能命虢仲立哀侯弟緡于晉又明年猶能命虢仲芮伯梁伯荀侯賈伯伐曲沃至是武公篡晉僖王反受賂命為諸侯五失也由此觀之禮樂征伐移于諸侯降于大夫竊于陪臣有自來矣惠王立而復之注魯莊三年經書葬桓王自此以來周有莊王又有僖王崩葬皆不見經傳王室微弱不復能自通于諸侯故傳因周公忌父之事而見惠王惠王立在此年之末趙汸曰經書葬桓王後王人救衛王姬歸于齊則莊王也單伯會伐宋會諸侯于鄄命曲沃伯為晉侯則僖王也虢公晉侯鄭伯使原莊公逆王后于陳以後皆惠王事杜云王室微弱不能自通于諸侯非也十九年鬻拳可謂愛君矣自古無此諫法左氏目為愛君安可訓乎東萊謂不幸為楚子所誅則陷于惡逆斯篤論也魏禧曰楚子伐黃而黃敗乃鬻拳之幸使黃人乘楚之敗而勝之楚師再衄則拳雖欲死其何以為死耶衛師燕師伐周譙周曰燕與子頽逐惠王乃南燕姞姓也世家以為北燕失之按史記正義云南燕滑州胙城南燕伐以與周近也若北燕則逺且春秋時亦不著觀昭三年春秋特書北燕伯欵可見二十一年闕西辟注闕象魏也疏辟是旁側之語服虔云西辟西偏也鄭伯由是始惡于王疏鄭伯謂厲公子文公也按傳文鄭伯享王是五月以前事至虢公請器則厲公巳沒林注以始惡于王屬厲公非也惡讀如字即周鄭交惡之惡二十二年在其子孫史記正義六四變內卦為中國外卦為異國又內卦為身外卦為子孫故知在子孫也猶有觀焉故曰其在後乎疏觀者視他之辭賔王之事若筮者身自當有則不應觀他此卦猶有觀焉觀非在已之言其人觀他有之故知在其子孫也風行而著于土疏巽在坤上故為著土著直略反林注風動物也故行而著于土明不在本國若在異國必薑姓也史記正義六四變此爻是辛未觀上體巽未為羊巽為女女乘羊故為薑薑齊姓故知在齊物莫能兩大陳滅而後田齊興杞滅而後于越興虞滅而後吳興所謂物莫能兩大其後亡也成子得政按如此占易都似事後追敘語不能不疑朱子則謂太史之占陳氏子孫設為之辭以欺世如符命之類爾又合閔元年畢萬筮仕傳觀之知左氏傳春秋者必春秋季年人物所以追論成敗多附會之辭二十三年晉桓莊之族逼獻公患之按晉自桓叔封曲沃子莊伯代立獻公之祖也金履祥曰晉自桓叔莊伯奪宗故獻公亦忌其族之聚而殺之桓莊之裔無遺天道亦可畏矣二十四年女贄不過榛栗棗修以告虔也疏栗取其戰栗也棗取其早起也修取其自修也惟榛無説蓋以榛聲近虔取其虔于事也煅脯加薑桂曰修二十五年夏六月辛未朔日有食之鼓用牲于社非常也傅遜曰此與昭十七年夏六月朔日食事同而彼此異議故注以置閏失所言之陸子餘闢其謬劉敞曰日食變之大者雖非正陽之月豈可安而視之春秋所以書譏其不鼓于朝乃鼓于社又用牲爾二十六年晉士蒍為大司空趙汸曰傳見晉變周制僭王官孔氏云言大司空明任以卿也直言司空者是大夫即司空亞旅皆受一命之服是也晉自文公以後卿以軍將為名司空非復卿官故文二年司空士縠非卿也成十八年傳曰右行辛為司空使修士蒍之法雖則非卿其職掌同二十七年秋虢人侵晉冬虢人又侵晉史記晉獻公九年羣公子既亡奔虢虢以其故再伐晉弗克二十八年大戎狐姬生重耳注大戎唐叔子孫别在戎狄者按晉語云狐氏出自唐叔狐伯行之子實生重耳杜氏本此為説小戎子生夷吾注小戎允姓之戎子女也傅遜曰傳云允姓之戎居于瓜州自惠公始誘以來則獻公時未必即薦女于晉上狐姬稱姓子亦當是其姓也杜引允姓之戎恐未然賂外嬖梁五與東關嬖五二五如今人稱行也蓋狎昵小人之稱使言于公曰穆文熙曰以驪姬之愛幸而其讒猶假二五為之蓋言不由已則可從中贊決使獻公不疑從之易易耳國語又有優施通于姬其人愈下其謀愈深蓋女子小人未有不廣樹其黨而能亡人之國者使俱曰狄之廣莫于晉為都凌稚隆曰廣莫謂曠絶即曲沃與蒲屈也言章君之功伐使人皆曰狄人曠絶之地今皆為君都邑因獻公喜功好大故以此歆之杜注以使俱為復使二五俱説此美非也楚令尹子元陳傅良曰子元不稱人楚未有大夫也趙汸曰中國有伯則楚君大夫將皆稱人經變文也欲蠱文夫人注文王夫人息媯也息媯儘聰明只欠息侯一死楚文沒而子元即欲蠱之亦窺其不能死耳下御人乃夫人侍人即為子元通蠱者縣門不發楚言而出杜牧曰敵來攻我我不與戰設權變以疑之使敵人疑惑不決不敢與我戰若楚人伐鄭鄭縣門不發效楚言而出楚師不敢進而遁亦其義也三十二年為管仲也注公為管仲城私邑按榖乃魯邑非齊之榖也辨詳集説虞夏商周皆有之國語內史過曰夏之興也祝融降于崇山其亡也回祿信于黔隧商之興也檮杌次于巫山其亡也夷羊在牧周之興也鸑鷟鳴于岐山其衰也杜伯射宣王于鎬是夏商周之所有也國語不言虞未詳其至之日亦其物也亦其物也言所享之物亦如其所至之日如甲乙日降則祭先脾玉用蒼服尚青之類能投蓋于稷門按杜云蓋覆也自投而反覆于門上此解本可疑劉炫規杜云投車蓋過于稷門似得之成季奔陳注出奔不書國亂史失之陳傅良曰奔非其罪雖我公子為命大夫亦不書閔公元年滅耿滅霍滅魏史記索隱平陽皮氏縣汾水南耿城古耿國也永安縣汾水西有霍城古霍國有霍水出霍太山地理志河東河北縣古魏國服虔曰魏在晉之蒲坂河東也三國皆姬姓趙汸曰滅耿滅霍滅魏不書者春秋之初楚滅諸小國在南晉滅三國在西告命皆未通于魯不如逃之無使罪至為吳太伯不亦可乎按士蒍晉之謀臣也勸太子以逺害而逃其後狐突諸人皆主此説然城曲沃之時申生猶可行及驪姬置毒以後行將安適申生所謂被此名以出人誰納我其情誠可哀矣吳臨川澄曰申生死孝與屈原死忠一也申生但知事父之為孝屈原但知愛國之為忠而一身之死生不計其心純乎仁未可以輕訾也崔銑曰獻公入驪姬之讒必欲殺申生矣使申生被惡名而出獻公又必將甘心焉不為宋馮之受伐則為宋萬之賂請身死而負逆名孰若受命自裁之為共乎夫快心之忿情難釋也反常之禍辭難明也申生計之審矣二説論申生為當故録之白居易責申生不為吳太伯之讓愚謂太伯之讓以季歷之有聖德也申生則難言矣當時重耳居蒲夷吾居屈皆為驪姬所譖而出申生即欲讓將誰讓乎讓則讓奚齊耳讓奚齊而出于理安乎奚齊果立晉國之禍未有已也而謂申生之心能晏然已乎二年共仲曰奚斯之聲也乃縊趙汸曰慶父不書卒者罪重于叔牙不以卿禮成喪間于兩社疏亳為殷都殷亡國也亡國之社以為廟屏戒故與周社並建二社當俱在雉門之外左亳社右周社間于兩社謂在兩社之間朝廷于此詢謀大事是執政之所在也遇大有之乾曰同復于父疏乾為君父離為乾子今還變為乾故曰同復于父有文在其手曰友王應麟曰仲子有文在手曰為魯夫人成季唐叔有文在手曰友曰虞正義云石經古文虞作魯作􅨞手文容或似之友及夫人當有似之者及狄人戰于熒澤書疏鄭云熒今塞為平地熒陽民猶謂其處為熒澤在其縣東杜預左傳注謂此熒澤當在河北以衛敗方始渡河戰處必在河北蓋此澤跨河南北而得名耳齊人使昭伯蒸于宣薑不可強之按齊人強昭伯蒸宣薑生文公竟以存衛稱賢君焉又生宋桓夫人許穆夫人皆賢女也始信賢愚之生不係乎氣類立戴公以廬于曹疏此年之末文公在位計戴公為君不過數十日耳陳氏曰戴公未成君例不書按詩風衛并邶鄘盡得商畿內之地蓋大國也懿公之難渡河東徙而故都為墟地理志齊桓公更封衛于河南曹楚丘而河內殷墟皆屬于晉鄭玄云楚丘與曹不甚相逺皆在東郡界中漢東郡今大名府滑縣開州曹詩作漕里克諫曰云云吕祖謙曰里克告父以慈告子以孝其處父子之間至矣逮驪姬殺申生之謀已成憚克未發也使優以言動之克乃曰秉君殺太子吾不忍通復故交吾不敢中立其免乎姬始無憚而新城之難作矣是克知父子之間當兩全而不知邪正不兩立也兩刃之下人不容足兩虎之鬭獸不容身驪申之際豈中立之地哉則佩之度注佩玉者士君子常度劉奉世曰佩之合法度世子佩瑜玉而綦組綬是也較杜勝受脈于社疏周禮有蜃器蜃大蛤也以飾脈器因名邢遷如歸衛國忘亡魯之歸季友立僖公皆齊桓力也因魯事而并撮邢衛事于此以表齊桓持危繼絶之功衛文公大布之衣大帛之冠按史稱文公初立輕賦平罪身自勞苦以收衛民與傳稱大布之衣大帛之冠務材訓農通商惠工等語合誠可謂自強於治矣然終其身﨑嶇漕濮間不能收復故都尺寸河北之地拱手而授之晉文説者或咎其陰計深而雄才寡考菟圃之役朝衆讓國以激怒國人狄師遂挫則亦非不足于權略者也夫布衣帛冠之自奮僅足救滎澤之覆車而康叔武公之深仁不能敵新臺之餘穢衛之遂失河北也於文公何尤焉僖公元年公敗邾師于偃虛丘之戍將歸者也注虛丘邾地邾人既送哀薑還齊人殺之因戍虛丘欲以侵魯公以義求齊齊送薑氏之喪邾人懼乃歸故公要而敗之疏犖之盟邾人在焉既盟而敗其師傳不明言其故不知虛丘誰地何故戍之服虔云虛丘魯邑魯有亂邾使兵戍虛丘魯與邾無怨僖公奔邾則為之外主國亂則戍其內邑無故而敗其師亡信背義莫斯之甚杜以為不然故别為此説然此説亦無所據君子以齊人之殺哀薑也為已甚矣女子從人者也邵寶曰女子從人固也不曰與弒二君乃稔惡乎况齊桓以伯令討之曷謂巳甚此説行天討不加于武曌矣二年不書所會後也注魯後至諱不及期故以獨城為文趙汸曰此榖梁離至不序之例左氏不達妄謂後期説者疑之冀為不道入自顛軨伐鄍三門王應麟曰冀為不道杜氏以皮氏東北冀亭為冀國考之東漢西羌傳渭首有冀戎史記云秦武公伐而縣之漢天水郡之冀縣也入顛軨者蓋冀戎晉自冀邑冀缺為卿復與之冀是也水經注傅巖東北十餘里即顛軨坂也左傳所謂入自顛軨者也有東西絶澗左右幽空窮深地壑中則築以成道指南北之路謂之為軨橋傳説傭隱止息於此按疏引服虔云伐鄳三門謂冀伐晉也冀之既病則亦惟君故謂虞助晉也將欲假道故稱前恩以誘之此説似順若冀自伐虞虞自報冀則于晉何與而稱之保于逆旅以侵敝邑之南鄙邵寶曰逆旅近晉南鄙之客舍也退則保出則侵會虞師伐虢滅下陽疏馬融云虞在晉南虢在虞南服虔云下陽在太陽東北三十里按漢太陽縣今陜州三年歸之未絶之也蔡人嫁之趙汸曰歸蔡姬當時適有是事或者假此為名欲出楚人不意耳左氏惟記所聞故未盡四年風馬牛不相及也費誓馬牛其風疏云牝牡相誘謂之風馬牛風逸疆場事有然者不相及言疆域之逺也召康公命我先君太公邵寶曰齊魯皆元勛侯伯之命曷為不于魯而于齊乎當是時周公不之齊太公在齊伯禽不敢當此命也東至于海西至于河南至于穆陵北至于無棣疏齊之西境當在九河最西徒駭其東至于海當盡樂安北海之東界也史記索隱今淮西有故穆陵關是楚之境無棣在遼西孤竹服虔以為太公受封境界不然也蓋言其征伐所至之域爾貢包茅不入按管子江淮之間一茅而三脊名曰菁茅晉志零陵有香茅今辰州包茅山出包茅有刺而三脊真德秀曰楚子僭王罪之大者不貢罪之小者管仲度桓公之力未足制楚使責其大者而楚不服攻之不克圍之不下將何辭以退師乎舍其所當責者庶不勞而師有功仲蓋計之審矣時楚方強而子文之賢適為之相管仲度未有以制之故姑詰此以示薄伐之義使之受盟即退爾無以縮酒書疏周禮甸師云祭祀共蕭茅鄭興讀蕭為莤束茅立之酒沃其上滲下若神飲之故謂之縮杜氏解左傳云束茅而灌之以酒蓋用鄭興之説昭王南征而不復榖梁疏呂氏春秋曰周昭王親征荆蠻及涉漢梁敗隕于漢中辛餘靡振王北濟髙誘注引左傳云昭王不復君其問諸水濵則昭王沒于漢不得振王北濟故舊説皆云漢濵之人以膠膠船船壞昭王溺焉則昭王沒漢也孔氏云膠船之説不知本出何書按竹書紀年昭王末年喪六師於漢時王至中流膠液船解王及祭公辛餘靡皆溺史記正義引帝王世紀師進次于陘史記齊桓公以兵侵楚至陘山正義曰杜預云陘楚地潁川召陵縣南有陘亭括地志陘山在鄭州西南一百十里林注楚語云先君蚡冒之所以服陘隰也陘必為楚之要地故齊以諸侯之師進而據之焉方城以為城注方城山在南陽葉縣南韋昭曰方城楚北之西塞史記索隱地理志葉縣南有長城號曰方城則杜預韋昭説為是而服氏云方城山在漢南未知有何依據水經注盛𢎞之云葉東界有故城始犨縣東至瀙水逹泚陽界南北聨數百里號為方城一謂之長城云酈縣有故城一面未詳里數號為長城即此城之西隅其間相去六百里一作六里連山相接漢水流其南故屈完答齊威公云楚國方城以為城漢水以為池筮短龜長時史蘇欲止公之意故託言筮短龜長其實蓍龜智靈相似無短長也龜知生數一二三四五之神蓍知成數七八九六之神傅遜曰記云卜筮不相襲卜不吉則止而公乃復筮故神不告之耳一薰一猶吳任臣曰薰蕙草今零陵香亦謂之薰草太子縊于新城重耳奔蒲夷吾奔屈魏了翁曰驪姬之殺申生其機變亦甚巧矣夫父子之情日相親近則間言不得而八惟以術離之然後可故驪姬首賂二五説獻公出三子于外此離人之術也獻公者喜功貪得之人以威民懼戎闢地啓土中其情安得不悅而從之三子既出則圖之易矣又與優施謀作難之先後優施知申生之可陷也則請先之其言曰精潔易辱又曰甚精必愚蓋精潔之人惜名矜行惟恐點汚故曰易辱以節自勵不以智自全故曰必愚若此者可以術激之而使死石顯之陷蕭望之亦猶是矣然恐獻公猶未忍果于殺也則又夜半而泣以危言動之謂申生有將為逆之意自請先死公懼而謀之則又勸授之政而避禍焉夫獻公剛猛人也肯為其子屈乎懷怒必殺之心自此啓矣然猶患無隙以加之罪也則使將兵而伐翟焉勝則加以得衆之名敗則繩以覆軍之律申生至是無逃死之地矣然又慮大臣或守正力爭則公之意未可知也則又使優施以杯酒從容歌舞微辭諷其為附麗之計里克大臣也許以中立則無復事矣獻公之意其成也已久故歸胙之詐至易辨而不復辨申生之仁恐傷公意又不忍自明則有死而已申生死而二子奔無不如優施之所料者然奚齊立里克弒之卓子立又弒之自是晉國之亂踰二十年由驪姬行讒而二五優施三姦助之也故女子小人表裏固結者危國亡家之本也五年春王正月辛亥朔日南至趙汸曰傳于此年記正月日至與雜記孟獻子之言合後昭十七年記太史與梓慎之言二十一年記梓慎之言二十四年記昭子之言皆見周人改月改時凡分至啓閉必書雲物疏周禮保章氏以五雲之物辨吉凶水旱降豐荒之祲鄭衆云以二至二分觀雲色青為蟲白為喪赤為兵荒黑為水黃為豐此出古占候書士蒍稽首而對陸粲曰士蒍之對皆遊辭也曲沃與蒲屈城而三子見疏晉始兆亂蒍者獻公之信幸臣知其不可盍諫止焉既受命以興事矣弗慎置薪若將有為也及承公譴讓乃又不敢端言其故以折讒嬖之謀忠敬事君者固若是乎且退有後言而曰一國三公者何所風切也蒍固姦人之雄內存寵祿而外恤公議姑為是以自説于衆曰我亦嘗諫之云爾是故二五優施之徒其為讒慝不足誅也若士蒍里克君子深疾之按士蒍為獻公謀殺桓莊之族殆盡其能保天道之不還乎驪姬特假手焉耳籠絡之讒譖之其應也不爽毫末故晉獻之禍士蒍始之里克成之校者吾讐也邵經邦曰衛太子之傅石德教太子矯節收江充等繫獄卒至湖城之禍豈非讐乎重耳之不校父命庶幾知人子之道矣勸之城其賜邑按召陵之役申侯賣濤塗以媚齊而申侯之報復乃更險始搆兩國之兵禍卒及其身媚人者果何益乎輔車相依疏口輔為外表牙車為內骨故曰相依傅遜曰注疏解輔車本借名又與唇齒重復詩云其車既載乃棄爾輔輔與車固相依也輔車唇齒是二物為譬大伯虞仲大王之昭也史記太伯卒無子弟仲雍立是為吳仲雍及武王克殷求太伯仲雍之後得雍曾孫周章已君吳因而封之乃封周章弟虞仲于周之北故夏虛是為虞仲索隱曰夏都安邑虞仲都河東太陽縣之虞城在安邑南故曰夏虛顧炎武曰仲雍為吳仲雍而虞仲者仲雍之曾孫也殷時諸侯有虞國即所云虞芮質厥成者武王時國滅而封周章之弟于其故虛乃有虞仲之名耳論語逸民虞仲夷逸左傳太伯虞仲太王之昭即謂仲雍為虞仲是祖孫同號且仲雍君吳不當言虞古吳虞二字多通用楊慎曰吳古虞字省文藏于盟府注盟府司盟之官疏凡諸侯初受封爵必有盟誓之言漢封爵之誓即盟類虞不臘矣疏月令孟冬臘門閭及祖先五祀周時臘與大蠟各為一祭秦漢改曰臘不蠟而為臘矣趙汸曰史記秦惠文王初臘正義云始效中國為之亦明臘不自秦始或疑臘作于秦誤矣丙之晨龍尾伏辰疏東方七宿皆為蒼龍其龍南首北尾角是龍角尾即龍尾故注云龍尾尾星也日月之會為辰于時日體在尾星與日同處共日俱出入故常伏不見也均服振振取虢之旗漢書五行志引此文均作袀注袀服黑衣也均袀古字通林注庭燎詩言觀其旗溫公叶音芹此當與同讀按陳第古音考旗音斤鶉之賁賁天䇿焞焞注鶉鶉火星也疏南方七星皆為朱鳥其鳥西首東尾故未為鶉首午為鶉火巳為鶉尾鶉火星者謂柳星張也天䇿即傅説星見天官書傅説星在尾之末合朔在尾故其星近日微焞焞然無光耀也丙子旦日在尾月在䇿鶉火中必是時也疏以三統厯推之此夜是月小餘盡夜半合朔在尾十四度從乙夜半至平旦日行四分度之一月行三度有餘故丙子旦日在尾星月在天䇿鶉火之次正中也月令孟冬之月日在尾昏危中旦七星中七星則鶉火次之星也六年圍新密鄭所以不時城也按此釋經所以書新密為新城也杜注非是辨見集説許男面縳銜璧至微子啓如是楊慎曰面縛背縛也史記馬童面之張晏訓背之也蓋古文多倒語如息之為長亂之為治擾之為順糞之為除皆是趙匡曰左氏云蔡穆侯將許僖公以見楚子于武城面縛銜璧按楚本圍許以救鄭諸侯救許鄭圍已解楚師亦退許有何懼乃隨蔡侯為滅國之禮乎若爾許己從楚齊何故不爭許乎劉敞曰八年許男即會盟于洮知其初不降楚也且云微子面縛尤妄陸粲曰聞諸孔子微子去之是且不辱於紂胡為面縛於周人之壘歟逢伯蓋詭言以悅其君而後儒信之甚者謂抱祭器而往臣焉謬矣愚按昭四年傳賴子面縛銜璧士袒輿襯從之楚子問諸椒舉舉曰成王克許許僖公如是王親釋其縛受其璧焚其襯據此則許男事不可謂無考此年傳楚子圍許以救鄭諸侯救許乃還事在秋蔡穆侯將許僖公見楚子于武城事在冬蓋楚子歸至武城而憤猶未息蔡侯畏楚特將許男以見之非許男本意故八年即與洮之盟也若微子啓與武王云云則逢伯設辭必非事實余尚書埤傳已辨之八年不殯于廟疏注云殯過廟者將葬時從殯宮出告廟乃葬非是殯尸于廟中也邵寶曰殯于廟啓殯而朝祖也凡柩行而止皆謂之殯冬王人來告喪難故也是以緩王樵曰按傳去年冬閏月惠王崩襄王惡太叔帶之難懼不立不發喪而告難于齊及襄定位而後發喪據經今年十二月丁未方書天王崩恐祕不發喪難于經年而叔帶乃襄王親弟亦非可祕者且既云定位而後發喪則正月二月位已定何待至十二月乎襄王有子帶之難洮之盟為謀王室即不可知惟祕喪決不可信或曰寧母及洮兩合諸侯皆為鄭也九年使孔賜伯舅胙金履祥曰按宰孔之命國語史記皆有弓矢車服九旒之賜皇極經世書錫命為伯此所謂加賜一級者歟然宰孔初命但以賜胙為辭蓋以宗廟為重也加勞賜一級邵寶曰加勞謂既老矣而又加之以勤勞也級階之級也不欲其下拜故賜之進階恐隕越于下王錫爵曰下即堂下言我若僭拜于堂則神魂不安必致隕墜于堂下矣秋齊侯盟諸侯于葵丘王應麟曰葵丘之會孟子所謂五禁者詳見于管子大正篇左氏絶不及吕成公曰桓公于五命之戒未免身自犯之故左氏隱而不書也説苑晉文公合諸侯而盟曰無以美妾疑妻無以聲樂妨樂無以姦情害公無以貨利示下亦五禁之意史傳不載趙汸曰傳記盟辭即孟子所述之末句其五禁之辭傳不能舉則二伯之事闕漏多矣宰孔先歸遇晉侯曰可無會也按宰孔之料齊侯智矣其止晉侯之與會非也黃東發有論見集説其在亂乎按杜云在存也此解不明白孔意以齊桓內行不正今之所憂者其在亂乎君亦當靖晉之亂無勞逺行也意在諷晉獻耳里克丕鄭欲納文公按里克欲納文公正也而不果者其才不足且中立之心為之祟也丕鄭才又不及克豹亦類其父更不足言矣藐諸孤注言其與諸子縣藐杜解非也言奚齊卓子藐焉弱小耳斯言之玷不可為也荀息有焉司馬光曰獻公溺於嬖寵廢長立少荀息為國正卿不能正諫之于其始而遽以死許之是則荀息之言玷于獻公未沒之前而不可救于己沒之後也愚謂葉公云復言非信也荀息之復言徒足為玷而不可以為信况考之外傳荀息傅奚齊之時太子申生無恙也太子在而息遽以死許奚齊則是獻公廢立之謀成于息也後儒乃以能不食言許之豈不誤哉十年夷吾無禮按無禮指蒸于賈君之事此賈逵説也得之不然夷吾方改葬加諡而何以怒其無禮哉七輿大夫注侯伯七命副車七乘故有大夫七輿之官疏每車一大夫主之此見周禮大行人十二年齊侯使管夷吾平戎于王金履祥曰五伯桓公為盛而周室戎狄之禍自若王子帶召戎伐周天下之大罪也桓公不能討而平戎于王豈以受子帶之奔為此姑息耶桓公身不能容子糾而為王容叔帶固將曲全襄王兄弟之愛不免卒釀王室異日之禍云十四年春諸侯城緣陵而遷杞焉不書其人有闕也史記索隱陳留雍丘縣故杞國武王封禹後為東樓公在此至春秋時杞巳遷東國故左氏隱四年傳莒人伐杞取牟婁牟婁東邑也僖十四年傳杞遷緣陵地理志北海有營陵臣瓚以為即春秋緣陵淳于公所都之邑又周國名杞後改國號曰州而稱淳于公故春秋桓五年州公如曹左氏云淳于公如曹是也張洽曰州公如曹州稱公與祭公同則州是畿內之地即河內州邑也左氏乃云淳于公如曹度其國危遂不復杜氏云城陽淳于縣昭元年傳晉為杞城淳于或云因州公不反國為杞所并遂以淳于為都未詳孰是按杞遷緣陵不知自何地而遷張注所引或説或有之索隱謂杞改國號曰州則斷非事實又按會鹹諸侯不重序前目後凡之例也注云闕者器用不具城池未固而去亦非辨見集説虢射曰注虢射惠公舅也傅遜曰疏云晉語惠公稱虢射為舅故杜本之考晉語韋昭注諸侯謂異姓大夫為舅則通稱耳前言小戎子生夷吾虢射既非戎人非惠舅可知讀左日鈔卷二
