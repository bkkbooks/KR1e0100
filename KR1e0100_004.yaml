body:
  text: 讀左日鈔卷四吳江朱鶴齡撰三十四年秦師輕而無禮疏服䖍云無禮謂過天子門不櫜甲束兵而但免胄吕氏春秋說此事云師行過周王孫滿曰過天子之城宜櫜甲束兵左右皆下必古有此禮以乘韋先牛十二犒師弦髙以犒師誑秦使鄭有備十二年足當數萬師矣考淮南子弦髙後不受鄭伯之賞而逃春秋時一異人也又考吕覽鄭賈人弦髙奚施將西市于周道過秦師曰嘻師所從來逺此必襲鄭遽使奚施歸告乃矯鄭伯之命以勞之傳紀弦髙而不及奚施何耶晉敗秦師于殽獲三帥以歸唐順之曰秦為西州大國又晉之婚姻也晉之克楚也得䇿于結秦而晉之不競于楚也失䇿于讐秦自殽之役而秦晉相讐殺者歴四五世戰彭衙戰河曲積十餘戰而不解是晉人自失一强援自生一强敵失一强援則其氣力不完强敵伺近則其勢不暇於畧逺故晉霸之衰而楚益横者殽之役實然說春秋者乃曰殽之役春秋許晉襄繼霸吾不知也與晉師夾泜而軍孫武子欲戰者無附於水而迎客張預曰我欲逆戰近水迎敵恐其不得渡我不欲戰則阻水拒之使不不能濟楚子上與晉陽處父夾泜水而軍子上退舍欲令晉師渡懼處父半濟而擊之也然卒皆不戰而歸則兩將皆恇怯也按韓信銚期銚期見後漢書皆以背水戰而勝則兵法所禁附水迎客又不必泥𦵏僖公緩作主非禮也劉敞曰緩字屬下句杜以屬上句非也僖公以十二月薨明年四月𦵏凡五月不得云緩杜以文二年冬傳云襄仲如齊納幣禮也故欲遷僖公之𦵏于十一月則除䘮在二年十一月而納幣在十二月乃與傳合獨不顧作主非禮也之句無所繋乎以下事當皆繫文公二年簡編倒錯在此趙汸曰長厯自隠公元年至文元年三十四閏大衍厯三十六閏葢春秋周厯本差後世追算又互有得失杜氏惟據長厯釋經遂以此年十二月所書四事皆為十一月亦固矣卒哭而祔疏雜記云士三虞大夫五諸侯七凡諸侯之䘮𦵏而虞從是以後間日一虞七虞之後明日而卒哭謂之卒哭者前此哭無時是後惟朝夕哭耳祔而作主文二年公羊𫝊主者曷用虞主用桑練主用栗疏左氏惟言祔而作主主一而己非虞練再作公羊之言不可通于此也烝嘗禘于廟其在廟則時祭皆如舊疏鄭𤣥解禮三年一祫五年一禘杜解左傳都不言祫者以左傳無祫語則禘祫正是一祭故杜以審禘昭穆謂之曰禘明其更無祫也釋天云禘大祭也則祭無大于禘者若祫大于禘禘焉得稱大乎趙汸曰朱子云左氏烝嘗禘于廟與王制䘮三年不祭者不合今按䘮不貳事貳則忘哀必無釋䘮服而衣祭服之理或是大臣攝行亦無文可據東遷禮失䘮祭尤甚如襄十六年春𦵏晉悼公傳言改服修官烝于曲沃皆是當時之事非必周制則然杜氏遂據為諸侯卒哭以後時祭不廢之證非也文公元年於是閏三月非禮也疏漢書律厯志云文公元年距僖五年辛亥二十九歳是歳閏餘十三閏當在十一月後而在三月故𫝊曰非禮也志之所言閏當在此年十一月後今三月已即閏是嫌閏月太近前也杜以為僖三十年閏九月文二年閏正月故言于厯法當在僖公末年誤于今年置閏嫌置閏太近後也杜為長厯置閏疏數無復定準惟勘經傳上下年月以為長厯若日月同者則數年不置閏月若日月不同須置閏月乃同者則未滿三十二月頻置閏所以異于常厯履端于始舉正于中歸餘于終林注謂以十一月一日子初一刻冬至為厯首日月之行有遲速必分為十二月舉中氣以正月毎月各餘一日歸之于終積成一月而為閏古者越國而謀林氏註謂陳侯耻于衛之受屈使之報伐示强以冀獲免則謀不于近而于逺合古者越國而謀之道凌稚隆曰陳為衛謀亦曰强為善以敬事大國可爾乃使報伐以益晉之怒而復執孔達以求成焉謬亦甚矣何貴乎越國而謀哉諡之曰靈不瞑曰成乃瞑疏桓譚以為自縊而死其目未合尸冷乃瞑非由諡之善惡穆伯如齊始聘焉禮也劉敞曰左氏見當時諸侯廢䘮而聘推以為禮杜氏見左氏有得禮之言遂推以當䘮而吉皆反經越禮不可以教後世趙汸曰古者吉凶不相干故三年之䘮不祭而何聘問之有二年不登于明堂疏鄭𤣥以為明堂在國之陽與祖廟别處賈逵盧植蔡邕服䖍等皆以祖廟與明堂為一故杜從之趙汸曰是明堂中有祖廟豈可以祖廟訓明堂乎按勇則害上不登於明堂二語出汲冢周書大匡解以其屬馳秦師死焉吕祖謙曰狼瞫怒先軫不知其勇而死于秦師所以彰軫之不知人也名則忠晉意實愧軫書不時也注過𦵏十月故曰不時何休曰禮作練主當以十三月趙汸曰僖公祥練本在元年十二月過兩月始作主以練祭後期也特書作主則祭不以時可知傳不言作練主故杜以過𦵏十月釋之然非也果如此則自虞後卒哭與祔皆無主几筵十月神無所依甚非人情當從何氏書曰及晉處父盟以厭之也注厭猶損也損謂去處父族氏傅遜曰漢人有厭勝之術考韻書厭臨也此于我公以尊臨卑事理既切而勝之之義亦在其中書士縠堪其事也注晉司空非卿也以士縠能堪卿事故書疏成二年傳魯賜晉三帥三命之服司空亞旅一命之服是知司空非卿趙汸曰晉司空非卿而書于經者列國尊伯主命春秋辭從主人見晉卑諸侯傳謂堪其事非也愚按士縠必是晉卿啖氏謂既命之卿例書名不論堪與不堪是也司空或其兼官葢以卿而下領司空之職耳躋僖公逆祀也按公羊縠梁及魯語皆謂逆祀者顛倒其南北昭穆之位孔氏不從其說漢晉唐宋禮官之議皆以兄弟不相為後不得為昭穆斯不易矣趙子常反祖述公穀魯語而極辨孔說之非何耶辨詳集說廢六闗注塞闗陽闗之屬凡六闗所以禁絶末游而廢之家語作置六闗注謂文仲置闗以稅行者故為不仁祀爰居魯語海鳥曰爰居止于魯宋門之外三日臧文仲以為神命國人祀之爾雅爰居一名雜懸樊光云似鳯凰莊子魯侯御而觴之于廟奏九韶以為樂具大牢以為膳鳥乃眩視悲憂三日而死卿不書為穆公故尊秦也趙汸曰書存秦誓如詩錄秦風與修春秋事體不同左氏尊秦葢當時流俗之論汪克寛曰穆公雖嘗悔過不能改過何徳可尊而崇之歴考自入春秋以來外兵非君將皆稱人即前此晉以三國伐許與明年五國伐沈皆不書大夫姓氏是崇何徳哉春秋于人之一字其貶與否終無定論朱子謂不當以一字褒貶求聖人之意正此類也襄仲如齊納幣禮也葉夢得曰諸侯娶元妃固有時而左氏以即位為節尤見其妄三年取王官及郊括地志王官故城在同州澄城縣西北六十里南郊故城在縣北十七里又有北郊故城西郊古城自茅津濟括地志茅津在陜州河北縣西二十里太陽縣也渡河自茅津南渡河也王叔桓公晉陽處父伐楚以救江趙汸曰不以救江累王室故没王叔不書且明征伐在大夫譏不及王叔也孔氏云王叔文公不知何王之子字叔遂以叔為氏桓公是其子王叔陳生是其後也四年為賦湛露及彤弓疏諸自賦詩以表己志或全取一篇或止歌一章未有頓賦兩篇者其使工人歌樂各以三篇為斷如享元侯則歌肆夏樊遏渠兩君相見則歌文王大明緜燕賔客羣臣則歌鹿鳴四牡皇皇者華是也魯時樂人歌此二篇不知欲示何意五年王使榮叔來含且賵召昭公來㑹𦵏禮也劉敞曰庶子為君為其母無服不敢貳尊者也妾母稱夫人王不能正而又使公卿㑹𦵏何禮之有楚子燮滅蓼按滅六見于經而滅蓼不書葢有告有不告也一統志六在今壽州蓼在今霍丘縣俱屬鳯陽府臯陶庭堅按史稱八愷有庭堅杜以為臯陶字孔氏疏謂本于鄭𤣥論語注不知鄭得之何書馬永卿曰若庭堅即臯陶文仲不應連言之似是兩人羅泌云六臯陶之後蓼庭堅之後寗嬴從之注嬴逆旅大夫晉語説此事云舍于逆旅寗嬴氏稱邑氏故知大夫六年陽處父至自温改蒐于董易中軍注易趙盾為帥按趙盾之才本非射姑所及然處父遽易其中軍以與之則專擅極矣于此見其剛而陵人所以不免于禍以子車氏三子奄息仲行鍼虎為殉史記秦武公之𦵏從者六十六人至穆公用百七十七人子車氏三子與焉正義引應劭云穆公與羣臣飲酒酣公曰生共此樂死共此哀于是奄息仲行鍼虎許諾及公薨皆從死愚按三艮之死穆公命之故黄鳥詩序不刺康公而刺穆公以其不能革西戎之俗左氏亦罪穆公收其良以死難以在上也李衛公以徒死責三良東坡亦云然吾未敢信為定論趙孟曰立公子雍愚謂趙盾執國柄以晉之多難而欲立長君此社稷之謀也然非得襄公之命不可襄公賢君也當公臨没屬太子于盾之時使盾頓首榻前而以公子雍為請公未必不從即不從與諸大夫以死爭之可也及公殁而更議立君既迎雍于秦旋復背之揆之理勢俱不可行靈公雖立能無與盾相猜忌乎異日嗾獒之難所從來逺矣仁山金氏云太子幼立公子雍為攝主亦先王之法春秋初固有之此亦一說七年先蔑將下軍傅遜曰先蔑既奉命如秦下文云先蔑奔秦則歸晉明矣歸而將下軍乃在國為國之義既復奔秦則以不與立靈公故也趙子常疑傳文有誤過矣愚謂春秋通例凡諸國之臣自内奔外者無不書出奔經書晉先蔑奔秦不言出則非自内而出甚明傳言秦送公子雍于晉下又言晉敗秦師于令狐先蔑奔秦士㑹從之令狐在今蒲州已入晉地秦送公子雍至此晉潛師敗之二人遂奔秦則是蔑在秦軍中未嘗歸晉也傳言先蔑將下軍者據正義云諸言御戎為右多屬君歩招戎津始以逆雍出軍此擬為雍之御石也改立靈公御戎猶在職然則蔑之將下軍恐亦是舊職時猶聲言逆雍故仍其名而以他卿攝之如悼公時新軍無帥使其什吏率卒秉官屬以從下軍之類也如此說既不失經義而于傳文亦可通先人有奪人之心張預曰心者將之所主也治亂勇怯皆生于心善制敵者撓之而使亂激之而使惑迫之而使懼彼之心謀可奪傳曰先人有奪人之心謂奪其本心之謀也不書所㑹後也按經書公㑹諸侯晉大夫盟于扈則是公未嘗不與㑹但其至比之諸國為後耳說者多疑傳妄辨詳集說謂之徳禮按郤缺欲趙孟以徳懐衛其引夏書九功意只重歌字耳言所行合宜有徳有禮則人皆樂而歌之此與財用之節生民之命何渉杜注可刪八年歸匡戚之田于衛按一統志匡城在大名府長垣縣西南一十五里戚城在開州城北七里春秋時皆衛地相去百五十里此葢晉先且居伐衛時取戚田而并取匡田故今以還衛傳不及匡者史文畧爾杜氏云匡本衛邑中屬鄭今晉令鄭還衛此大誤也杜以元年衛孔達侵鄭伐緜訾及匡為即此匡故云然不知匡地有二孔達侵鄭伐匡此河南之匡注云在潁川新汲縣東北定六年公侵鄭取匡是也歸匡戚之田于衛乃河北之匡論語子畏于匡是也杜謂匡衛邑中屬鄭既是衛地之匡鄭安能越河而有之耶一統志匡城一在睢州城西三十里一在長垣縣西南十五里皆云孔子畏匡處按史世家云孔子去衛將適陳過匡匡人止之去即過蒲月餘反乎衛徐廣曰長垣縣有匡城蒲鄉盖匡與蒲戚至近匡人止孔子必非睢州城西之匡城也古今地名相同者甚多一統志每混載不可不考復致公壻池之封注公壻池晉君女壻按定五年傳吳及楚戰于公壻之谿注公壻楚地名疑公壻池本楚人奔晉因地為氏者池其名也晉先取衛地封池今仍以歸衛又文十七年傳晉趙穿公壻池為質于鄭穿乃晉君壻也若如杜解其文當以公壻趙穿及池為句矣自申至于虎牢之竟注申鄭地陸粲曰申至虎牢皆鄭地何緣乃以歸衛考服䖍以為致之于鄭劉炫從其說以規杜杜于上年云為晉歸鄭衛田張本而此云今并還衛立文不明孔疏强解義終難通愚按注云今并還衛是釋上文公壻池句下以申與虎牢皆鄭地則還鄭自明故不復言鄭耳後人自誤以二句連讀非杜注有誤秦人伐晉取武城括地志武城一名武平在華州鄭縣東北十三里皆昭公之黨也司馬握節以死故書以官趙匡曰大夫二卿之死此殺昭公之漸也四人皆忠于公而左氏謂之黨何謬耶按周官惟守邦國都鄙及出使有節六卿居官者未聞其有節也啖氏曰傳此二人不失節故誤節義為符節耳愚按周禮掌節云守邦國者用玉節此司馬司城以事在官葢執玉節耳趙說非九年晉人殺箕鄭父士縠蒯得趙汸曰傳箕鄭先士縠經士縠先箕鄭者經以殺之先後傳以位次序列傳蒯得居下知其以位次也秦人來歸僖公成風之襚此追襚也成風之没至是五年矣按禮記衛將軍文子之喪既除喪而越人來弔子游善之是古有以服終來弔者也十一年敗狄于鹹獲長狄僑如注僑如鄋瞞國之君葢長三丈獲僑如不書為夷狄也疏穀梁傳長狄瓦石不能害叔孫得臣射其目身横九畝斷其首而載之眉見于軾魯語所云十倍僬僥氏之長者故杜云葢長三丈葢者疑詞愚按鄋瞞乃長狄國名在諸狄中自為一種是時狄驅之以侵齊魯適為得臣所獲于法自不得書下云鄋瞞由是遂亡葢長狄之種絶而狄之强如故故十三年又出而侵衛也趙子常以鄋瞞為狄國名而長狄又服屬于鄋瞞詳考上下文便知其謬又按魯語防風氏漆姓在虞夏商為汪芒氏於周為長狄氏今曰大人則鄋瞞即防風氏之後是時長狄種絶而云今曰大人者言當時呼在前長狄為大人未必其時有之富父終甥摏其喉以戈殺之疏考工記戈之長六尺六寸耳得及長狄之喉者兵車之法三人共乗魯宋與長狄之戰車皆四乘改其乗必長其兵謂之戈葢形如戈也皇父之二子死焉注皇父與穀甥及牛父皆死故耏班獨受賞按傳不言穀甥牛父之死注増傳所無榖甥牛父果死賞何獨不及乎即皇父二子死亦應有賞傳不及載耳齊襄公之二年注榮如以魯桓十六年死至宣十五年百有三歳其兄猶在陸粲曰史記魯世家引此傳文作齊惠公之二年又齊世家云惠公二年長狄來王子城父攻殺之十二諸侯年表亦于齊恵公二年書王子城父敗長狄三文皆同按齊惠之二年即魯宣之二年也在晉滅潞之前僅十三年耳此傳以惠公為襄公葢傳寫之誤杜因有是說失之不考也十二年不書地尊諸侯也謂尊以為諸侯故次其竊邑之罪此傳大非春秋之義趙伯循有辨見集說襄仲辭玉傅遜曰聘義云已聘而還圭璋葢聘終則還玉禮之常今于聘禮方行而襄仲辭之是不欲與秦為好也時晉主夏盟魯晉方謹術言將伐晉故襄仲畏晉而而拒之乃皆出戰交綏司馬法古者逐奔不過百歩從綏不過三舍注曰綏者御車之索古者以綏為退軍之名從人退還之軍不過九十里左傳晉趙盾命三軍皆出與秦戰交綏注軍退為綏葢秦晉皆有備各防其失不戰而兩退故曰交綏胥甲趙穿當軍門呼曰陳禹謨曰兵法不知軍之不可以進而謂之進不知軍之不可以退而謂之退是謂縻軍㬰駢欲深壘固軍以老秦師知不可進也而趙穿以其屬出臾駢知秦師將退欲薄諸河以取之知不可退也而趙穿以薄人於險為無勇縻軍之罪其容逭乎十三年守桃林之塞注桃林在𢎞農華隂縣潼闗疏桃林之塞在南河之南逺處晉之南境從秦適周乃由此路使詹嘉守此塞者以秦使西乞聘魯應更交餘國慮其要約外援東西圖已故使守此扼塞斷其徃來之道也繞朝贈之以䇿注䇿馬撾傅遜曰孔疏引服䖍云䇿書策也文心雕龍云繞朝贈士㑹以䇿子家與趙宣以書亦用服說愚謂朝知士㑹有歸志與秦伯言留之而不克故贈之以䇿使之策馬以歸示已知其情也故曰子無謂秦無人其處者為劉氏疏處秦為劉氏未知何意言此討尋上下其文不類明帝時賈逵上疏云五經中無證圖讖明劉氏為堯後者而左氏獨有明文竊謂左氏先未顯于世先儒藉此以求道通故引之以為證耳十四年王叛王孫蘇王應麟曰王貳于虢王叛王孫蘇此左氏之失也通鑑書燕叛齊而大事記非之書蜀漢冦魏而綱目非之書晉叛梁而讀史管見非之况天子之于其臣乎請𦵏弗許注請以卿禮𦵏王錫爵曰請𦵏請歸𦵏于魯地非以卿禮𦵏也觀後𫝊云許之又云𦵏視共仲則歸魯甚明單伯如齊請子叔姬按此單伯與莊元年單伯皆魯大夫杜氏以為周卿士非也辨見集說十五年其官皆從之劉敞曰左氏其官皆從之云云非也周之禮經諸侯相聘其使介有常數矣不聞其官皆從以為古典也魯人以為敏陸粲曰華耦自以罪人之後不敢辱大禮則曷不于其君之使之也而辭諸既受命以出矣方親暴其先人之惡于鄰國是言也負販者猶嗤之乃以為敏乎諸侯五年再相朝劉敞曰周官六年五服一朝不得于諸侯亦五年一朝也大行人之職曰諸侯邦交歳相問殷相聘世相朝此為得中趙汸曰曹伯文十一年來朝至十五年再來偶合五年之數𫝊遂以為古制由未見周禮耳卞人以告疏治邑大夫例呼為人孔子父為鄹邑大夫謂之鄹人是也帷堂而哭按雜記朝夕哭則不帷聲已怨敖從莒女故不視其喪以帷自蔽于堂而哭凡諸侯㑹公不與不書趙匡曰凡諸侯之㑹公不與而列㑹者非一左氏之說非也按扈之盟罪晉故不書諸侯辨見集說十六年自廬以往振廪同食玉海自廬振廪為襄之中廬而説者以合肥為廬失之矣先君蚡冒所以服陘隰也注蚡冒楚武王父疏楚世家云蚡冒卒弟熊達殺蚡冒子而代立是為武王與杜異陘即陘山見一卷為賈之謀在出師以弱為强也師叔之謀在驕敵以强為弱也皆得兵法之深公孫壽辭司城請使意諸壽子為之曰雖亡子猶不亡族馮時可曰異哉公孫壽逃其難又將賴其寵逺其身又將懐其禄夫君之有官以庇國也非以庇族也且子為身貳去身之貳而曰以亢吾宗宗可亢乎壽葢曰吾免於死而無失世官吾庸多矣子於何有嗚呼斯所謂人之無良也夫不能其大夫至于君祖母按哀十六年𫝊蒯瞆告周公云蒯瞆得罪于君父君母謂母為君母則祖母為君祖母矣夫人王姬使帥甸攻而殺之注帥甸郊甸之帥疏周禮載師以公邑之田任甸地帥甸者甸地之帥當是公邑之大夫也按左氏載昭公被殺之由多不可信辨詳集說十七年鄭子家使執訊而與之書陸粲曰執訊者執其通問之人而與之以書也増韻執留也必非拘執之執夷與孤之二三臣疏孤葢鄭伯對晉之辭歸生因即以言其君也鹿死不擇音陸粲曰注以音為䕃未之前聞疏引服䖍解云鹿得美草呦呦相呼困迫不暇復擇善音急之至也莊子獸死不擇音與此同鋌而走險韻㑹鹿走貌通作鋌引左傳鋌而走險或曰考工記冶氏為殺矢刃長寸圍寸鋌十之注箭足入槖中者也此葢言鹿中箭足走險避之殺而埋之馬矢之中注史畏襄仲不敢書殺惠伯王樵曰叔仲惠伯叔牙之孫叔彭生也襄仲之邪謀行父得臣皆帖耳順命獨惠伯爭之不克則死之無愧大臣之義矣獨經不書為可疑或謂不發襄仲之謀令君及禍故不書者謬也時逆臣當國言一出口即死奚自而發其謀乎胡康侯謂惠伯死非君命故不得以死節書亦非也傳曰以君命召之杜氏注君命子惡命也惠伯是時必未知子惡見殺聞君有命安得逆料其詐而弗入乎左氏但言襄仲欲立宣公叔仲不可而其說未詳成十五年公羊傳云文公死子幼公子遂謂叔仲恵伯曰君幼如之何願與子慮之叔仲惠伯曰吾子相之老夫抱之何㓜君之有公子遂知不可與謀退而殺叔仲惠伯弑子赤立宣公此可補左氏之闕愚謂子惡之弑史既諱之則惠伯之殺史亦隠之而不書矣非必以畏襄仲之故史既不書夫子亦安得而追筆之耶十八年季文子使大史克對曰必使大史對者以其知古今典故也真徳秀曰行父歴數莒僕之惡當矣不知襄仲弑適立庶其惡近在目前而不能正反與之先後如齊以求昏與㑹而定其位焉是陷身于盗賊之黨而不自知也何獨于一莒僕不少假借乎或曰行父特托莒僕以劫持宣公耳在九刑不忘注九刑之書今亡按傳曰周有亂政而作九刑髙陽氏有才子八人王應麟曰古者以徳為才十六才子是也如狄之豐舒晉之知伯齊之盆成括以才稱者古所謂不才子也謂之渾敦按山海經神異經吕氏春秋諸書所記渾敦窮竒檮杌饕餮俱惡獸名服䖍說已如此杜氏以字義釋之非也宣公元年尊夫人也按遂不書公子乃一事再見之例非尊夫人之謂辨詳集說皆取賂而還注文十五年十七年二扈之盟皆受賂愚按傳言皆者䝉上文先受宋賂後又受齊賂也杜氏注不及齊于文義有漏况文十七年盟扈無取賂之文宣子驟諫而不入金履祥曰驟者急也數也趙宣子當國輔㓜君不為之置賢師傅及有過而爭之于口舌之間此宣子之失也况進諫之道有直有微有諷有譎今不能盡其術而徒以强諫求勝其君雖中主猶難堪之况靈公乎其不入宜矣二年文馬百駟注畫馬為文四百匹丘光庭曰文馬馬之毛色有文采者愚謂後世剪馬鬛為三花五花文馬殆即此類若云畫馬為文何足貴乎華元為植注植將主也按周禮大司馬大役屬其植注植為部曲將吏故此注云將主謂將領主作監帥者也即後代將作大匠之將趙穿攻靈公于桃園邵寳曰穿知有盾而不知有君雖無令甚于有令也葢盾之專乆矣靈公之立非盾意也鞅鞅非少主臣盾宜有之穿從其意而行大事以為盾必不我討也不然則穿也烏乎敢越竟乃免林注杜氏以為越竟則君臣義絶可以不討賊遂致議者紛紛或疑非孔子之言愚按此當言出奔他國則弑在出奔之後可免弑君之名非謂越竟而反可不討賊也葉夢得曰弑君天下之大惡使其與聞乎故雖在四海之外無所逃安取乎越竟使不與聞雖在朝如晏子誰能責之宣子使趙穿逆公子黑臀于周而立之趙汸曰于此見趙盾與穿志同逆新君不使他人而使穿者欲免穿于討也為之田以為公族注為置田邑以為公族大夫孔晁注國語云公族大夫掌公族及卿大夫子弟之官是卿之適子屬公族也旄車之族注旄車公行之官疏公車必建旄謂之旄車使屏季以其故族為公族大夫注盾以其故官屬與屏季使為衰之適傅遜曰故族非官屬也葢以適子為宗宜統其族人故以族人屬之三年鄭及晉平趙汸曰經于夏書楚人侵鄭則鄭之先從晉可知矣故鄭及晉平不書鑄鼎象物史記正義禹鑄九鼎荆山下歴殷至周赧王十九年秦昭王取九鼎一飛入泗水餘八入于秦傅遜曰禹鑄鼎事不經見墨子云夏后開命大亷鑄鼎于昆吾灼龜得逢逢白雲之兆開即啟也螭魅罔兩注螭山中獸形魅怪物罔兩水神魯語木石之怪夔罔兩水之怪龍罔象韋昭注罔兩山精好學人聲而迷惑人也說文罔兩山川之精物也陸粲曰據魯語罔兩與罔象有異杜氏以罔兩為水神當是誤作罔象解耳四年公怒欲殺子公方孝孺曰靈公不與子公之羮非吝也特以子公之笑而言夢為輕已故不與之羮使其夢無徴此兒女子相詭之恒情爾及子公怏怏染指笑而赦之賜之以食可也遽欲殺之則太過矣苟知其中懐不軌正其大罪而誅之亦可也卒不能决以致殺身豈不愚甚已哉權不足也此經權之權觀十年𫝊鄭人討幽公之亂斵子家之棺而逐其族則子家與弑甚明豈但權之不足耶辨詳集說中趙汸曰既云懼而從之是實與其謀矣當從榖梁𫝊中志同舉重之義為允凡弑君稱君君無道也稱臣臣之罪也趙汸曰君雖無道豈臣子所當較臣既弑君亦豈有無罪者凡弑君或書賊主名或不書主名皆從赴告傳不知䇿書從赴之法而妄為之辭故謬至此及鼓跗著于丁寜疏車上不得置簨簴以懸鼓故為作跗若殷之楹鼓也林注跗可以架鼓晉語代備鐘鼓戰以淳于丁寜丁寜即鉦鄭𤣥云鉦形如小鐘軍行鳴之以為鼓節以貫笠轂注兵車無葢尊者則邊人執笠依轂而立以禦寒暑名曰笠轂疏服䖍云笠轂轂之葢如笠所以蔽轂上以禦矢也或曰兵車旁幔輪謂之笠轂杜以彼為不安故改之亦是以意而言差于人情為近耳五年冬來反馬也疏大夫以上其嫁皆有留車反馬之禮留車妻之道也反馬壻之義也禮送女適于夫氏留其所送之馬謙不敢自安于夫若被出棄示將乘之以歸故留之也至三月廟見夫婦之情既固則夫家遣使反其所留之馬示與偕老不復歸也注言示譏而不明所以譏之之義趙汸曰士昏禮稱若不親迎則入三月然後壻見於妻之父母今髙固親迎則不須更見故譏其親反馬也六年以盈其貫注貫猶習也即商罪貫盈之貫杜注非也七年凡師出與謀曰及不與謀曰㑹按不與謀者謂不與其始謀耳然此例亦不可拘八年楚為衆舒叛故伐舒蓼滅之按舒蓼之各為一國者僖三年舒滅于徐文五年蓼滅于楚釋例土地名有舒羣舒舒蓼舒庸舒鳩葢羣舒猶云羣蠻通衆舒為言舒蓼舒庸舒鳩皆其屬此傳楚滅舒蓼乃舒之一種耳若舒蓼二國皆前滅不在羣舒之内注分二國名既非疏又以蓼即楚所滅之蓼亦誤也禮卜𦵏先逺日疏曲禮凡卜筮旬之外曰逺某日旬之内曰近某日喪事先逺日吉事先近日先近日者先卜上旬不吉卜次旬又不吉卜下旬卜𦵏先卜逺日避不思念其親似欲汲汲而早𦵏之也今若冒雨而𦵏亦是不思其親欲得早𦵏故舉卜𦵏先逺日以證為雨而止禮也王制庶人𦵏不為雨止者庶人禮儀少也九年孔子曰詩云民之多辟無自立辟其洩冶之謂乎陳洙曰此必非聖人之言比干諫而死孔子稱其仁反罪洩冶乎趙汸曰傳以稱國殺大夫為有罪故雖無罪見殺者亦必求其罪以實之杜氏見宋曹殺大夫有不名者遂以書名為貶非但不知經㫖亦未究史法楚子為厲之役故伐鄭注六年楚伐鄭取成于厲既成鄭伯逃歸事見十一年自厲之後鄭南北兩屬按六年傳不詳厲役之事葢有闕文厲地名也十年書曰崔氏非其罪也且告以族不以名趙汸曰自此至崔杼弑君凡五十一年惠公之世杼尚幼成十九年傳言齊侯使崔杼為大夫明前此未仕也杼未為卿故不書名實卿族也故來告書其族如尹氏非王卿士于法不合書其立王子朝亦由世是卿族故史不得不書某氏之守臣某注上某氏姓下某名疏姓即族也禮謂族人為庶姓十一年令尹蔿艾獵城沂疏服䖍云艾獵蔿賈之子孫叔敖也玉海雅有營謝美召伯也傳稱城沂賢蔿敖也寡人以諸侯討而戮之疏經無諸侯而云以諸侯討之諸侯皆慶者時有楚之屬國從行也讀左日鈔卷四
