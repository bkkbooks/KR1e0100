body:
  text: 讀左日鈔春秋類提要臣等謹案讀左日鈔十二卷補二卷國朝朱鶴齡撰鶴齡有尚書埤傳已著録是書采諸家之説以補正杜預春秋經傳集解之闕訛於趙汸陸粲傅遜邵寶王樵五家之書所取為多大抵集舊解者十之七出己意者十之三故以鈔名所補二卷多用顧炎武説炎武杜解補正三卷具有完帙此所采未及什一其凡例稱庚申之秋炎武自華隂寄左傳注數十則蓋是時杜解補正尚未成也鶴齡斥林堯叟音義之陋所取僅三四條持論極允至孔頴達正義家絃户誦久列學官斷無讀注而不見疏者乃連篇采掇殊屬贅疣至襄九年傳閏月當作門五日本為杜注乃引以補杜尤為牀上牀矣他如於定公八年傳謂公山不狃之意在於張公室陽虎之意不在公室但欲假公室以制三桓為利而已定公十二年傳則云公山不狃叔孫輒之徒據費已畔説者謂叛季非叛魯其説非也彼稔見三家不臣之迹尤而效之藉口於張公室耳云云是一事而臧否頓殊又如莊公二十二年傳引史記正義以未羊巽女為薑姓之訓於昭九年傳又續引汪琬之説駁張守節失左氏之指是一義而去取逈異皆未免於小疵然其中如引鬭辛以駁伍員之復讐天經地義為千古儒者所未發引定公五年文公十七年二傳證公壻池非晉侯之壻引檀弓越人弔衛將軍文子事證秦人歸僖公成風之襚引漢書王嘉傳證屈蕩尸之當作户之之類亦具有考證雖瑕瑜並陳不及顧炎武惠棟諸家之密而會稡衆長斷以新義於讀左傳者要亦不為無補焉乾隆四十六年閏五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀讀左日鈔凡例左傳之文先經以始事後經以終義蓋純以史事解經者也其解之得失余春秋集説已詳辨之此書只略舉其槩爾左氏論人論事時有悖于聖人者啖叔佐助趙伯遁匡劉原父敞葉石林夢得趙子常汸陸貞山粲王方麓樵諸家辨之頗悉今多采用學者母耽其文之博麗而昧其義之踳駮斯為善讀左者矣會盟戰伐及月日人名地名之類有經文不書而傳特詳之者此正可推求筆削之旨陳正齋傳良趙子常專從不書取義最得微旨今備録其説為解經翼輔杜氏預注得孔氏潁逹疏而明然鄭玄賈逵服虔王肅劉炫諸儒之説亦不可盡廢今博引而加以折衷其注疏解經之失已辨于集説者此不重及林堯叟注繁蕪無足取坊刻竟與杜注並行且兩注混淆無别殊可恨今盡汰之其有當者間存一二春秋人物髙下古今諸儒論之悉矣又海虞陳氏輯左氏兵法為一書甚備余廣搜諸説附以愚得少資學者見聞亭林顧先生去秋自華隂寄余左傳注數十則析疑正舛皆前人未發時此書已刻逾半不及纂入間取三傳三禮注疏閲之尚多可録者因復綴緝與亭林所貽彚成二卷附之簡末他日有好古君子刻左傳全注以余書參和入之是所望也辛酉七月朔愚菴朱鶴齡書
