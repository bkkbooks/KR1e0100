body:
  text: 讀左日鈔卷十吳江朱鶴齡撰十八年萇𢎞曰毛得必亡是昆吾稔之日也注稔熟也侈惡積熟以乙卯日與桀同誅疏詩云韋顧旣伐昆吾夏桀共桀同文又云乙卯亡知以乙卯日與桀同誅也陸粲曰毛得之亡以濟侈於王都惡在日之吉凶也史遷稱萇𢎞明鬼神言方怪用是見殺以此言觀之遷語亦有自云梓愼登大庭氏之庫疏先儒舊説皆云炎帝稱神農氏一曰大庭氏服䖍云在黄帝前遂不與亦不復火胡宏曰禆竈所言葢以象推非妄而鄭不復火者子産當國方有令政此以德銷變之驗也使子寛子上廵羣屏攝注屏攝祭祀之位疏子寛游吉之子駟帶字子上六年死矣此别是一人楚語説事神之禮云屏攝之位壇場之所知屏攝是祭祀之位也鄭衆云攝攝束茅以為屏蔽其事或然按國語注引周氏云屏者并攝主人之位韋昭謂屏屏風也攝形如今要扇皆所以分别尊卑為祭祀之位近漢亦然周禮疏又引服氏云屏猶幷也謂攝主不備并之其位不得在正主之位引曾子問攝主為證畧同周氏説今未詳孰是備存待考使祝史徙主祏於周廟注祏廟主石函周廟厲王廟也疏每廟木主皆以石函盛之當祭則出之事畢則納於函藏於廟之北壁内范甯云天子主長尺二寸諸侯主長一尺禳火於𤣥㝠回祿注𤣥㝠水神回祿火神疏周語夏之亡也回祿信於黔隧不知回祿何人或曰楚之先吳回為祝融回祿即呉回也六月鄅人藉稻疏服䖍云藉者耕種於藉田也記云天子田藉千畝諸侯百畝多寡不同其禮則一説者以藉為藉稻又轉為履行由未考服説大人患失而惑又曰可以無學言大人畏失衆心而惑於其説亦云可以無學杜解不明其庭小注庭蒐場也陸粲曰庭謂廟寢之間以其小不便於蒐當除之使廣而大叔不忍毁廟故過期三日也子産使從者止之曰毁於北方按昭十二年鄭簡公卒將為葬除及游氏之廟云云與此傳相類疑實一事也魯鄭異國傳聞不同或以為葬時事或以為蒐時事左氏遂兩記之耳許不專於楚鄭方有令政邵寳曰當是時許遷於葉矣猶以舊國故不專心事楚以不專心事楚之許而不禮方有令政之鄭鄭得晉助而伐之不難矣此所以欲遷許也許曰余舊國也鄭曰余俘邑也陸粲曰襄十一年傳晉東侵舊許注云許之舊國鄭新邑葢許遷而鄭得之故今許人謂鄭曰爾之地余之舊國也鄭人謂許曰爾乃余俘邑言其兩不相下耳若如注謂許先鄭封而自稱舊國則鄭亦豈謂余俘邑乎十九年太子奔晉邵寳曰止悔而奔以死非不孝子也而不知重其親不知重其親乃無父之漸故春秋謹之若左氏謂舍藥物可也此因噎廢食之論若大城城父而寘太子焉史記正義括地志城父故城在許州葉縣東北四十五里卽杜預云襄城城父縣也此二五處申生之故智紡焉以度而去之林注去卽藏也字書作弆羌莒反謂掌物也按藏弆見漢書陳遵傳以所紡纑度紀鄣城而藏之以待外之攻者欲為夫報讎師至則投諸外疏投諸外者繋繩城上而投其所垂於外婦人則隨之而出下云獻之子占明獻此婦人也劉炫以婦人不出規杜氏非其父兄立子瑕疏按世本子游子瑕並公孫夏之子杜云子瑕子游叔父未詳按下云子産以為不順則子瑕為子游叔父明矣世本之言恐不可信札瘥夭昏陸粲曰國語韋昭注狂惑曰昏疫死曰札瘥病也又君子失心鮮不夭昏注云昏狂荒之疾也杜注未名曰昏未有據且言寡君之二三臣則不得云未名矣辭客幣而報其使晉人舍之愚謂大夫繼世立嗣重事也駟偃之子雖弱乃一宗之主仍立之而相之以宗人之賢者其可也安得以叔為後乎子産秉國之成不以禮正之以致晉人来問其對客之辭誠勁君子無取焉禳之則彼其室也注淵龍之室龍鬭則當就其室而禳之二十年梓愼望氛疏服䖍云當時魯人失閏置冬至於正月之内獨梓愼知二月己丑是眞冬至故以是日望氣傅遜曰周禮注馮相氏世登高臺以望天文此固曰官之世業非因魯侯不行登臺之禮乃見鱄設諸焉愚謂子胥之進專諸欲傾身事光以遂其覆楚之謀耳然弑君何事也而可以助人謀之哉取太子欒與母弟辰公子地以為質注欒景公也辰及地皆元公弟疏定十年繼書宋公之弟辰當元公之世辰與地不得為元公弟也世族譜辰地皆元公子此注云元公弟當是傳寫誤耳按母弟謂太子欒之母弟非元公母弟也奪之司宼與鄄有役則反之無則取之奪齊豹司宼之官而與以鄄邑有征役則還其邑之賦無則取之於己杜注不明了行事乎吾將死之宗魯知齊豹之將殺其主既不能止之又不以告公孟而徒以一死責塞此貪利而輕生者死安足重乎使華齊御公孟疏使字後人妄加計華齊是公孟之臣自為公孟御非齊氏所當使也使華寅肉袒執葢以當其闕注肉袒示不敢與齊氏爭傅遜曰肉袒者明示以必死非示以不敢爭也諸臣方以忠義衛公既執葢當闕而乃不敢爭乎下云齊氏射公中南楚之背其肆亂如此豈見其不敢爭而遂少戢乎阿下執事邵寳曰阿私也阿下執事猶云私於下執事也不敢斥公為未致使故也注未致使故不敢以客禮見疏客禮見者若已致君命則享有庭實復有私覿之禮齊侯疥遂痁疏疥當作痎痎音皆説文云兩日一發之瘧梁人袁狎與魏使李繪云痎小瘧痁是大瘧此梁主説也按顔之推曰痁有熱瘧也齊侯之病本是間日一發後漸加重遂頻日發熱也今北方人猶呼痎瘧音皆又素問云夏傷於暑秋必痎瘧注痎老瘧也守道不如守官官與道有二乎栁子厚譏之當矣必非孔子之言晏子侍于遄臺子猶馳而造焉注子猶梁丘據劉攽曰樂王鮒毁叔向以平公不好賢也梁丘據不毁晏子以景公好賢也二臣皆從君者易地則皆然愚謂晏子持身儉愼非叔向所及故梁丘雖小人亦不得而間之二體三類疏樂之動身體者惟舞文舞羽籥武舞干戚風雅頌其類各别四物注雜用四方之物以成器謂樂器也傅遜曰四物當為律度量衡先儒以下有六律不應重見殊不知此以數目次第成文七音亦即上六律五聲而列之為七律度量衡所以為樂器者而可舍之乎七音陸粲曰杜注七音實采國語之文然云自午至子凡七日不同彼所言七列七同者未測杜意劉炫以此為疑孔疏謂尚書國語俱有七義事得兩通故杜兼而取之此曲説也按諸史樂律志黄鐘為宫太簇為商姑洗為角林鐘為徴南吕為羽應鐘為變宫㽔賔為變徴通典注自殷以前但有五音自周以来加文武二聲律吕新書宫與羽角與徴相去有二律音節逺故角徴之間近徴收一聲比徴少下曰變徴羽宫之間近宫收一聲少髙于宫曰變宫也八風疏東方曰谷風又曰明庶風東南曰清明風東北曰條風又曰融風南方曰景風又曰凱風西方曰閶闔風西南曰凉風西北曰不周風北方曰廣莫風季萴因之顧炎武曰有勝國有因國周禮士師若祭勝國之社則為之尸書序湯既勝夏欲遷其社是也王制天子諸侯祭因國之在其地而無主後者左傳齊晏子對景公曰昔爽鳩氏始居此地季萴因之有逢伯陵因之蒲姑氏因之而後太公因之是也寛以濟猛猛以濟寛愚謂後世如沛公之代秦以寛濟猛者也孔明之治蜀以猛濟寛者也寛猛因乎其時非謂一人之身乍猛乍寛也胡氏疑仁人為政豈有先致慢殘又從而濟之者以此為非孔子之言溺其㫖矣子産卒仲尼聞之出涕曰古之遺愛也史循吏傳子産治鄭二十六年而卒丁壯號哭老人兒啼曰子産去我死乎民將安歸孔叢子子産死鄭人丈夫捐珮玦婦人含珠玉夫婦巷哭三月不聞琴瑟之聲眞徳秀曰子産相鄭歴簡定獻聲四公凡四十餘年方其始也内則諸大夫爭權互相誅殺外則晉楚之兵無歲不至城下國危且弱幾不可為矣子産於此從容回斡皆有次第其於内也務息諸大夫之爭而去其尤甚者焉根之難㧞者不輕動以激其變惡之既稔者不緩治以失其機有勸懲之公而無忿疾之過故自子南逐子晳死强宗帖然順從無復有梗其政者其於外也事大國以禮而不苟狥其求故終其身免於諸侯之討而鄭能以弱為强其所為惟作丘賦鑄刑書見譏當世然夫子特以古之遺愛許之豈非深諒其心耶至于用人各以所長葢深得聖門器使之道春秋名大夫未有能及之者二十一年天王將鑄無射疏其聲於律應無射之管故以律名名鐘襄十九年季武子作林鐘亦是鐘聲應林鐘之律也無射之鐘在王城鑄之敬王居洛陽葢移就之也秦滅周鐘徙長安及劉裕滅姚泓移於江東歴宋齊梁陳猶在東魏使魏收聘梁收作聘游賦云珍是滛器無射高懸是也及開皇九年平陳又遷西京置太常寺時人共見至十五年敕毁之使有司以齊鮑國歸費之禮為士鞅疏周禮掌客諸侯牢禮各以其命數卿大夫牢禮當亦如之計鮑國齊卿不過三命於法當三牢而魯人失禮為鮑國七牢下云加四為十一知本七牢也按劉炫云聘禮卿之饔餼五牢則牢禮不必如其命數鮑國禮當五牢此但加二牢耳乃與公謀逐華貙愚謂貙與多僚皆費遂之子也費遂平時不能釋其兄弟之怨及知多僚為讒又不能告於公而罪之反與公謀逐貙激成他日讎殺之禍南里之叛雖發難張匄費遂安得辭其責二至二分日有食之不為災日月之行分同道也至相過也其他月則為災陽不克也故常為水疏二分晝夜等似其同一道二至長短極並行則相過以為理必相侵故言不為災劉炫云此皆假其事以為等差其實災之大小不如此也陸粲曰日食至分不為災古未有為斯言者也是時意如專國前此既廢伐鼓用幣之禮叔孫知其異志矣梓愼葢探知微㫖欲抹殺災異以順强臣君子疾之愚按二十四年五月日食梓愼曰將水其年以旱大雩則常為水之言亦不大驗㕑人濮曰注㕑人濮宋㕑邑大夫宋㕑邑未詳釋文無音恐當讀八㕑之㕑黨錮傳注㕑音皮宋師之勝定謀於烏枝鳴成功於㕑人濮濮葢智士也而忠勇具足乃狥曰揚徽者公徒也注徽識也疏禮記大傳云聖人南面而治天下必改正朔殊徽號鄭𤣥注徽號旌旗之名也謂旌旗上書其官名如今之軍記令揚徽者欲知其助公多少即絳侯令軍人云為劉氏者左袒之意鄭翩願為鸛其御願為鵝陳禹謨曰傳之鵝鸛莊之鶴列意即龍虎鳥蛇類也李衛公所云後人詭設物象何止於八即此可證一端干犨御吕封人豹疏吕邑封人官名豹即下文華豹是也本或豹上有華釋例譜宋雜人内有吕封人豹華豹為一人知此本無華也不狎鄙注狎更也疏更者更逓也言汝頻射我不使我得更迭而射是為鄙夫豹服此言故抽矢而止子無我迋求枉反林注迋恐也按此即鄭風人之迋女之迋二十二年自憚其犧也疏犧者寵養祭犧之名牛馬羊豕犬雞為六牲皆用純毛犧者實用人人犧實難已犧何害疏因以犧喻寵子即以寵子為犧言寵愛為犧者當用純徳之人猶祭犧當用純色之牲也他人之有純德寵之如犧實招禍難己子之有純徳寵之如犧有何害乎犧者用人之人是對牲而言人犧實難之人是據疎外之人而言人字雖同上下意異按疏解不甚明白邵文莊云自犧者用人以下皆指人而言人犧則用在人故曰實難喻劉單之立王猛已犧則用舍在已故曰何害喻王自立子朝此較順王弗應注十五年太子壽卒王立子猛後復欲立子朝而未定賔孟感雞甚稱子朝王心許之故不應疏太子壽卒王命猛代之此鄭衆説二十六年傳云子朝干景之命則景有命矣若不命猛更命誰乎賈逵以為太子壽卒王不立適子與彼傳不應故杜不從五月庚辰見賢遍反王按見王注云見王猛葢單子立劉蚠以之見王猛亦見其時王子猛已立周本紀云國人立長子猛者是也或曰此單劉以王子猛見景王乃見之於柩前也周制踰年即位景王之崩時甫半月故不曰即位曰見王見即伊訓奉嗣王祗見厥祖之見至十一月乙酉王子猛卒己丑敬王遂即位葢王猛不成䘮景王已葬而子朝爭立攻戰倥偬故甫五日而即位以係人望後世柩前即位之禮殆昉於此歟盟羣王子於單氏注王子猛次正故單劉立之懼諸王子或黨子朝故盟之疏公羊多有次正之語故杜取為説猛為次正不知其本葢是太子壽母弟或是穆后娣姪之子或母貴也胡氏曰十五年太子壽卒至此八年不更立者以有母弟故也冬十月丁巳晉籍談荀躒納王於王城注丁巳在十月經書秋誤趙汸曰陳氏云不書晉義繋于劉單按經傳時月不同由左氏所據史籍訛舛别無考證悉仍其舊以示傳疑之法杜惟據長厯悉云經誤非也濟師取前城注濟師渡伊洛邵寳曰濟師濟籍談等之師也二十三年王師告間庚戌還吕祖謙曰此時王必自以為無假晉師故使之間而晉師因此遂還然晉師還而子朝之勢復熾若乘郊潰遂取子朝不至如後日之難也趙汸曰亂未弭而告間必二卿不親事師不肅也觀明年士景伯莅問周故晉人乃辭子朝則前此觀望可知邾人愬於晉晉人来討叔孫婼如晉晉人執之劉敞曰是年正月有壬寅朔有庚戌有癸丑傳敘邾事在庚戌之後經記叔孫如晉在癸丑之前夫庚戌癸丑四日耳邾人已能愬於晉晉人已能来討何其神速也故曰不然趙汸曰按左氏采衆事以釋經其附麗斷截皆以經為主或先經以始事或後經以終義則所記之事各有本末自不容以日月次其先後如此年傳自壬寅朔至庚戌還是記晉人圍郊本末自邾人城翼至晉人来討是原叔孫如晉之由非謂邾人城翼以後所記之事皆在庚戌後也如劉侍讀所難則作傳者必如近代所修日厯而後可士伯御叔孫疏御謂進引也引叔孫詣於獄也吳之罪人或奔或止孫武子半進半退者誘也張預曰詐為亂形是誘我也若吳出罪人三千示不整以誘楚越亦出罪人三行示不整以誘吳是也陳禹謨曰勝敵之兵必候敵亂則可乘藉非己先以亂彼之整者未易動也孫武所謂亂而取之固已雖然亂復何易一亂之後或遂至不可復收秪遺敵禽耳苻秦非永鑑哉南宫極震附子朝之南宫極因地震而死有云為雷所殛者非也吳太子諸樊入郥取楚夫人與其寳器以歸傅遜曰吳子諸樊王僚之伯父也僚子不應與伯祖同名太子諸樊四字必誤注疏皆已辨之但杜注諸樊王僚太子亦誤僚太子未聞意此即公子光光乃諸樊之子傳倒其文又妄加太字傳聞之誤耳愚按楚世家太子建母蔡女也在居巢開吳呉使公子光伐楚遂敗陳蔡取太子建之母而去即此事也太子諸樊乃公子光之誤無疑沈尹戌曰子常必亡郢穆文熈曰子囊城郢君子謂之忠囊瓦城郢沈尹戌以為必亡者共王之季楚方强而思城其國都是為防患于豫子常城郢特畏吳之偪則智略無措自保不遑其勢異故也况無極在國伍員在吳雖城百郢何益乎不懦不耆不懦不受辱也不耆不陵人也二十四年婼至自晉尊晉也按不書族者一事再見卒名之例經文往往如此傳以為尊晉非也辨詳集説陽不克莫將積聚也注陽氣莫然不動乃將積聚邵寳曰陽不克句莫又句莫然不動者積聚之形陽氣積聚故旱王樵曰梓愼言水叔孫言旱皆妄測天道或傳者因其時之旱而傅㑹之日食之示戒非為水旱也日過分而陽猶不克克必甚此流行之氣也日月隂陽之精也以精之盛衰相為虧蝕水旱之故不相及也二十五年為六畜五牲三犧注六畜馬牛羊雞犬豕五牲麋鹿麏狼兔三犧祭天地宗廟三者謂之犧疏周禮膳夫膳用六牲庖人掌共六畜鄭𤣥云六牲馬牛羊豕犬雞六畜即六牲也始養之曰畜將用之曰牲十一年注云五牲牛羊犬豕雞此異彼者以上文已言六畜故别用鄭𤣥六獸之説去野豕而以麋鹿麏狼兔當之陸粲曰六畜五牲三犧從所用而異號也杜解五牲前用爾雅後用鄭𤣥於彼所釋六者之名各損其一割裂甚矣服䖍解雁鶩雞為三犧尤非三犧猶詩言三物耳傅遜曰犧牲皆以薦宗廟神祇為名未有及野禽獸者賓客牢禮亦然野禽獸止供脯醢之用太叔但舉大者言之耳以象天明注六親和以事父若衆星之共辰極傅遜曰上注以天明為日月星辰何乃頓異其説陸子餘云言其親疎倫序比象於天文之行列是也以制六志疏此六志禮記謂之六情在己為情情動為志其實一耳吾聞文武之世穆文熈曰乾侯之辱其兆早見於文武之時若然則昭公有以藉口而季氏亦可以無尤矣此必後人以昭公之事衍而成謠𫝊㑹其説季公鳥季公亥季公展等王樵曰魯三家以次為氏季氏自行父至季孫彊並稱季孫氏以傳家故也如季公鳥公亥之類凡支庶並止稱季以别之季氏介其雞疏賈逵云擣芥子為末播其雞翼可以坌郈氏雞目杜用此説也鄭衆云介甲也為雞著甲髙誘注吕氏春秋云鎧著雞頭杜引或説以膠沙播之葢以膠塗雞之足爪然後以沙糁之令其涩得傷彼雞也以郈氏為金距言之則著甲之説是萬者二人其衆萬於季氏萬萬舞也公萬止二人餘皆萬於季氏葢季氏私祭家廟與禘同日此之謂不能庸先君之廟注不能用禮也葢襄公别立廟陸粲曰春秋禮廢典杞葢有獨豐於昵者如閔二年禘於莊公趙匡云不及於祖也今此禘於襄公亦然杜皆謂别立廟夫武宫煬立經皆書之别立廟何以不書乎叔孫昭子如闞傳者記此語非但明叔孫昭子之不知謀也亦深致惜之之意當時使昭子而在必能力阻昭公即使其謀遂行而鬷戻之甲必不至陷西北隅以入矣鬷戻之甲不興則孟孫氏亦必不為公徒之伐而平子其可逐矣次于陽州齊侯將唁公于平隂公先至于野井邵寳曰平隂去齊逺陽州又逺野井去齊則近矣齊侯將唁公于平隂而魯侯先至野井齊侯言為近之故而使有待於平隂所謂寡人之罪者以此通外内而去君君將速入非通内外不能入君非去君不能通内外去離也離君所也子家子自言不可與盟之故如此公徒將殺昭子疏昭子謀歸安衆而後納公則獨公得入從公伐季氏者不得入故欲殺昭子也愚考昭公之不得入公徒為之也叔孫昭子將安衆而納公則公徒欲殺之子家子勸公以一乘入於魯師則公徒又脅之余嘗疑其故以為鄭厲公衛獻公之出奔其負羈絏以從者何未有是也及觀意如之貨子猶於齊賂士鞅士晉然後知公徒之為即意如使之也意如以姦濟其逆其於公之出也必隂置私人為之扈從而實以脅制之使不得返國迨後䘮及壊隤子家子之言曰貌而出者入可也宼而出者行可也所云貌而出者非即季氏之私人耶使祝宗祈死戊辰卒叔孫昭子之不忍自同於季氏而力謀納公正也不忍見欺於季氏而反而自裁忠也其不剪季氏之羽翼而徐為圖者自諒其力之不足以去季氏也毋亦勢使然耶左師展將以公乘馬而歸疏劉炫云左師展欲共公單騎而歸此後世騎馬之始按公羊傳齊侯唁公野井言以鞌為几與此言乘馬相合當時固已有單騎者唯是楄柎所以藉幹者疏説文楄方木也幹脅也木以藉幹明是棺中笭牀二十六年君若待於曲棘疏宋公佐卒於曲棘杜云曲棘宋地陳留外黄縣城中有曲棘里今齊侯欲納魯君從齊向魯必不逺渉宋地當是齊境内地名十年桓子召子山而反棘焉杜云齊國西安縣東有棘里亭此即彼棘也本無曲字渉上卒於曲棘誤加耳師及齊師戰於炊鼻趙汸曰炊鼻不書為魯諱以臣拒君也故齊師圍成特書公以見義杜云非公命不書非也孫琮曰炊鼻之戰不書以為不成戰也子猶入平子之貨其止齊侯納公歸之於天懼之以死而季有外援矣公孫朝偽降齊人而魯備已成野洩冉竪顔鳴等皆效命於季不力戰以犯齊怒而季有内助矣季氏外内皆固公則叔孫婼已死子家覊弗聽而公徒臧昭伯之類皆妄庸人也往歌来哭能不應乎童謠耶繇朐其俱反汏輈七必履反矢鏃也入者三寸按朐軥字通用説文云軥軛下曲者襄十四年傳射兩軥而還邵寳曰矢之来也由車軛激從車轅之上矢鏃之入楯瓦者三寸此覆言中瓦之狀也甚口疏甚口大口也劉用熈曰甚口有口才也按上文陳武子失弓而罵故此言甚口猶史記云有口也劉子以王出疏二十三年傳單子劉子樊齊以王如劉是從劉而居狄泉自狄泉又居於劉今為子朝所逐葢自劉而出也棄劉而去故王城人焚劉按服䖍云出成周也非是下傳云十一月癸酉王入於成周則其時成周尚未為王有王入於莊宫注莊宫在王城趙汸曰傳言敬王之亂歴四年而後定故經不與單劉以復辟之義而深罪晉萬民弗忍注不忍害王也按弗忍與夏書因民弗忍距於河同義劉炫云不忍者不忍王之虐也猶云不堪杜氏注非諸侯釋位以間王政注間猶與也去其位與治王之政事此間王政與下文間王位閒先王之閒同葢間是參與之義善惡皆可言之㰎王奸命注㰎王幽王少子伯服也疏束晳云舊説㰎王為伯服伯服古文作伯盤非㰎王也愚按傳於㰎王不言何人曰奸命必不當立而立者杜氏以為伯服則非也幽王在位十一年三年嬖褒姒伯服之生不過數齡且幽王以褒姒亡國褒姒既為犬戎虜去必無復立其子之理竹書紀年幽王見弑申侯魯侯許男鄭子立太子宜臼於申虢公翰立王子余臣於㰎是為㰎王後為晉文侯所殺帥羣不弔之人注弔至也傅遜曰弔訓至於此難通葢言樂禍之徒不相弔恤也矯誣先王注先王謂景王矯誣先王葢言矯景之命立猛耳閔子馬云干景之命可證劉炫以為先世之王非也王后無適則擇立長疏公羊傳云立適以長不以賢立子以貴不以長明母貴則先立也子朝之母必賤於猛母故專言立長之義不言母之貴賤耳天道不謟注謟疑也按字書謟徒刀切疑也從舀舀音由與諂諛之謟不同二十七年傳子家子曰天命不謟久矣同此謟字傳文誤作慆陳氏而不亡則國其國也已眞徳秀曰方田氏之初不過以小惠市於國人而已使景公用晏子之言修明君臣上下之禮使惠施出於主而臣不得私利權歸於上而下不得擅則大分明而人心一雖百田氏其能竊國乎景公善之而不能用且厚歛焉是驅其民而歸之也二十七年使公子掩餘公子燭庸帥師圍潛注二子皆王僚母弟按史記索隠掩餘燭庸二公子皆王僚弟此賈逵説仕預從之而昭二十三年傳光帥右掩餘帥左杜又云掩餘吳王壽夢子考系族譜云二公子並壽夢子若依公羊僚為壽夢長庶則與系族譜合遂聘於晉以觀諸侯疏季子不知聘幾國經不書来必不至魯檀弓云延陵季子適齊於其反也葬子嬴博之間鄭𤣥云魯昭公二十七年聘於上國是也帥都君子注都君子在都邑之士有復除者疏都邑之士以君子為號故知有復除謂優復其身除其徭役也我王嗣也史記王僚夷昧子公子光諸樊子王應麟曰按公羊傳云僚者長庶也襄三十一年傳狐庸對趙武謂夷昧甚徳而度天所啓也必此君之子孫實終之若以僚為夷昧子不應此言服氏注亦從公羊愚按杜氏言光吳王諸樊子是用史記為説光云王嗣者言已是世適之長孫應嗣也惟光為諸樊冡子僚不當越次而立故王僚之弑春秋不歸獄於光而但書吳弑其君僚也從史記得之母老子幼王肅曰此專諸言王母老子弱也史記索隠云玉肅解與史記同於理無失服䖍杜預見左傳下文云我爾身也以其子為卿遂强解是無若我何猶言我無若是何語不近情過為迃回非也愚按吳越春秋公子光具酒請王僚僚白其母母曰光心氣怏怏常有媿恨之色不可不愼此僚母尚存之證應從史記無疑抽劔刺王鈹交於胷遂弑王愚謂光之弑僚人以為札不宜讓國以起亂吳之亂札安能逆料之於前乎餘祭夷昧之時光年尚少至僚立時光有國之心未嘗一日忘觀其乘間而發斯可見矣光既不能忘吳而札之力又不足以制光於是委蛇其間甘蹈子臧之節此札之所以為智也札之讓善矣然律以太伯仲雍逃荆蠻之義則壽夢方沒之時札必當逃吳而去之苟一日立於吳廷國人必持以次傳位之議餘祭夷昧所以不當立而立也即不然於夷昧之嗣亦必當請以闔閭為世子不從則力爭之曰光為世適國固光之國也光不立必有覬王位者是父子兄弟相殺無已時也位定而後退耕於延陵之野如是則王僚不得立而吳可免簒弑之禍矣惜乎札之智不足以及此取五甲五兵曰寘諸門無極誠讒慝之魁然其計甚疎五甲五兵豈能為亂子常遽聽之而不察愚至此乎國人投之國人取菅秆投之而不舉火知其冤也事君如在國趙汸曰事君如在國即後文賈馬歸從者衣屨之類此季孫之奸也杜氏乃以書公行告公至當之謬矣進胙者莫不謗令尹進胙國中祭祀也謗詛於進胙之時欲神之聽之也惡之極矣使宰獻而請安注比公于大夫也禮君不敵臣宴大夫使宰為主獻獻爵也請安齊侯請自安不在坐也疏劉炫云燕禮司正命卿大夫以安此傳所言亦當如彼請魯侯自安耳杜云齊侯不在坐非也趙汸曰按下文請使重見則齊侯欲自安可知故子家得以公出使齊侯在坐魯君豈遽出也仍從杜為是讀左日鈔卷十
