body:
  text: 讀左日鈔卷八吳江朱鶴齡撰二十九年祓殯而襚則布幣也疏先使巫祓除殯之凶邪而行襚禮陳其衣物與行朝之時布陳幣帛無異言俱無咎患也檀弓説此事同所異者此言請襚彼言請襲此言祓殯彼言祓柩耳禮死而浴浴即襲襲後始小殮小殮乃殯使巫以桃茢先祓殯注茢黍穰疏茢是菷蓋桃為棒也杜云黍穰者今世所謂苕菷或用薍穗或用黍穰二者皆得為之穰禾莖也陸粲曰説文黍穰也苕也二字自别苕亦作苕爾雅謂之薍祓殯者以苕為菷非黍穰也杜誤以為疏因傳會之愚按鄭注周禮云茢苕菷也杜注誠誤啖助曰左氏言楚使公襚云云夫以楚之強僣豈受魯辱者又言楚人悔之則楚非不知禮何以無討乎蓋魯以親襚為辱故妄為此説史因妄記之耳王樵曰楚康之卒公尚在途及漢聞喪欲反可證也逮公至楚則殯已久矣安得親襲及柩在地而祓之乎射者三耦燕禮有射疏周禮射人云諸侯之射以四耦此三耦者彼是畿內諸侯或臣與君異不尚取之注不尚叔侯之取貨疏服虔云不尚尚也尚當取女叔侯誅之下文無寧夫人而焉用老臣無寧寧也寧自取夫人將焉用老臣乎杜氏以其言太悖故改之劉炫謂夫人愠而出言其悖固宜服氏之解未必非也虞虢焦滑注焦在陜縣括地志焦城在陜州城內東北百步因焦水為名愚按史記武王克商封神農之後于焦則非姬姓也豈有兩焦國乎始基之矣猶未也注猶有商紂未盡善陸粲曰賈逵云未有雅頌之成功是也二南周詩何關商紂乎險而易行注險當為儉字之誤也愚謂魏風儉嗇作儉為是但杜云大而約則儉節易行合解二句反不明白其周德之衰乎注衰小也疏服虔云此歎變小雅也周德衰謂幽厲之時先王遺民謂文武也劉炫以服言為是愚謂杜解僻甚當從服説無疑其文王之德乎愚謂樂工所歌未必全詩大小雅篇什甚多疑只科舉數十章以示大略故于小雅則歌其變者大雅則歌其正者聞歌變小雅則歎周德之衰聞歌正大雅則美文德之盛三復文義本自了然杜氏以小雅不應偏歌不善者故其解難通葉夢得曰札以小雅為周之衰大雅為文之德者當時所歌之詩小雅皆變雅大雅皆正雅也如楚莊王言武王克商作頌亦與今詩次序不同蓋雅以正變為小大頌以所作為先後者詩未刪之序也論政事之廢興而以所陳者為大小推功德之形容而以所告者為先後孔子刪詩之序也五聲和八風平節有度守有序按此四語方以頌言以上皆言作頌之本蓋頌告成功故先推其本言之見舞象簫音朔南籥者疏樂以舞為主歌在堂上舞在庭郊特牲云歌者在上匏竹在下貴人聲也樂貴人聲先歌後舞故魯為季札先歌諸詩而後舞諸樂其實舞時堂上歌其舞曲也按周頌維清奏象舞也即此象簫之舞南籥者二南之籥即小雅所謂以雅以南以籥不僭者也簫是舞竿舞者所執下文韶簫與此象簫音義皆同書稱簫韶乃舜樂之名辨詳余尚書埤傳辨而不德必加于戮注辨猶爭也疏爭謂孫林父訴衛君于晉書曰出奔罪髙止也注實放書奔所以示罪疏窘迫而奔以禮見放俱去其國春秋變放言奔以止為重也夫立功立事者國之厚益而身之表的也表髙的明雖婦人猶欲彎弓而況當塗是以君子慎之三十年其季于今三之一也邵寶曰季謂四百四十五甲子之末也三之一謂三分六十日之一實二十日也蓋自甲子厯甲戌盡癸未又曰綘老既為隱語師曠史趙因之曠以故事趙以字畫皆隱語也有二首六身下二如身是其日數也注下亥字上二畫竪置身旁如身當為字疏按字書古之亥字體殊不然蓋春秋之時亥字有二六之體異于古制其説文是小篆之書又異于此愚謂古文亥字上二畫象一男一女下從三人字其形如算之六下二謂以上二畫移而下之如身者即如其三六之身也蓋算法必橫視故杜以竪置身旁為言依本文解之自成二萬六千六百六旬矣劉待制邵文莊之説太迂曲故不録然則二萬六千六百有六旬也林注此説四百四十五甲子其季于今三之一也之日數四百四十五甲子合得二萬六千七百日以其末三分六甲之一故少四十日實得二萬六千六百六十日也趙孟問其縣大夫則其屬也注屬趙武疏諸守邑之長公邑稱大夫私邑稱宰此縣大夫綘縣之大夫也綘非趙武私邑而云其屬者蓋諸公邑國卿分掌之而此邑屬趙武也廢其輿尉疏服虔云輿尉軍尉主發衆使民以綘縣輿尉役使孤老而廢之鳥鳴于毫社疏此鳥鳴于魯國之毫社也服虔云殷宋之祖也故鳴于其社伯姬魯女欲使魯往悟伯姬也待姆也注姆女師疏成公九年伯姬歸于宋至襄公三十年伯姬卒凡三十九年伯姬亡年蓋幾六十矣猶待姆而逮于火吁其賢哉王應麟曰先儒以宋伯姬為婦人之伯夷左氏謂女而不婦非也陸淳又以為非可繼可傳之道胡文定譏之淳黨叔文而不知羞固宜有此論降户江反婁中而旦注降婁奎婁也周七月今五月降婁中而天明疏降婁奎婁釋天文孫炎曰降下也奎為溝瀆故稱降也月令仲夏之月旦危中者據夜有長短及星度有廣狹是細計之數傳據大略而言故與月令不同劉炫以月令之文而規杜失非也取我衣冠而褚之説文褚衣之槖也三十一年繕完葺牆李涪曰牆壞葺之而已何云繕完當是繕宇葺牆宇字誤為完也按此説是釋文屋四垂曰宇寡君使丐請命疏丐士文伯名也晉宋古本及釋例皆作丐解者曰文伯是范氏之族不應與范宣子同名作丐是也按士文伯字伯瑕古人名字多相配楚令尹陽丐字子瑕與文伯名字正同又鄭有駟乞字子瑕丐與乞義同則作丐者是又按魯有仲嬰齊是莊公之孫又有公孫嬰齊是文公之孫仲嬰齊與公孫嬰齊為從祖同時同名鄭有公孫段字子石又云伯石印段字伯石傳謂之二子石印段即公孫段從父兄弟之子尚同名字伯瑕與宣字何廢同乎展輿因國人以攻莒子趙氏伯循以經不書展輿弒疑傳文誤以之字為以字辨見集説書曰莒人弒其君買朱鉏注疏作鉏言罪之在也劉敞曰言罪在鉏則是父有罪子得而弒之也亂天地之性莫甚焉延州來季子其果立乎公羊傳公子光弒王僚季子去之延陵終身不入吳國札封延陵號延陵季子而左傳每稱延州來季子史記注云季子本封延陵後復封州來故曰延州來季子愚按成七年吳入州來杜預云州來楚邑淮南下蔡縣是昭十三年傳吳滅州來二十三年傳吳伐州來則州來本楚邑吳伐滅以封季子也然襄三十一年傳趙文子問屈狐庸曰延州來季子其果立乎襄公時已稱延州來季子又疑前注未的所以春秋釋例土地名云延州來闕以愚臆之州來與鍾離鄰接皆吳楚邊邑吳封季子必在昭定間是時吳楚日尋干戈豈州來反覆藉季子以鎮撫之歟抑季子知夫差將亡吳故逺去之而徙州來歟若趙武時不應早稱延州來恐後人追述之耳昭公元年其敢愛豐氏之祧注祧祖廟按公孫段是穆公之孫子豐之子其家惟有子豐之廟不應有祧此祧字當從魏鶴山廟外兆域之説楚公子圍設服離衛注設君服離陳也陸粲曰離猶禮記離坐離立之離兩相麗也疏云兩人一左一右相麗而行故稱離衛吾代二子愍矣注二子謂王子圍及伯州犂按杜解偏于楚服虔曰代伯州犂憂王子圍代子羽憂子晳漢五行志引應邵解與服同當從之衛而惡之吾又甚焉言既為國衛而不能蔽其惡則吾之咎又甚于壞墻矣舊注失解叔出季處疏季氏世為上卿法當上卿守國次卿出使然必須上卿者上卿非不使舉之表旗注旌旗以表貴賤按表旗謂諸侯設旗為表覲禮諸侯覲天子入壝門或左或右各就其旗而立是以旗表位也周有徐奄注二國皆嬴姓徐即淮夷疏服虔云徐即魯公所伐徐戎也愚按費誓淮夷徐戎並興則徐非即淮夷也僖公時楚人伐徐杜云下邳僮縣東南有大徐城近淮旁成王時之徐蓋亦在彼地也奄國詳余尚書埤傳具五獻之籩豆于幕下注朝聘之制大國之卿五獻疏聘禮卿聘饔餼五牢故卿皆五獻春秋之時大國之卿乃得從卿禮若次國之卿依大國大夫之制惟三獻故此注云大國之卿五獻又昭六年傳注云大夫三獻也禮終乃宴注卿會公侯享宴皆折俎不體薦按宣十六年傳云享有體薦宴有折俎此王室之禮侯國亦當然杜云享宴皆折俎不體薦者公當享卿當宴卿雖有享名實用宴禮不體薦也大國省穡而用之省視也穡收也用用以薦也何實非命言無敢不承也子皮賦野有死麕九倫反之卒章注野有死麕卒章曰舒而脫脫兮無感我帨兮無使尨也吠喻趙孟以義撫諸侯無以非禮相加陵趙汸曰尨以喻楚時諸侯惡公子圍故欲趙孟安徐馴弭之觀答賦之語可見杜解謬矣吾與子辨冕端委疏服虔云禮衣端正無殺故曰端文德之衣尚褒長故曰委乃執子南而數之曰愚謂二人之罪均為姦國之紀子産逐子南而不逐子晳者蓋以子晳之惡其罪不止逐又一時不容並逐故姑遲之俟其再發耳周公殺管叔而蔡蔡叔注蔡放也疏説文􅔁悉􅔁散之也從米殺聲然則􅔁為放散之義故訓為放也𨽻書改作已失本體寫者全類蔡字歸取酬幣終事八反疏反者謂車反復其故處耳每于十里置車八乘后子初發幣自齎其一以為初獻餘則以次續至至則車反比享終八車皆反此謂之八反非反至雍也此幣發雍計已多日設享之時使之相續而來每獻皆到以示已之豪富按禮享公侯九獻后子自齎其一續送其八而享禮成矣八反用車八百乘其二百乘以自隨故上云其車千乘鮮不五稔注少尚當厯五年多則不啻按杜解甚拗韋昭云少不五年而亡應從之亡謂其君之亡非謂國亡也陸粲曰針也秦之貴介弟雖出奔於義未絶也而斥言其君之無道其猶在張躍之後乎五稔之云抑又怪而不足譏矣乃毁車以為行五乘為三伍注乘車者三人五乘十五人今改去車更以五人為伍分為三伍韜靲內篇晉舊法用周制五人為伍記三代至春秋用兵率以車戰秦漢而後以騎兵為便故兵車之制車戰之法今皆不傳漢有武剛車晉有偏廂車不過行載輜重止為營衛而已其出擊仍以騎兵故能制勝房琯擊安祿山用車戰法卒以取敗蓋春秋時敵國皆車戰又皆戰于平原曠野其兵又皆素練車戰者故宜之琯以車賊以騎時異勢殊故用有利鈍非車之罪也專為右角參為左角偏為前拒按周禮五人為伍二十五人為兩無專偏參之名此蓋臨時所設車與人數不可得知后帝不臧疏襄九年傳稱閼伯為陶唐氏火正知后帝是堯唐人是因以服事夏商疏唐人謂陶唐子孫二十九年傳云陶唐既衰其後有劉纍纍雖遷魯子孫仍在大夏故厯夏而及商也其季世曰唐叔虞注唐人之季世其君曰叔虞疏服虔以為此句即下邑薑所生者杜以傳説季世明是唐人之末世邑薑子叔虞乃晉之始祖豈得謂之季世乎及成王滅唐而封大叔焉史記索隱唐本堯後封在夏墟都在鄂及成王滅唐分徙之于許郢之間故春秋有唐公今之唐州也按史記武王克商封堯之後于薊蓋堯後所封不一國薊樂記作祝帝用嘉之封諸汾川注帝顓頊疏顓頊為帝承金天之後臺駘是金天之孫為臣宜當顓頊故以帝用嘉之屬顓頊耳于是乎禜之注禜祭為營攢用幣以祈福祥疏營攢用幣出賈逵注其祭非有常處臨時營其地立攢表用幣告之攢聚也于是乎節宣其氣王樵曰凡人形神有限不可久用神久用則竭形太勞則敝不可以久勞也神不用則鈍形不用則痿不可以久逸也聽政訪問修令安身四時遞易所以節其勞而宣疏其氣今無乃一之一四時也馳騁田獵甘酒嗜音恆舞酣歌勞非所勞也深居簡出日晏視朝逸非所逸也內官不及同姓其生不殖顧炎武曰姓之為言生也天地之化專則不生兩則生故叔詹言男女同姓其生不蕃而子産亦云內官不及同姓其生不殖是知禮不娶同姓者非但防嫌亦以戒獨今君內實有四姬焉王應麟曰晉侯四姬子産有男女辨姓之言考穆天子傳穆王有盛姬蓋周禮之壞自王朝始又曰叔向習于春秋為平公之傳而不能諫四姬之惑何也曰正己則可以格君叔向娶申公巫臣女違母之訓而從君之命己則不正其能正君乎先儒有言寡欲之臣然後可言王佐樂所以節百事也故有五節遲速本末以相及也中聲以降五降之後不容彈矣王樵曰女當有節其理難言故喻之以樂先王制外樂以禁內情所以為百事之凖節也故樂有五聲之節其聲有遲有速由本而末緩急相及使得中聲之和降者聲下而息也五聲一周聲下而息前聲罷退以待後聲非作樂息也五降之後聲一成而曲未成當從上始不容更復彈作于是有煩手淫聲慆堙心耳乃忘平和君子弗聽也至是而手妄彈擊是為煩手所彈擊非復正聲是為淫聲淫聲之慢塞人心耳使人忘失和平之性故君子不聽按中聲五降則太細而不成聲矣強欲成聲將雜音並進非樂之正樂記云鄭音好濫淫志衛音趨數煩志鄭衛之樂是煩手淫聲也劉炫云此四句説降後不彈之意又按湯誥毋即慆淫孔傳云慆慢也此言慆淫其心堙塞其耳應從書傳解無疑杜氏未見古文尚書故慆訓為藏耳今正之分為四時序為五節王樵曰六氣並行無時止息但氣有溫暑涼寒分為四時春夏秋冬也序此四時以為五行之節計一嵗每行得七十二日有餘土分王四季故每季之末有八十日也女陽物而晦時愚謂陽即陽淫熱疾之陽惑女色者必致內熱之疾故曰陽物接御之期必在于夜故曰晦時杜氏以女常隨男為陽物失其旨矣使后子與子干齒注以年齒為高下傳遜曰齒猶齊列也此以班餼論何及其年之高下乎趙孟適南陽將會孟子餘注孟子餘趙衰趙武之曾祖按杜氏以孟子餘為一人蓋子餘乃趙衰字孟是長幼之序也服虔云孟是趙盾非也若果趙盾不應序于子餘之上二年見易象與魯春秋曰周禮盡在魯矣王應麟曰晉語司馬侯云羊舌肸習于春秋楚語申叔云教之春秋皆在孔子前所謂乘檮杌也魯之春秋韓起所見公羊傳所云不修春秋也易象春秋總稱周禮可證春秋所書皆遵周公之典制有嘉樹焉宣子譽之王應麟曰服虔云譽遊也宣子遊其下夏諺曰一遊一豫孟子注引韓宣子譽焉愚按古譽與豫同蓼蕭詩是以有譽處兮潁濱蘇氏傳譽豫通凡詩之譽皆有樂也與服氏此解合畏大國也猶有所易是以亂作少薑謂晉以公族大夫逆齊以上大夫送畏大國而易其禮制故有此執辱此蓋為反語以悟晉侯言外見送過逆班而乃以為罪乎亂作二字泥之則難通乘遽而至使吏數之愚謂子晳之惡極矣使諸大夫殺之則國法不行故順國人之情而乘遽以至急疾誅之蓋間不容髮之勢也除惡固有機哉國則不共陸粲曰此蒙上猶曰不共言之即以齊國為不共亦非使人之罪注云晉國不共非也三年而數于守適疏劉炫云禮數同于守內官之適夫人按釋文數所具反徐所主反依後音當如數其貴寵之數數于守適猶曰齒于守適耳陳氏三量豆區釡三等之量皆登一焉鐘乃大矣注登加也加一謂加舊量之一也以五升為豆五豆為區五區為釡則區二斗釡八斗鐘八斛傅遜曰如杜注鐘自六斛四斗大至八斛恐陳氏雖務厚施亦不至此豆區釡三量蓋皆加十分之一則鐘比舊亦大六斗四升非本四而加一為五也據今世用量以加一為極大陳氏加一以貸而以平量收之此于事情為得燠休之按杜氏讀如嫗詬賈逵云燠厚也休美也王若虛以為溫煦安息之意讀如本字自通三老凍餒黃震曰鄭康成解三老五更謂知三德五事者宋均謂三老知天地人之事五更謂知五行更代皆意之耳惟杜預左傳注以三老為八十以上上中下三壽此于三老為得之以樂慆憂朱申曰慆慢也以淫樂而慢易其憂禍也如此方順讒鼎之銘曰王應麟曰讒鼎之銘服氏注疾讒之鼎明堂位所云崇鼎是也一云讒地名禹鑄九鼎于甘讒之地故名正義謂二説無據愚考韓子説林曰齊伐魯索讒鼎魯以其􅎓往齊人曰􅎓也魯人曰真也齊人曰使樂正子春來吾將聽子新序吕氏春秋皆曰岑鼎二字音相近然則讒鼎魯鼎也明堂位魯有崇鼎服注不為無據遇懿伯之忌敬子不入惠伯曰公事有公利無私忌椒請先入注忌怨也懿伯椒之叔父惠伯子服椒也敬子叔弓也叔弓禮椒為之避仇疏檀弓惠伯曰政也不可以叔父之私不將公事知懿伯是椒叔父也懿伯為人所殺惠伯及滕郊遇懿伯之仇敬叔不入以禮惠伯欲使惠伯報叔父之仇惠伯以公義不可先入受館記文與傳同而鄭玄注云敬叔有怨于懿伯難惠伯故不入是鄭之謬也徐師魯曰傳與記注皆訓忌為仇怨而鄭尤不通劉氏云忌謂忌日也敬叔及滕郊適遇懿伯忌日欲緩之至次日乃入惠伯以公事為重云不可以叔父私忌而不將敬叔從之此説最是可以訂舊解之訛愚按忌日説固是但懿伯注疏未詳為誰或云即子家懿伯也子家懿伯名羈昭公末年尚從出亡安得云忌日耶據舊解仇怨本可通蓋懿伯嘗有仇在滕叔弓奉使適遇之恐子服椒欲報故為之不入然檀弓説從父之仇云不為魁主人能執兵而陪其後則懿伯之仇椒本不必報故先入而叔弓從之耳公孫蠆子尾以其子更公女而嫁公女陸粲曰是時晉雖失道威令猶行乎諸侯陳無宇見執亦近事也蠆誠狂悖能不畏大國見討耶而輒以己子更公女齊君大夫咸罔聞知韓起亦受其欺而不敢詰揆之情理詎當爾乎吾不敢信四年三塗注山名在河南陸渾縣南疏服虔云三塗太行轘轅崤澠也謂三塗為三處道杜以三塗為一山按十七年傳曰晉將伐陸渾而先有事于洛與三塗先祭山川也則謂三道者非水經注伊水厯峽北流即古三塗山也闞駰十三州志云山在東南今在陸渾縣故城東南八十許里荆山注荆山在新城沶鄉縣南按漢書音義沶音稚晉新城今房縣荆山有四依杜説此禹貢南條之荆山也一統志在襄陽南漳縣西北八十里日在北陸而藏氷西陸朝覿而出之注陸道也夏十二月日在虛危氷堅而藏之夏三月日在昴畢蟄蟲出而用氷春分之中奎星朝見東方疏釋例云北陸虛也西陸昴也十二月日在玄枵之次小寒節大寒中正義云西道之宿有朝見者謂奎星也春分二月始出氷三月始班氷蓋氷之初出在西陸朝覿之時氷之普出在西陸朝覿之後故杜氏注總而言之王應麟曰西陸朝覿其説有三服氏謂春分奎晨見東方杜氏謂三月奎朝見鄭氏謂四月昴朝見爾雅西陸昴也劉炫云鄭為近之今備存其説待考或曰西陸朝覿謂四月立夏昴星朝見即周禮夏頒氷也桃弧棘矢以除其災疏出氷之時置此弓矢于凌室之戶民不夭札注夭死為札疏鄭衆云札截也疾疫死亡如有斷截風不越而殺雷不發而震疏風不以理舒散而暴疾殺物雷不徐緩動發而震擊為害景亳按商西亳在偃師偃師有景山故曰景亳商頌景員維河是也一統志景山在偃師縣南二十里塗山注塗山在壽春東北王應麟曰塗山以杜注為正説文嵞會稽山一曰九江當塗也民以辛壬癸甲嫁娶按漢地理志九江郡當塗應劭注禹所娶塗山侯國有禹虛蘇鶚衍義謂宣州當塗誤也東晉以淮南流民寓居于湖僑立當塗縣以治之唐屬宣州漢之當塗乃今濠州鍾離也一統志塗山在鳯陽懷逺縣東南八里君子謂合左師善守先代子産善相小國疏左師獻公合諸侯禮六子産獻伯子男會公禮六若其各異凡十二禮下椒舉云禮吾所未見者六焉故知其禮同也于公言之云合諸侯之禮于伯子男言之云會公之禮是所從言之異也屬有宗祧之事於武城注言為宗廟田獵疏土地名楚之武城在南陽宛縣北魯之武城在泰山南武城縣寡君將墮幣焉疏服虔云墮輸也按隱六年公羊傳鄭人輸平輸平者何輸平猶墮成也然則墮是輸之義黎之搜按黎即西伯戡黎之黎在今壺關黎城二縣乃商畿內之國杜氏云黎東夷國名誤也遷賴於鄢括地志故鄢城在襄州安養縣北三里南去荆州二百五十里鄭子産作丘賦注丘十六井當出馬一匹牛三頭今子産别賦其田如魯之田賦賦家資使出牛馬又别賦其田使出粟若今輸租是一丘出兩丘之稅按周禮有夫征家征夫征謂出稅家征謂出車徒給徭役此牛馬之屬則周禮之家征其夫征什一而稅是與家征别也渾罕曰國氏其先亡乎王應麟曰古者孫以王父字為氏子産乃子國之子國語謂公孫成子左傳謂公孫僑蓋子産之子始為國氏致堂作子産傳曰國僑非也愚謂此辨最是渾罕曰國氏其先亡乎或是子産沒後罕追論之咸尹宜咎城鍾離按宜咎氏鉗而為楚咸尹咸韻書一叶渠沈切音琴易咸叶利貞象山上有澤咸叶君子以虛受人注疏本作咸尹咸之林反今俗本作針爾未際注際接也疏大夫立適子必須接見同僚使豎牛請日注請饗日疏內則由命士以上父子皆異宫以其異宫故使豎牛請之牛謂叔孫見音現仲而何見仲見仲于公也大夫立適子必自見之于君而何如何也古如與而通叔孫穆子社稷臣也一為豎牛所弄殺孟逐仲易若反掌信乎小人之不可昵也禍亂之原則始于父子異宫故讒間得行對曰求之而至又何去焉注言求食可得無去豎牛陸粲曰杜泄憾叔孫召豎牛以致禍故言本自求之而至今又何故去之杜注云云于當日事情不類按哀八年吳伐魯子服何謂孟懿子曰召之而至又何求焉語意與此相類又曰杜泄為家臣睹其主在難既承授戈之指不能亟告於君大夫以誅逆豎及叔孫死禍亂既成區區爭以路葬而帥士哭之何益矣泄也忠不足以存君而義不足以救亂君子無取焉叔孫未乘路按周禮一命受爵再命受服三命受車焉襄二十四年穆叔如周賀城王賜之大路天子賜之無不受之理穆叔以上卿無路故受之而不敢用耳叔仲子謂叔孫豹三命踰父兄為非禮蓋誣之之辭其實穆叔已受三命使杜泄舍路不可邵寶曰路車乘馬惟天子得豫人受之其可違乎是故公冶之冕服可以無斂諸侯之賜也曾子之簀不可以不易大夫之賜也天子之賜則不然叔孫既受矣生以服死安得不以葬杜泄之持正如此而不能早諫穆子使去豎牛何也夫亦夢為之祟言之未易入耶孟孫為司空以書勳疏周禮司勳屬夏官今司空書勳者春秋時諸侯之制不盡與禮同讀左日鈔卷八
