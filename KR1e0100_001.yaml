body:
  text: 讀左日鈔卷一吳江朱鶴齡撰隱公繼室以聲子生隱公邵寶曰大夫雖七十無無主婦者蓋衣服不備粢盛不潔不可以祭故也况國君乎故元妃卒於是有繼室雖然國君不再娶禮也其初娶也來媵而娣姪從之進而攝焉固妾也是故隱公出於聲子不謂之嫡否則再納焉亦妾也是故桓公出於仲子不謂之嫡聲子娣也故疑於妾而不知禮之有攝也仲子娶也故疑于嫡而不知禮之無再娶也此說者所以紛紛也仲子生而有文在其手曰為魯大夫王樵曰此與成季生而有文在其手曰友二事相類蓋皆誣也按成季之將生桓公卜之曰男也其名曰友及生而果有文在手曰友此何神也筮辭有間於兩社為公室輔季氏亡魯不昌之語桓公以仲子手文得國而三桓效之為此語爾元年不書非公命也趙汸曰𫝊明國史有不書之法蓋指䇿書正史言之非公命不書於策所以重正史而致其嚴故杜氏謂小事簡牘而已左氏世為國史凡經不書而簡牘有據者悉取以為傳所發不書之義皆史例也外事如崩薨卒葬盟㑹侵伐勝敗禍福經所不書者間亦推史例以釋之莊公寤生驚姜氏疏武姜寐時生莊公至寤始覺其生也此非生子之常故驚姜氏按史記云寤生生之難林堯叟注武姜困而後寤因寤而驚如此解寤生難通應劭云兒墮地能開目視者為寤生楊用修取之吾亦未敢信也制巖邑也虢叔死焉注虢叔東虢君也疏虢叔封西虢仲封東此云虢叔東虢君也所滅之君字叔也僖五年傳虢仲虢叔王季之穆也晉語稱文王敬友二虢則虢本有二國此為東虢後晉獻公所滅者其國在西也鄭語史伯謂桓公曰虢叔恃勢鄶仲恃險皆有驕侈怠慢之心君以成周之衆奉辭伐之無不克矣桓公從之是恃險不修德為鄭滅之事也括地志洛州汜水縣古東虢之國祭仲曰氏族考祭氏周公第七子所封周畿內之邑世為周卿士子孫以邑為氏祭後并于鄭故鄭有祭仲都城過百雉注方丈曰堵三堵曰雉一雉之墻長三丈高一丈侯伯之城方五里徑三百雉故其大都不得過百雉按公羊傳五板為堵五堵為雉五雉為城鄭氏詩箋引此云雉長三丈則板六尺毛詩傳又云一丈為板五板為堵五堵為雉韓詩說同而又以八尺為板諸家不一詩疏云今據左氏說鄭伯之城方五里積千五百步大都三國之一謂三分其國之一則五百步也五百步為百雉則知雉五步五步于度長三丈則雉長三丈也張獻翼曰雉不能遠飛高不過一丈長不過三丈故高一丈長三丈為一雉國不堪二注二兩屬疏兩屬則賦役倍賦役倍則國人不堪書曰鄭伯克段於鄢疏特言書曰必是舊史不然夫子改之凖魯史之法惟當書鄭伯之弟段出奔共趙汸曰春秋特筆也辭㫖卓異非史家所及鄢趙氏云當作塢非鄢陵也詳春秋集說不言出奔難之也按叔段強大雋傑莊公大用兵力僅乃勝之故不書出奔難之者言克之非易也注謂莊公志在於殺難言其奔誤矣公入而賦姜出而賦疏中融外泄各自為韻蓋即所賦之詩王樵曰穎考叔之事與茅焦頗相類莊公囚母惡名恐大國之議其後也茅焦之於始皇持而劫之考叔之於莊公微而動之蓋皆有所窺而入弔生不及哀注諸侯以上既葬則縗麻除無哭位諒暗終喪陸粲曰杜說於經典未之前聞杜於晉元皇后喪議太子應既葬除服援此傳文及鄭伯辭享景王宴樂為證先儒譏其巧飾經傳以附人情今以傳考之所謂弔生不及哀者蓋言惠公薨久今來賵不及其哀哭方盛之時耳至如子産為鄭伯辭享直云免喪聽命傳亦但言葬鄭簡公杜何由知其定為既葬而除也叔向譏景王明言三年之喪雖貴遂服禮也乃謂其譏宴樂而不譏除服可乎杜既創為此說故於傳中諸言喪禮與己說不合者輒遷就解釋以求通如文元年傳晉襄公既祥注云諸侯雖諒暗亦因祥祭為位而哭昭十年傳葬晉平公叔向辭諸侯之大夫曰孤斬焉在衰絰之中注云既葬未卒哭故猶服斬衰十五年傳叔向譏景王下亦云天子諸侯除喪當在卒哭今王既葬而除故譏其不遂此服自與前議乖違蓋雖委曲生意益顯其謬孔疏乃云卒哭與葬相去非逺卒哭是葬之餘事故杜云然其黨杜護非抑又甚矣陳氏曰此傳文疑後人增益之雜記有大夫士訃於他國之君之禮則不但同位外姻也且文九年秦人歸僖公成風之襚傳曰禮也此又以贈不及尸弔不及哀為非禮却自相矛盾按仲子當主榖梁乃惠公之母也左氏誤以為惠公夫人故云子氏未薨故名又云預凶事非禮也辨詳集說紀人伐夷注夷國城陽莊武縣疏莊十六年晉武公伐夷執夷詭諸杜注詭諸周大夫夷采地名與此有别世族譜誤以二夷為一有蜚疏釋蟲云蜚蠦蜰舍人李巡皆云蜚蠦一名蜰郭璞云蜚即負螌臭蟲經傳皆云有蜚則此蟲直名蜚耳作蜚蠦者非是此蟲一名負螌漢書及此注多作負蠜釋蟲草蟲負蠜彼則嵗時常有非災蟲也蓋相涉誤為蠜耳惠公之薨也有宋師太子少黃澤曰傳稱太子少則是惠公之時桓公已正太子之位隱公之攝出自父命明矣又宋魯為婚姻而惠公未葬宋來伐喪豈非以桓公故耶夫太子少而隱公立斯固宋人之所疑者桓公內有國人歸向外有宋國大援隱公雖欲不讓安得而不讓榖梁謂讓桓不正此未審當時事情公孫滑出奔衛趙汸曰凡賤者奔史不書大夫非卿名字不登於策公羊謂之微者榖梁謂之卑者公子尊與卿等公孫降於公子與微者同鄭人以王師虢師注虢西虢國也𢎞農陜縣東南有虢城此虞虢之虢史記注馬融云武王克商封異母弟虢仲於夏陽二年費庈音琴父勝之注庈父費伯也前年費伯城郎愚按魯有單伯莊元年見經榖梁謂命於天子故稱字此費伯亦其類三年赴以庚戌故書之趙汸曰說者多疑傳妄按盟㑹戰伐經書日月傳每略之不書日月者傳則詳之意在互文相備非無據者其崩卒僞赴亦必有考藉令搆虛亦不至是不書姓為公故曰君氏按君氏乃尹之誤當從公榖無疑辨見集說傅遜曰自公羊傳云春秋譏世卿而孟子言仕者世祿於是儒者有世祿不世官之說愚以為非也古者天子諸侯大夫皆以德為之殺各保姓受氏以守宗祧故曰天子建國諸侯立家豈有天子諸侯世而大夫獨不世者乎大率權之所在無不為患者人君惟務修德選建賢良以永功臣之𦙍何事曲設猜防示人以薄假卿不世國其能永存乎緣公羊之學盛行漢初霍氏王氏世專漢權魏相劉向因述公羊之說以動主聽而王氏卒篡漢世儒遂以其說為至允恐聖人書尹氏卒之意實不然也周鄭交質愚謂周鄭竝言昧君臣大義東萊駁之當矣然當時天子下夷列國左氏所書亦紀實事不然何以見齊桓晉文之烈哉四月鄭祭足帥師取溫之麥秋又取成周之禾傅遜曰杜於桓五年傳云足祭仲之字陸子餘深闢其謬良然蓋足其名仲乃其字爾子餘又云先儒謂春秋時間有用夏正紀事者杜以取為芟踐此强說也按桓十一年傳云祭封人仲足杜誤甚明宋宣公可謂知人矣公羊傳言宋之禍宣公為之尤其舍子立弟果令馮有爭心左氏以馮自爭國非宣公罪故善之愚謂宣公舍其子而立穆公穆公又不私其子而立殤公二者雖非傳襲之常然皆盛德事凶終者後人為之爾公羊歸獄於宣公恐非忠恕之㫖四年州吁使告於宋曰君若伐鄭以除君害按宋自殤公立公子馮出居鄭鄭莊公助之於時尚未有爭國之釁也州吁欲定其位使告宋求伐鄭以除公子馮之害橫開兵端其惡甚矣又按史記衛桓公十二年弟州吁驕奢公絀之州吁出奔十三年鄭伯弟段攻其兄不勝亡而州吁求與之友十六年州吁收聚衛亡人以襲殺其兄自立為君為鄭伯弟段欲伐鄭請宋陳蔡與俱三國皆許之觀此則州吁伐鄭蓋與段比謀而翬之固請帥師亦所謂同欲相求如市賈者也是故春秋託始於隱故書曰翬帥師疾之也葉夢得曰傳不明不氏之義但見翬乃弒君者疑其強而自恣經書翬帥師與後言公子翬異其詞若貶然故妄意之今按翬與無駭溺挾稱名皆當從二傳未爵命為正厚從州吁如陳按州吁弒其君完完之母戴媯大歸於陳陳必深惡州吁然非覲王為說不可誘之如陳非如陳二人不可得而誅也父子之間遂至用譎真大不幸哉王樵曰按陳乃衛桓之母家莊公惑於嬖妾戴媯大歸陳國既知之矣乃州吁弒立不應反助之興師觀石碏告陳人曰此二人者實弒寡君則前此陳或不知州吁之為賊也姦黨欺蔽其術多矣石碏以賊方據國無可與圖者圖之必於陳故先與陳人定計風之朝陳使請王覲而即陳以除之朱子語録有門人疑引之去陳後倘陳人不殺却如何蓋未知此也涖殺州吁於濮疏賈逵云濮陳地也地理志陳留縣濮水受泲史記石碏詳佯為善州吁至鄭郊與陳侯共謀使右宰醜進食因殺州吁于濮石碏純臣也惡州吁而厚與焉魏禧曰古者七十而致政石碏告老在桓公初立時桓公十六年見弒則碏已八九十歲故其使告陳曰老夫耄矣無能為也方且誅州吁殺其子厚立宣公智力積強以復仇定國難乃出耄期之嵗後世未見其人五年公將如棠觀魚者疏魚者猶言獵者按古字魚通漁書曰公矢魚于棠王應麟曰矢魚于棠朱文公曰據傳云則君不射是以弓矢射之如漢武帝射蛟江中之類按淮南子季冬命漁師始漁天子親往射魚恐非陳魚之說翼侯奔隨趙汸曰晉自獻公以前經皆不書蓋獻公末年晉魯始通前此告命不行非作經時削之也以三軍軍其前潛軍軍其後孫武子凡戰者以正合以竒勝張預曰兩軍相臨先以正兵與之合戰徐發竒兵或搗其前或擊其後以勝之若鄭伯禦燕師以三軍軍其前以潛軍軍其後是也天子用八諸侯用六大夫四士二公羊榖梁皆云天子八諸公六諸侯四劉敞曰衆仲不知諸侯名位不同禮亦異數因天子八佾遂兼稱諸侯六佾其曰士二亦非也特牲少牢皆士禮也無用舞之處安得二佾而施之其說主公榖汪克寬曰樂舞之數自上而下降殺以兩諸侯既降於諸公則諸伯當降於諸侯而為二佾矣子男復何用乎禮經所紀廟堂之制袞旒席數五等諸侯皆同豈以樂舞而獨異於其制乎愚謂汪辨甚當可正公榖之失杜明言士有功方賜樂劉原父謂士必無樂舞亦不然傅遜曰杜氏解八佾六佾四佾二佾本之何休公羊注服䖍以用六為六八四十八用四為四八三十二用二為二八十六杜以舞勢宜方行列既減則每行人數亦宜減故用何氏說然𫝊文云舞所以節八音而行八風故自八以下是舞必以八人為列自天子降殺以兩故減其二行爾此為有理若如杜說則諸侯以下節宣皆不以八矣士止餘四人豈復成樂對曰未及國公怒乃止使者慮公知其入郛則以為不及救故諱云未及國杜注謂忿公知而故問非也公之怒怒其不以實告林注謂怒使者言不遜亦非也六年鄭人來渝平更成也疏變更前惡而復為和好言更復狐壤以前之好也今從公榖作輸辨詳集說納諸鄂括地志故鄂城在慈州昌寧縣東二里與武昌之鄂異秋宋人取長葛王應麟曰宋人取長葛經以為冬𫝊以為秋劉原父謂左氏雜取諸侯史策有用夏正者有用周正者石林葉氏考祭足取麥榖鄧來朝以為經傳所記例差兩月蓋經用周正而傳采國史其自用夏正者有失更改也七年謂之禮經春秋即周禮也故韓宣子見易象春秋曰周禮在魯結艾之盟也趙汸曰傳釋列國之聘有三一結好二結盟三通嗣君今考結好而聘者有報若莊二十五年陳女叔來聘冬季氏如陳是也結盟與通嗣君而聘者不報禮薄與交聘異也若霸國之聘與國秦楚之窺上國而來者其事又各不同傳皆隨事釋之使猶有考也初戎朝周發幣於公卿注發幣如今計獻詣公府卿寺疏㑹計之吏獻物天子㰱如志疏㰱口含血也服䖍云如而也八年以泰山之祊易許田括地志許田許州許田縣南四十里有魯城周公廟在城中祊田在沂州費縣東南秋㑹于溫盟于瓦屋注㑹溫不書不以告也趙汸曰春秋諸侯之事有不以告而史不書者有雖告而并入所重書之者凡一役再有事理亦無不告㑹溫以瓦屋之盟為重并下事書之筆削舉重之義如此杜氏但以為不告後人遂疑傳妄皆非也為諡因以為族注或使即先人之諡稱以為族傅遜曰陸子餘按鄭𤣥駁許慎五經異義引此傳文云諸侯以字為氏因以為族今此以氏為諡者傳寫誤也杜考之不詳乃妄斷其句而強解之愚初依杜讀傳短澀不成文句固宜以諡作氏及反覆正文羽父為請諡與族公問族於衆仲公未問諡也衆仲對云諸侯以字為氏因以為族則問答相承了然矣又下文公命以字為展氏則用衆仲之說又了然矣又考宋戴惡與衛齊惡固見傳中以戴齊為其臣之諡亦無定據孔疏曲以二人當之爾即戴齊為二惡之先之諡亦在衆仲所對之後朱子亦云此諡應作氏公命以字為展氏劉敞曰杜云無駭公子展之孫非也無駭若公子展之孫當其繼大宗也賜氏久矣何待死而後賜乎且禮云公孫之子以王父字為氏非言其死而後氏之也然則無駭固公孫羽父請族者為無駭之子請也子展稱公子無駭稱公孫無駭之子未有稱也此所以請之也若公孫之子死而後賜族則無駭為終身無氏矣九年凡雨三日以往為霖劉敞曰經有電無霖傳有霖無電此傳非解經也杜氏專謂經誤不亦惑乎見獲必務進按獲謂獲鄭人服氏言戎被鄭獲非也鄭人速去以誘之安得獲戎衷戎師前後擊之疏杜云前後及中三處受敵者前謂第一伏逆其前也後謂祝𥅆與後伏逐其後也中謂第二伏擊其中也衷戎師者戎師在三伏之中十年鄭伯入宋趙汸曰自宋公欲以諸侯伐鄭去馮連兵至此其報復之禍烈矣然禍首在宋而鄭實有王命故春秋誅首惡而忿兵之過不悉書十一年我先君新邑于此按鄭自桓公始封京兆咸林後因幽王之亂寄孥虢鄶而遷焉在河南新鄭桓公至武公才二世故曰新邑君子謂鄭莊公于是乎有禮趙匡曰諸侯無王命入人之國罪已大矣又使大夫守之不容誅矣左氏以為有禮是長亂階也王取塢劉蒍音委邘之田于鄭而與鄭人蘇忿生之田溫原絺樊隰郕攢茅向盟州陘隤音頽懷按塢劉四邑在今河南偃師縣溫原十二邑在今河北濟源河內修武等縣嗚呼吾于桓王之易鄭田而知周之不復振也夫侯國分土天子苴白茅以錫之有定分而非可相假也况十二邑在畿輔之內茍撫之以德威之以刑無不惕焉宇下者何至不能有而以之與人乎鄭伯知王之不競也遂敢拒戰于繻葛蘇子亦自此生心其後五大夫因蘇子以作亂實啓子頽之禍故王室日卑非諸侯能卑之也自卑也使營莬裘吾將老焉注莬裘在泰山梁父縣南歐陽氏據經書公及邾儀父盟于蔑與被弒書公薨力辨隱居位非攝愚按隱公稱攝與周公異周公之攝止攝其政事而已隱公則併君位而攝之宋穆公亦云我立於此攝也蓋當時必盛傳周公有負斧扆朝諸侯之事故魯宋相效為之不知周公位冢宰正百工具見於書明堂負扆乃後世稱述之謬夫國政可攝也君位不可攝也若攝君之位則嗣子長而復辟將儼然太上自居耶抑傫然北靣復就人臣之列耶隱公君魯已十一年矣羽父請殺桓公蓋疑其不反位故以此探之隱公爾時即挈國而授之桓猶虞無以自處乃曰使營莬裘吾將老焉菟裘者魯之别邑也既有新君以居乎內復有故君以居乎外是國有二君也隱即無不利於桓之心而桓也隂賊人也能不疑其中分魯國若曲武桓莊之於晉也羽父於是承桓命而揕之刃鍾巫之禍謂非隱自取之不可也歐陽子但信經文以為隱公非攝而不知隱實攝君位故時史稱公夫子亦據而書之王莽之居攝亦攝天子位也遂成篡奪之禍是烏可無辨不成喪也趙汸曰𫝊言不以君禮成喪故史不書葬定姒不書小君王子猛卒同桓公元年鄭伯拜盟趙汸曰𫝊言拜盟如拜貺拜辱拜嘉之類非必君身親之若鄭伯身來與吾君接無不書之理宋華父督趙汸曰華父字也如言弗父何公父歜與孔父嘉五世别族者不同督公孫也無賜族之法二年立華氏也注督未死而賜族督之妄也趙汸曰言立以為卿注謂未死賜族非也莊王十二年傳立叔孫氏注云立後說者亦謂賜族然叔牙之子經書公孫兹兹之子得臣乃氏叔孫則非賜族明矣彼非賜族此言立華氏豈賜族乎大路越户括反席六經正誤越即麻紵焦檾黃草之屬禮記大路素而越席注草席也音活後漢書世祖嘗敕㑹稽獻越布即此袞冕黻珽注黻韋韠以蔽膝也珽玉笏若今吏之持簿徐廣云持簿即今手板藻率音律鞞鞛注藻率以韋為之所以藉玉也疏周禮典瑞王執鎮圭繅藉五采鄭司農讀繅為藻傅遜曰藻從藻之藻率從率帶之率本二物按禮記有玉藻貫玉以藻藻者雜采絲繩也又率帶諸侯大夫皆五采士二采率與繂同緶緝也韻書鞞琫二字同詩傳鞞容刀鞞也琫上飾珌下飾說文亦云琫佩刀上飾鞶厲游音留纓注纓在馬膺前如索裙疏纓當馬胸以削革為之火龍黼黻注白與黑謂之黼黑與青謂之黻按此黻與上黻珽之黻不同凡公行告於宗廟反行飲至舍爵䇿勳焉禮也趙汸曰告廟飲至䇿勛乃反行常禮皆同時于廟中行之䇿勛即書至襄十三年春公至自晉傳曰孟獻子書勞于廟是其事也非由告廟飲至然後書至不告廟飲至則不書至也命之曰仇金履祥曰仇即文侯平王之初受秬鬯圭瓚之命兄固未遽替也曲沃之封自在昭侯之世師服所言以防奪嫡之漸爾卿置側室注側室衆子也得立此一官疏文王世子公若有出疆之政庶子守公宫正室守太廟鄭𤣥云正室嫡子也故知側室是衆子文十三年傳趙有側室曰穿是卿得立此官也漢書文帝賜南粵王趙他書朕髙皇帝側室之子大夫有二宗注適子為小宗次者為二宗疏大夫不必皆是大宗故云小宗若大夫身為大宗亦止得立二宗官爾二宗與側室為例皆官名與立宗别傅遜曰孔疏因注以側室為立官遂云二宗亦官名陸子餘云俱未有考而不辨其非竊謂側室二宗固應請于君于其中立官以統之而即以側室二宗為官必非何也以其不類官名也又注云適子為小宗此其意以諸侯為大宗爾然不聞族人不得以戚君大夫不得以宗諸侯乎大抵始為小宗既為大宗小宗四大宗一併而為五宗其變至于無窮則大夫之家固自有大宗矣其二宗即小宗也杜考之不詳而云爾三年先偏後伍伍承彌縫李靖兵法春秋魚麗陳先偏後伍此則車步無騎謂之左右拒言拒禦而已非取出竒勝也晉荀吳伐狄合車為行此則騎多為便惟務竒勝非拒禦而已今按其法自五人而變為二十五人自二十五人而變為七十五人此則步卒七十二人甲士三人之制也舍車為騎則二十五人當八馬此則五兵五當之制也諸侯兵法惟伍法為要小列之五人大列之二十五人參列之七十五人又五參其數得三百七十五人三百人為正六十人為竒今以百五十人分為二正而三十人分為二竒蓋左右等也穰且所謂五人為伍什伍為隊至今因之魚麗之陳魚麗者魚入其中不能出也詩魚麗于罶陳名取此仍叔之子弱也愚按經系仍叔之子來聘于夏而此傳下有秋大雩之文則聘之在夏明矣前傳有秋伐鄭蓋統言伐鄭事本末爾不知杜何以有久留在魯之說孔氏疑將伐鄭而遣告魯事或有之啓蟄而郊疏夏小正正月啓蟄故漢氏始以啓蟄為正月中雨水為二月節及太初以後更改氣名以雨水為正月中驚蟄為二月節迄今不改過則書疏卜不吉則當改卜次旬卜不過三故限以一月過涉次月之節則書之以譏慢六年楚武王侵隨趙汸曰楚自熊通以上未與魯通傳具載其伐滅諸國志在兼并諸夏中國不可無伯齊桓所以有功楚之羸其誘我也張預曰形之以羸弱敵必來從苖賁皇謂晉侯曰若欒范易行以誘之中行二卻必克二穆果敗楚師亦此義也不疾瘯蠡疏蠡說文作瘰云瘯瘰皮肥也齊侯又請妻之固辭吕祖謙曰鄭忽不求助大國而云自求多福其言是矣然非奮然誠有是志也使忽誠有是志則弱固可彊而所以持國者固無待於外助矣惟其為善有名而無情動多疑沮不知審量所以始受制於祭仲而卒死於髙渠彌之難也接以大牢注以禮接夫人重適也傅遜曰考之禮經謂以太牢之禮接見太子非夫人也接夫人鄭𤣥之說陳澔已辨其謬且下云卜士負士妻食皆以太子言則接必非夫人矣周人以諱事神名終將諱之疏子生三月為之立名其終也必將諱之故須預有所避為下諸廢張本王應麟曰周人以諱事神名終乃諱之曲禮注云生者不相辟名衛侯名惡大夫有石惡君臣同名春秋不非漢宣帝詔曰古天子之名難知而易諱也其更名詢則生而稱諱矣博議謂名子者當為孫地出顔氏家訓八年楚人尚左君必左無與王遇且攻其右右無良焉必敗嘉祐集范蠡云凡陳之道益左以為牡設右以為牝季梁策楚右無良焉必敗偏敗衆乃攜蓋一陳之間必有牝牡左右要當以我強攻其弱爾愚按兵法又有以我之弱當敵之弱者孫臏所謂以君下駟與彼上駟一敗而二勝之道也鍾惺曰鄭與王戰子元曰陳亂莫有鬭心云云隨與楚戰季梁曰楚人尚左云云鄭計妙在避整趨亂以分整者之勢整且化而為亂善於攻整者也隨計妙在避堅趨瑕以分堅者之力堅且化而為瑕善於攻堅者也九年唯王后書趙汸曰莊十八年傳見惠王后陳媯宣六年傳見定王后齊姜何不書蓋二后非魯主昏故特存魯主昏者以見義荀侯賈伯注荀賈皆國名按荀疑即郇曹風郇伯勞之李氏云郇國今河中猗氏縣賓之以上卿禮也疏僖二十九年傳曰在禮卿不㑹公侯㑹伯子男可也昭二十三年傳曰列國之卿當小國之君固周制也然則小國之君乃當大國之卿小國之世子必不得當大國之卿故知各如其國之卿爾賓之以其國上卿之禮十年魯以周班後鄭班爵祿之班鄭主兵當先以周班故後十一年齊衛鄭宋盟于惡曹注宋不書經闕趙汸曰此即戰郎諸侯也用一事再見書人例經無宋𫝊衍文宋亦不當序鄭下注云經闕非鄖人軍其郊必不戒孫武子諸侯自戰其地為散地張預曰戰于境內士卒顧家是易散之地也楚鬬廉曰鄖人軍其郊必不戒恃近其城莫有鬭志果為楚所敗是也十二年請無扞采樵者以誘之張預曰誘之以小利敵必來取吳以囚徒誘越楚以樵者誘絞是也君次于郊郢以禦四邑按楚郊郢一統志云在安陸州古名郢中安陸之東即德安應城縣界有蒲騷城古鄖邑鄖人望救鬬志不决禦四邑以絶其來救之路而潛出鋭師以加之兵法所謂竒正竝用也十三年遂見楚子曰必濟師缺伯比云必濟師此隱語也使楚子不告鄧夫人夫人或問而不悟則濟師二字虛設矣吾謂伯比見楚子時當以莫敖必敗之故明告之楚子能信鄧夫人之言豈不能納伯比之諫而必出此隱語幾幸其君之悟於不可必之天乎故告君者諷可也略不可也略可也隱不可也為隱語而旁無一人代之分疏將奈何莫敖狃于蒲騷之役將自用也吕祖謙曰瑕之禍在絞不在蒲騷也蒲騷之勝用鬭廉也絞之勝自用也苟挫於絞必謂昔以用人而勝今以自用而敗將益求其所未至不敢以兵為戲矣有城下之盟而忘己之不如鬬廉所以堅其自用之心而促其荒谷之縊也不書所戰後也注公後地期不及其戰故不書所戰之地趙汸曰㑹期輕戰期重公雖不及㑹期而及其戰期自當舉戰地何故反沒之乎此有筆削之㫖見屬辭十六年冬城向書時也趙汸曰啖氏云按下有十一月縱是同月亦今之九月農工未畢不可興役今按土功自戒事至畢功非止一月之事故城築皆時而不月兼春秋城築多為備敵興功得時非時本無足議傳既發不時之義於此言書時疑若美之故為後人所議宣姜與公子朔搆急子按史記衛莊公卒子桓公立十三年入春秋至魯隱公四年則衛桓公十六年矣其春桓為州吁所弒九月衛人殺州吁而宣公立然則宣之蒸夷姜生伋子當在桓公之世及宣即位計伋年且長因以為世子新臺之築距此時當不逺宣在位十九年所生夀朔或已幾弱冠壽之能代兄死朔之能同訴兄固無足怪洪容齊以此為疑蓋誤以宣公為代莊公爾夀子載其旌以先盜殺之蘇潁濱謂夀之死無救於兄而重父之過朱子亦云然夀之竊節先往真欲代兄之死卒之兄亦往死者非初料所及也以是責壽夀亦大不幸哉十七年日官居卿以底日注位從卿故言居卿底平也謂平厯數疏周禮太史掌正歲年以序事頒告朔於邦國然則天子掌厯者謂太史也太史下大夫非卿傳言居卿則是尊之若卿十八年使公子彭生乘公公薨于車公羊傳夫人譛公於齊侯公曰同非吾子齊侯之子也齊侯怒與飲酒于其出也使彭生拉幹而殺之按桓公三年娶文姜六年生莊公十八年乃與桓公如齊則時人所疑非桓公子者妄矣猗嗟詩展我甥兮春秋書子同生雖微詞亦紀實也齊人殺彭生注不書非卿陳傅良曰殺彭生不書嫌討賊也杜說非是公子書殺不必皆卿今按史既諱戕言薨則殺彭生必不復書齊侯師于首止按首止衛地時衛朔奔齊齊人若將為討衛亂而出者以誘子亹也莊公莊公之世事見於經而無𫝊者甚多疑有闕佚元年不稱即位文姜出故也趙汸曰傳於莊閔僖不書即位發義不一皆未當當從二傳繼弒君嗣子不言即位為是啖氏亦云不稱姜氏絶不為親禮也注文姜之義宜與齊絶而復奔齊故於其奔去姜氏以示義疏觀此解之義夫人宜與齊絶釋例言莊公宜與齊絶者夫人尚宜絶莊公固宜絶矣先儒謂莊公宜與母絶杜意莊公宜與齊絶故偏據莊公為文愚按此義臨江張氏得之見集說三年鄭伯辭以難林注鄭伯子儀也按鄭伯乃厲公非子儀辨見集說四年盈而蕩天之道也按史記楚熊渠始僭王號其後畏厲王暴虐又去之至魯桓公六年熊通侵隨隨為楚往周請尊楚號不聽通乃自立為武王至魯莊四年周召隨侯數以立楚為王楚怒以隨背已伐之武王卒師中而兵罷然則鄧曼之言蓋指楚武僭號以為盈也除道梁溠營軍臨隨注溠水在義陽厥縣西東南入溳水按通志槎水在今隨州城東南㵐水在隨州城西北槎水即溠水也西魏改㵐西曰下溠取此楚子已卒而鬭祁屈重祕其喪更開道為梁築軍壘以臨隨為持久計隨人不測乃懼而求成請為㑹于漢汭而還濟漢而後發喪注汭內也謂漢西陸粲曰詩芮鞠之即毛𫝊芮水涯也鄭箋芮之為言內也杜依鄭說據𫝊云漢東之國隨為大若為㑹於漢西則楚師原未涉漢下文何得云濟漢而後發喪也孔疏順杜之失與𫝊文異矣渭汭注云水之隈曲曰汭此說是愚按漢晉春秋諸葛亮卒於郭氏塢姜維令楊儀反旗鳴鼓若將向懿者懿不敢逼儀乃結陳而去入谷然後發喪夫反旗嗚鼓即此之除道梁溠也入谷然後發喪即此之濟漢然後發喪也伯約之智蓋得之左氏者也六年君子以二公子之立黔牟為不度矣劉敞曰朔比衎黔牟比剽左氏君剽而退黔牟存朔而絶衎賞罰無章莫此為甚邵寶曰宣公蒸於夷姜生伋子又納伋子之妻生夀及朔三人皆非所當立也况朔搆伋子并及夀無故以死則朔也安得為君黔牟之立謂之不度見成敗而忘義理君子之論豈其然哉騅甥𥅆甥養甥請殺楚子蘇軾曰以鄧之微無故而殺大國之君楚將舉國而讐之其亡更速夫鄧不患有楚而患不能修德以自強使其國不可亡國苟不可亡雖百楚子何害不然殺一楚子天下遂無楚子乎人將不食吾餘邵寶曰餘似謂祭之餕餘故下以社稷不血食言舊注不明一云時三甥因享楚子欲置毒飲食中殺之故鄧侯言因享害人人將不食我餘食也以為餕餘無謂七年不害嘉榖也趙防曰宣十五年秋大水冬饑此年秋大水但言無麥苖而不言饑者此黍稷可更種也讀左日鈔卷一
