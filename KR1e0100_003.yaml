body:
  text: 讀左日鈔卷三吴江朱鶴齡撰十五年秦穆姬屬賈君焉注賈君晉獻公次妃賈女也疏莊二十八年傳晉獻公娶于賈無子烝于齊姜生秦穆夫人及太子申生言娶于賈則是正妃賂秦伯以河外列城五史記正義晉以河西五城賂秦秦東境至河即龍門河也卜徒父筮之注卜人而用筮不能通三易之占故據所見雜占見之疏劉炫以成十六年筮遇復云南國蹙射其元王中目則筮法亦用雜占不必皆取周易又周禮大卜掌三兆三易三夢之法則卜人固兼筮矣千乗三去三去之餘獲其雄狐邵寳曰此筮書之雜辭千乗諸侯之車數也去猶算法所謂除也一除則三百三十三二除則六百六十六三除則九百九十九三除之餘所剰惟一非君而何陳啓源曰下文三敗及韓正三去之驗耳杜以為三度敗去得之邵文莊解為除太纖巧夫狐蠱必其君也注狐蠱為君以喻晉惠公其象未聞傅遜曰此蒙上雄狐而言恐因下文有蠱之貞句遂誤以雄狐為狐蠱耳蠱之貞風也其悔山也注内卦為貞外卦為悔巽為風秦象艮為山晉象疏凢筮者先為其内後為其外内卦為己身外卦為他人故巽為秦象艮為晉象三敗及韓陸粲曰晉師敗也杜以為晉侯車壊太泥卜人之言張脈僨興疏血既動作脈必張起故言張脈僨是動義言脈理張大僨動興起而不和或疑僨當作墳墳起也戰于韓原括地志韓原在同州韓城縣西南十八里十六國春秋云魏顆夢老父結草亢杜回亦在韓原輅秦伯將止之玉海章氏曰車戰之法毎車甲士三人歩卒七十二人行則以車為衞居則以車為營一車之間又有倅車春秋時如韓原之戰輅秦伯將止之鞌之戰韓厥中御而從齊侯鄢陵之戰郤至遇楚子韓厥從鄭伯用車以戰而使敵人得與吾元帥相接則是環衞之車不設也葢古車戰之法必有䕶衛前後整列元帥未易動摇也至春秋列國用之徃徃軍伍不整而元帥自以車逐利故敵人得及之惟繻葛之戰二拒用事原繁高渠彌以中軍奉公未嘗輕動為得古法登臺而履薪焉注古之宮閉者皆居之臺以抗絶之林注穆姬為惠公告罪登臺履薪宜也而帥子女以同登臺葢暗用刦制之術子金敎之言曰按晉惠召呂甥迎已而甥即矯其言以激厲國人大是應變之才惜乎所輔非人而卒于無成也作爰田疏服䖍孔晁皆云爰易也賞衆以田易其疆畔國語注唐氏云讓肥取磽也食貨志下田三嵗更耕之自爰其處師古曰爰更互也此所謂爰田當是分公田之税應入公田者易之于所賞之衆作州兵注州二千五百家也又使州長各繕甲兵疏以州長管人既少督察易精故使之治兵女承筐注離為中女故稱女陸粲曰此止歸妹上六本爻之義未及于離當云兑為少女今杜言離為中女誤矣不利行師敗于宗丘丘叶音欺注車敗旗焚失車火之用也故不利行師火還害母故敗不出國近在宗邑疏震東方木兑西方金木遇金必敗按兑下震上為歸姝故孔氏云然上云震之離亦離之震是主變卦言也杜氏解為當姪其從姑注震為木離為火火從木生離為震妹于火為姑疏秦穆姬是子圉之姑也爾雅父之姊妹為姑女子謂晜弟之子為姪先君之敗徳及可數乎注先君當主䘮敗非由筮數所生按先君之敗徳指獻公殺嫡立庻以致䘮敗及言禍及之也禍敗之及非一二可數數讀色主切此林堯叟之説傅遜仍從杜解作筮數之數而以可數乎為句未詳是否史蘇是占勿從何益注從史蘇不能損禍勿從不能益禍傅遜曰言敗徳以定史蘇之占從不從皆無益此為省文耳不然或有闕誤十七年齊侯好内多寵内嬖如夫人者六人按齊桓好内當以左氏為實荀子云内行則姑姊妹之不嫁者七人恐不可信果爾則四鄰諸侯豈不聞知而尚肯奔走其壇坫哉公興管仲屬孝公于宋襄公呂祖謙曰管仲始進説于桓公盤遊縱佚之屬皆曰不害伯其深戒痛絶以為害伯音獨參用小人而已仲之意謂有操必有縱故其得政之始首與君約舉一國之樂皆歸君舉一國之權皆歸已其所以得有為者固以此抑不知資人君之樂者君子乎小人乎名為佚樂未有不資小人者名曰小人未有不貪權勢者已許其縱佚而禁其近小人容其近小人而禁其勿侵權勢必不能也仲急于功利欲得齊之柄不暇長慮而為是約至寺人貂漏師多魚恃寵干政正犯仲之約而仲不能誅則巳陰悔初約之謬矣迨仲將死始言豎刁開方易牙之奸欲併逐之平時則不敢擊排以為保身之計臨死則盡言不諱以取知人之名其自為謀亦巧矣嗚呼管仲輔桓之初心其自期何如卒使桓公不能目定其子區區屬所立于宋襄者乃内嬖鄭姬之子于次未當立者也致五公子交争國綂幾絶身死不殯蟲流户外其亦可哀也夫其亦可鑒也夫雍巫按周禮掌食之官有内雍外雍雍人名巫者注云即易牙齊桓公卒易牙入與寺人貂因内寵以殺羣吏而立公子無虧蘇軾曰管仲死豎貂易牙開方用桓公薨於亂五子争立齊無寜嵗三子固亂人國然其使桓公得用三子者管仲也仲之疾也公問之相吾以仲且舉天下之賢者以對而其言乃不過曰三子非人情不可近而已見史記仲以為桓公果能不用三子乎桓公聲色不絶于耳目非三子則無以遂其欲其初之不用者徒以有仲焉耳一旦無仲則三子者且彈冠相慶仲以為將死之言可以繋桓公之手足耶雖桓公幸而聽仲屏此三人而其餘者仲能悉數而去之耶因桓公之問舉天下之賢以自代則仲雖死而齊國未為無仲也夫何患三子者五覇莫盛于桓文文公之才不及桓公其臣又皆不及仲晉襲文之餘威為盟主百餘年何者其君雖不肖尚有老成人焉桓公之死一敗不復振無惑也彼獨恃一管仲而仲死矣賢者不悲其身之死而憂其國之衰故必復有賢者而後可以死彼管仲者何以死哉愚按管子曰仲寢疾桓公問曰仲父不幸而不起政將安移對曰隰朋可朋之為人事君不二其心亦不忘其身大仁也哉公又問仲曰鮑叔好直而不能以國詘賔須無好善而不能以國詘寗戚能事而不能以足息孫在善言而不能以信黙朋其可乎據此則仲非不舉賢以代也仲死而隰朋亦旋死則仲所不及料也獨仲不能定桓公冢嗣致齊有五子争立之禍夫子所以小其器也歟十八年無以鑄兵注楚金利故應劭曰古者以銅為兵山海經昆吾之山多赤銅郭璞注色赤如火以之作刀切玉如泥所謂昆吾之劍也越絶書若耶之谷涸而出銅歐冶子因以為神鉤之劍十九年六畜不相為用注謂若祭馬先不用馬疏爾雅牛馬犬羊豕雞謂之六畜周禮校人春祭馬祖鄭𤣥云馬祖天駟也牛羊等其祖不知為何神沈氏云天苑主牛又有天雞天狗天豕以馬祖類之此等各有其祖也二十年新作南門書不時也凢啓塞從時注門户道路曰啓城郭墻塹曰塞城門非開閉之急故以土功之制譏之傳嫌啓塞皆從土功之時故别起從時之例疏别起從時之例言啓閉不須待時新作門乃須待時耳鄭公子士洩堵寇帥師入滑按是年傳鄭公子士洩堵冦帥師入滑注云公子士文公子洩堵寇鄭大夫二十四年傳鄭公子士洩堵俞彌帥師伐滑注又云堵俞彌鄭大夫顧文亨曰前後公子士本一人乃文公之子死于楚據杜後注則以公子士洩為名矣鄭有洩堵寇又有洩堵俞彌亦有公子俞彌俱各一人或稱洩氏或稱堵叔則洩堵恐是複姓二十一年修城郭以修城郭為旱備之首非惟備不虞葢工作興則饑民咸就食也務穡注疏作儉嗇之嗇非林注以為稼穡是也外傳韋昭亦訓稼穡二十二年秦晉遷陸渾之戎于伊川注允姓之戎居陸渾在秦晉西北疏昭九年傳允姓之姦居于爪州惠公歸自秦而誘以俱來是以戎為允姓也彼注云爪州今燉煌則陸渾本燉煌地名徙之伊川復以陸渾為名金履祥曰伊落王畿天地之中雖曰曠土豈宜遷陸渾之戎居之秦晉之罪不惟亂華其偪周甚矣自是伊洛之戎世為周患富辰言于王曰請召太叔吕氏曰襄王伐鄭富辰諫之襄王召子帶富辰實導之能見狄之禍而不能見子帶之禍何也辰所言者兄弟之常可耳子帶長惡怙亂其可以此論耶陸粲曰子太叔有言周公殺管叔蔡蔡叔夫豈不愛王室故也子帶謀奸王位召戎以伐京師其惡大矣彼其得容於齊以逃死桓公管仲與有罪焉富辰區區憂兄弟之不協又為請而復之卒以致亂此知細人之愛而未知臣子之大義也大司馬固諫曰注大司馬固莊公之孫公孫固也按國語晉文公過宋與司馬公孫固相善杜氏以諫戰楚者即此公孫固故以下文請擊未既濟之司馬為子魚葢謂司馬與大司馬為二也史記宋世家則以前後俱子魚之言未詳孰是子魚即公子目夷也弗可赦也已如杜解赦楚則弗可為句趙云言天棄商乆弗赦其罪宋師敗績公傷股門官殲焉蘇軾曰公羊嘉宋襄以為文王之戰不過於此余竊笑之夫襄公陵暴小國至用人於次睢之社雖桀紂有不為乃欲以不鼓不成列不禽二毛求為文王不亦過甚已哉愚謂孟子云霸必以大國齊有負海之饒晉有表裏山河之固其地皆遠於楚故桓文能連結與國仗義尊王一出而與之競宋既小於晉齊而又密邇楚境陳蔡諸國皆其屬也安能與之争勢不得不求諸侯于楚夫楚固桓文之所攘斥也而反從之求諸侯將何以為霸哉其屢被執辱宜矣即戰泓而勝吾謂禍亦不旋踵子魚論戰固兵家之宜然非所以語宋襄也金鼓以聲氣也按金鉦也周禮鼓人以金鐃止鼓葢伐鼓時鳴金以節之非收兵之鉦也林堯叟注誤劉用熈曰聲宣也宣倡士卒之勇氣戎事不邇女器注器物也言俘馘非近婦人之物傅遜曰郭定襄言戎事尚嚴不近女子所御器此解勝杜二十三年䇿名委質傅遜曰注疏以質為形體委質者拜而屈膝愚謂質即贄耳晉語臣委質于翟之鼓韋注質贄也士贄以雉依杜説則質讀如字非也姜與子犯謀醉而遣之金履祥曰齊姜存否不見于傳而劉向列女傳稱晉文迎之以歸為夫人向博極羣書必有考欲觀其祼浴薄而觀之吕大圭曰桓文所以攘楚者必先破其黨與是故桓公伐楚必先有事于蔡文公勝楚必先有事于曹衞左氏不逹其故于侵蔡則曰為蔡姬于侵曹伐衞則曰為親裸與塊其病在推尋事由毛舉細故而二公攘夷安夏之烈皆晦而不章懐嬴與焉陸粲曰外傳言懐嬴之納也重耳欲辭而胥臣輩皆勸受之胥臣輩求悅秦而反國以速富貴雖陷君于惡弗恤矣或者乃稱晉文此舉為廢禮行權以濟其業吾所不識也盧蒲癸謀攻慶氏娶而不辟宗曰賦詩㫁章余取所求焉世儒所謂權者葢類此奉匜沃盥既而揮之注匜沃盥器揮湔也愚謂此似重耳既盥以濕手湔洒懐嬴嬴之怒怒其湔洒非怒奉匜供沃也若如林堯叟注嬴何以既供沃而始怒耶林又謂嬴揮匜水湔洒重耳則于下文何以卑我句益難通矣傅遜云重耳盥畢揮懐嬴使去故嬴以待之倨而怒此亦一說公子賦河水注河水逸詩國語韋昭注河當作沔字相似而誤其詩曰沔彼流水朝宗于海海以喻秦也二十四年子犯以璧授公子愚謂子犯豈真欲亡哉其授璧公子葢慮及他日猜嫌故設術以自固耳不然既欲亡矣何又告之有如白水按河圖云崑崙出五色流水其白水入中國名為河故文公投璧於河曰有如白水使殺懐公于高梁不書亦不告也新安汪氏以桓公殺子糾文公殺子圉竝論譏其得國不以正愚謂子糾得生齊無害于霸而子圉不死則晉霸必不成何以言之子糾雖争國然覉旅在魯不過一亡公子耳况桓以先入齊國高為内主其位已定魯為齊弱乆矣雖納糾勢必無成夫鄭莊公猶能不殺叔段而桓公乃必以殺糾為快哉若子圉之事則異是矣文公入晉子圉己嗣惠為君觀其遣兵拒文公于廬柳勢必不相下假令分國而居瑕甥郤芮輔之二人皆才而喜亂争敓之禍未有已也何以成城濮之功是時秦穆實親納文公瑕卻將焚公宫弑晉侯秦穆誘殺之河上則殺子圉亦必秦穆左右之力不得譏文公之有害于義也傳云不書亦不告也使晉來告而夫子筆之當書曰晉重耳入于晉晉人殺圉與書齊人取子糾殺之者必有異矣後儒乃以二者同律而論不亦過乎寺人披請見韓非子寺人披之言特飾耳君令而不貳者則是貞于君也死君復生臣不愧而後為貞今惠公朝卒而暮事文公披之不貳何如真徳秀曰披可謂知君臣之義矣當獻惠時使有二心于文公豈得為忠丁公為項羽將私從漢王終以被戮漢景帝為太子而召衞綰綰不徃以此見褒披推知此義是以事獻惠時知有獻惠而不知有文公及文公既立即吾君也有難而不以告又豈得為忠文公見之遂免于難非知義者能之乎豎頭須守藏者也其出也竊藏以逃注頭須一曰里鳬須按韓詩外傳云晉文公亡過曹里鳬須從因盗重耳資而亡重耳無糧餒不能行介子推割股以食重耳然後能行且出怨言不食其食愚謂介之推悁忿自遂人也豈真能忘禄位者觀其言全是怨懟既咎文公之濫賞又咎文公之不賞此近於人情乎吾以知之推之隐非真隐也怨也周公弔二叔之不咸按鄭衆賈逵皆以二叔為管叔蔡叔此解不易馬融以為夏殷叔世杜氏從之誤也棄嬖寵而用三良傅遜曰能用三良是鄭伯之賢王當尊之王出適鄭處于汜注鄭南汜也在襄城縣南疏南汜在襄城縣南是鄭西南之境南近于楚西近于周故王處于汜楚伐鄭師于汜皆南汜也其東汜在中牟縣南去鄭城既近三十年秦晉圍鄭秦軍汜南故為東汜各隨其所近而言也服之不衷身之災也陸粲曰聚鷸冠微過爾殺之為罰己重况父之於子乎以是推刃也不道孰甚焉今舍是而以服之不衷是譏末哉君子之見也引地平天成語於義尤迂而不屬辟母弟之難也注叔帶襄王同母弟按史記惠王太子鄭母早死後母曰惠后惠后生叔帶有寵於惠后惠王以惠后故欲廢太子而立之據此則叔帶與襄王異母今傳云同母弟與史不合省視官具于汜注省官司具器用按此言省視其官司器具也杜解支二十五年二禮從國子廵城掖以赴外按衞文公之賢著于國風及其晚年何誖也晉文公過衞而不加禮焉一失也天王居鄭不能奔問官守而惟汲汲滅邢二失也夫邢信有罪矣為狄所滅而反附狄伐衛邢不討則狄勢益張然是時中國雖無霸而魯與宋皆衞與國也使聲邢之罪連兵魯宋以伐之未必不可服邢而挫狄何至使二禮仕邢誘其守而掖殺之以取其國乎行詐諼之謀恣兼并之毒必殄滅周公之祀而始快康叔武公之遺風蕩然矣其與詩所云秉心塞淵騋牝三千者相去何遠耶遇黄帝戰於阪泉之兆晉語昔少典娶于有蟜氏生黄帝炎帝黄帝為姬炎帝為姜二帝用師以相摘也韋昭注摘滅也史記軒轅之時炎帝神農之後欲侵陵諸侯諸侯咸歸軒轅乃脩徳振兵敎熊羆貔貅貙虎以與炎帝戰于阪泉之野三戰然後得志括地志阪泉今名為黄帝泉在媯州懐戎縣東五十六里請隧弗許曰王章也疏天子之葬棺重禮大尤須謹慎去壙遠而闕地通路從遠處以漸邪下之諸侯以下棺輕禮小臨壙上而直縣下故隧為王之葬禮傅遜曰章典章也猶云王制杜解鑿矣始啟南陽林注周四邑在晉山南河北故曰南陽括地志懐州獲嘉縣即古之南陽按温原陽樊桓王以與鄭者鄭不能有仍歸之王畿至是襄王以賜晉文晉遂兼有河北之地史記白起攻韓南陽太行道絶即此南陽也隈入而係輿人師從隐蔽之處而入詐縛輿人若克息而獲其囚俘者坎血加書疏旣盟之後以牲及餘血并盟書加于牲上坎而埋之二十六年室如縣罄注如而也陸粲曰如之為而雖傳記多有此自當依本字罄國語作磬韋昭注府藏空虚但有榱梁如縣磬也王學林亦云縣樂器之磬葢罄磬古字通時夏四月今之二月而云野無青草其時魯必有旱荒史佚之耳東門襄仲臧文仲如楚乞師張洽曰孔子以臧文仲竊位罪為國之無謀也使其立展禽以為政所以輔僖公者必有道矣何至從公子遂乞楚師以伐齊哉祝融鬻熊注鬻熊祝融之十二世孫疏自祝融至鬻熊司馬遷不能紀其世杜言十二世不知出何書我先王熊摯有疾鬼神弗赦而自竄于夔是以失楚又何祀焉按楚世家熊渠卒子熊摯紅立摯紅卒其弟弑之代立曰熊延正義云譙周古史熊渠卒子熊翔立翔卒長子摯有疾少子熊延立與史言弑不合宋均注樂緯云熊摯有惡疾不得為後别居于夔為楚附庸後王命曰夔子也吕祖謙曰夔既祖熊摯其不遠祀祝融與鬻熊正也特其答辭甚忿所以激楚怒而見滅二十七年貫三人耳陸粲曰程大昌云軍法以矢貫耳為聅敕列切說文引司馬法小罪聅中罪刖大罪剄子玊葢用此法如孔氏以耳為助句則言貫三人者何所貫也其不能以入矣入舊解作入敵師邵云所帥者多則驕而必敗以入言全師而歸也東坡志林蒍賈論子玊不可過三百乗而卻克自謂不如先大夫請八百乗將以用寡為勝抑將以用多為賢耶如淮隂侯言多多益善是用多亦不易古人以兵多敗者不可勝數如王尋苻堅哥舒翰者多矣子玊剛而無禮少與之兵或能戒懼而可不敗若伐曹衛楚必救之則齊宋免矣孫武子我欲戰敵雖髙壘深溝不得不與我戰者攻其所必救也張預曰攻其所顧愛使之相救援若楚人圍宋晉伐曹衞楚救之而得免是也二年欲用之鍾惺曰于欲用之可矣乎見伯者急欲自見之意齊桓初年屢欲從事于諸侯管仲止之文公初年屢欲用其民子犯止之句踐生聚之後屢欲伐吳范蠡止之皆去其功名自喜之氣然後一舉而功見名立二十八年稱舍於墓師遷焉洪邁曰萬事不可執一而兵為甚晉文公圍曹稱舍於墓因其兇而攻之遂入曹燕將騎刦攻齊即墨田單縱反間言吾懼燕人掘吾城外冢墓燕軍乃盡掘之齊人望見涕泣遂敗燕晉燕之用計同而成敗異者何耶晉但舍於墓陽為若將發冢故曹人懼而燕則真為之以激怒齊人適墮田單之謀耳乗軒者三百人也郝敬曰曹蕞爾國舉羣臣不能三百人而况大夫言三百者極道其盛耳距躍三百曲踊三百距躍二句難解邵寳曰踊躍者皆絶地而起所謂跳也距躍直跳也曲踊横跳也横跳必先直而旋故不曰横而曰曲百音陌猶阡陌之陌三陌葢躍踊之度大約有此愚謂䘮禮有三踊之文踊葢以三為節躍亦踊也魏犨以䘮禮自處示將即死故文公哀而舍之兩三字當一讀百注訓勵未詳所本葢勉力為之有解作三百之數者謬也魏犨以䘮禮自處猶季孫意如見荀躒練冠麻衣跣行以示憂戚使宋舍我而賂齊秦王樵曰晉欲戰而齊秦未可與漢追項羽而信越不至此正事機不可忽漢用張良計捐梁楚地許信越使自為戰正晉使宋舍我而賂齊秦意也于此見先軫之計不惟能致楚又能使齊秦齊秦自欲戰則吾事濟矣當時直趨宋郊逆與之戰而齊秦前卻能保無敗晉侯在外十九年矣注晉侯生十七年而亡亡十九年而反凡三十六年至此四十矣愚按晉世家重耳自少好士年十七有賢士五人獻公即位重耳年二十一奔走時年四十三歸晉年六十二此注云云與史全不合何也豈他有所據耶抑誤以得士之年為出亡之年耶執宛春以怒楚孫武子怒而撓之張預曰彼性剛忿則辱之令怒志氣撓惑則不謀而輕進若晉文執宛春以怒楚是也陳禹謨曰武侯以巾幗遺司馬懿魏人以巾幗遺蕭宏梁宗室杜伏威以婦人之飾遺陳稜隋將皆怒而撓之之術也懿獨托辛毗之制寧蒙恥而師不出葢惟怒不能撓始合牝以静勝之說私許復曹衞曹衞告絶於楚洪氏邁曰先軫為晉謀使曹衞告絶於楚張儀為秦謀使楚告絶於齊是皆所謂親而離之者愚謂先軫此謀晉之伐曹衞者且以收曹衞而楚之庇曹衞者反以失曹衞矣剛而無禮之子玊安得不墜其計中以亢其讎注亢猶當也讎謂楚一曰亢即亢宗之亢謂蔽也讎宋也宋為楚讎而晉蔽之則曲矣外傳所謂未報楚惠而亢宋者是也退三舍吕祖謙曰晉文加兵曹衛以致楚許復二國以㩦楚又拘子玉之使以怒楚三舍避之以誘楚其詭計如此夫子所以㫁之曰譎愚謂晉文之計誠譎然兵行詭道求勝而已不如是何以一戰而霸乎晉文勝楚之功較之齊桓聲勢甚大左公序次亦極力張皇周衰頼此稍稍吐氣耳楚師背酅而舍疏兵法右背山後前阻水澤楚師背酅而舍知其背丘陵也葢所舍之處有丘名酅其處有險阻也原田毎毎楊慎曰文選注引韓詩周原腜腜菫荼如飴韻正相叶左傳原田毎毎又與腜腜通楚子伏己而盬其腦注盬啑也疏盬之為啑也未見正訓葢相傳為然服䖍云如俗語相罵云啑汝腦傅遜曰盬從皿啑從口二字絶不相通不知何自而以啑訓下文云吾且柔之據考工注云得和煦之氣故柔使果啑而食之則何得其和煦之柔也子犯雖權辭以解亦須有因何遠理如此葢楚子伏晉侯于下以手捧持其腦而撲碎之此盬即詩王事靡盬之盬與易幹蠱之蠱通故正義于襄二十九年傳云盬亦蠱也蠱是蠱之害物故為不堅固也又曰杜云腦所以柔物也雖如此解而不知所以柔之之義考工記曰角之本蹙于􅑠而休于氣是故柔柔故欲其埶也􅑠腦同注云言角之本近于􅑠得和煦之氣故柔柔欲其形之自曲及是為執也始知古人立言之故與制器之巧因憶歐陽公得人氣粉犀之説于釋子亦即此義俞琰曰内則云豚去腦左氏注云腦所以柔物今人熟皮必用猪腦欲其柔也昔人食猪腦一具暮年手足軟弱遂成癱瘓方知内則左氏之說不誣潛夫論晉文城濮之戰夢楚子伏己而盬其腦是大惡也及戰乃大勝此謂極反之夢也韅靷鞅靽注在背曰韅在腦曰靷在腹曰鞅在後曰靽言駕乗修備疏說文云著掖皮曰韅引軸曰靷頸皮曰鞅縶足曰靽杜與說文不同葢以時驗而解之釋名韅經也横經其腹下也靷所以引車也鞅嬰也㗋下稱嬰言纓絡之也靽半也拘使半行不得自縱也胥臣以下軍之佐當陳蔡趙汸曰傳見陳蔡不書于經者凡諸侯以兵屬夷狄皆不序狐毛設二斾而退之欒枝使輿曳柴而偽遁劉寅曰晉與楚戰胥臣以師犯陳蔡此兵法所謂向前為正也狐毛設二斾而退欒枝使輿曳柴偽遁此兵法所謂後卻為竒也楚師馳之原軫卻溱以中軍横擊之狐毛狐偃以上軍夾攻子西此與太宗霍邑之戰同皆以竒為正也但狐毛欒枝設斾以誘楚人之來而霍邑右師少却建成墜馬偶合出竒之道以此不同耳子人九行成于晉疏桓十四年鄭伯使弟語來盟杜云子人即弟語也其後為子人氏七年傳子華云泄氏孔氏子人氏三族實違君命今子人九必是語之後也杜譜以九為雜人謬矣賜之大輅之服戎輅之服按大輅祭祀所乗戎輅兵事所乗二輅各有服大輅之服鷩冕之服也戎輅之服韋弁之服也葢并輅與服而賜之出入三覲邵寳曰始至而見一覲也享禮受策二覲也去而辭三覲也前驅射而殺之注衞侯遂驅掩寗子未備傅遜曰前驅必探衞侯有害叔武意故不待命而殺之然使衛侯果驅之以掩寗子未備則是承公命殺叔武矣公何枕股而哭又使殺􅞰犬乎亡大斾之左旃注大斾旗名繫旐曰斾通帛曰旃疏釋天云緇廣充幅長尋曰旐繼旐曰斾則斾是旗之尾也今别曰大斾則大斾是旗名上云狐毛設二斾而退之即此也通帛為旜乃司常文鄭𤣥云通帛謂大赤從周正色無斾謂之左旃葢是左軍所建傅遜曰杜云大斾旗名繫旐曰斾據傳云大斾則是大將所建之旗不可繫于旐也前于狐毛二斾杜既云大旗也何于此復曰繫旐乎傳云大斾之左旃則旃為斾上之一物杜釋未詳孔氏云此亦於事難明不可強說陳啟源曰小雅白斾央央按巾車革路建大白以即戎注云大白殷旗鄭氏以為王不親將故建先王之正色葢詩所云白者斾之色爾雅所云繼旐者斾之形也此大斾即詩之白斾是大將所建之旗寗武子為輔鍼其㢘反莊子為坐士榮為大士疏寗武子為輔輔莊子也以武子位高故先言之士榮亦輔莊子邵寳曰輔輔其訟也國君不親坐獄葢周禮如此坐猶今之跪莊子為坐則專與于兩造矣士榮為大士居其官也亦輔之而已非聽之也殺且刖之者猶刑其師傅之意愚謂此必以晉之獄官莅之傳文不詳耳寗子職納槖饘焉注槖衣囊按槖以盛饘故曰槖饘寗子慮防酖毒故以餽食為已職不必兼及衣也書曰天王狩于河陽言非其地也疏天子諸侯田獵皆于其封内不越國而取今稱狩于河陽河陽晉地若示譏然假詞稱狩實非譏也按古有廵狩之禮王狩而諸侯朝則其名正傳誤以為田獵之狩故云非其地耳二十九年秦小子憗注秦小子憗在蔡下者若宋向戍之後㑹後㑹後于㑹也趙汸曰秦伯爵其大夫自當班蔡國大夫下非為後至成二年秦右大夫說在宋華元陳公孫寧上乃楚人為之不可據為例是生三犧皆用之矣其音云凌稚隆曰按周禮夷𨽻掌與鳥言貉𨽻掌與獸言注夷𨽻征東夷所獲貉𨽻征北夷所獲介是東夷亦通獸音故聞牛聲而知其情三十年晉侯使醫衍酖衞侯注衞侯罪不及死故使醫因治疾而加酖毒疏晉人執衛侯歸于京師如是衛侯合死而云罪不及死者衛侯之心疑叔武耳前驅􅞰犬卜君意而殺之非衛侯命殺也公知其無罪枕股而哭又命殺􅞰犬是則殺非公意也故不至死若然則衛侯無罪而徃年衛侯與元咺訟衛侯不勝殺士榮刖鍼莊子者用讒疑賢弟渝盟先期入是衛侯之罪也罪不及死而晉侯心怨欲得殺之故使醫因治疾而加酖毒若不治疾不得使醫故知因治疾也魯語臧文仲言于僖公曰夫衛公殆無罪矣今晉侯鴆衛使而不死亦不討醫諱而惡殺之也是罪不合死之事也愚謂衛侯忌愎而躁安得無罪但君臣無獄咺不當與之論曲直耳夜縋而出見秦伯曰孫武子親而離之張預曰善用兵者或間其君臣或間其交援使相離貳然後圖之應侯間趙而退㢘頗陳平間楚而逐范増此君臣相離也秦晉相合伐鄭燭之武夜縋出説秦伯退師此交援相離也使杞子逢孫楊孫戍鄭傅遜曰文公雖討鄭非有滅之之意若以好喻晉使之釋憾各解兵而歸斯善矣奈何反為鄭置戍輕于背向自啟兵端卒至怨結不解豈非始謀之不善哉昌歜在感反按說文歜盛怒氣也從欠蜀聲音觸音義云在感反未詳三十一年使臧文仲徃趙匡曰使臧文仲徃不合不書且二十九年執曹伯不應四年方分其地趙汸曰按上書公子遂如晉下又書公子遂如晉亦不應更使一卿如晉受田據傳言晉必親其共是晉大夫疆理曹田以分諸侯文仲至分田處受之非以使禮如晉故不書于策踐土後伯主有尋盟討貳之事經四年無足疑外傳記之甚詳牛卜日曰牲疏牲與日俱卜之必當先卜牲而後卜日卜得吉日則改牛為牲知卜牛在卜日之前也此言免牲是己得吉日牲既成矣成七年乃免牛是未得吉日牲未成也晉蒐于清原注河東聞喜縣北有清原水經注汾水西逕清原城北故清陽亭也城北有清原晉侯蒐田作五軍處三十二年晉文公卒愚謂齊桓晉文霸功相埓然齊伯止一世而晉子孫代興嗣霸幾二百年說者咎桓公多内嬖立子不以長之之故此固然矣吾觀二公得國之始一則爭之以疾一則應之以遲其局量已㢠不同桓之入齊也中鈎佯死以誤管仲赴之惟恐不及雖剸刃其親弟而不恤也文公則㢲辭秦穆惠懐之際坦然待之直至里㔻發難内外之望咸歸一人然後徐起而收其敝葢辭之益乆則守之益安蓄之愈深則持之愈固理固如是爾湯武之興也皆非汲汲然有取天下之心故其子孫世享成業以晉文視湯武何啻美玊之於碔砆然其不急於得國則庻幾近之矣夫子正譎之評葢止論召陵城濮之戰事而豈以此定二公之優劣耶庚辰將殯于曲沃注殯窆棺也疏殯攒置西序亦是下棺於地故殯為窆棺晉自曲沃兼晉國有舊時宮廟故公卒而徃殯焉禮諸侯五日而殯按經文以己卯卒庚辰是卒之明日即將殯者曲沃路逺故早行耳君命大事將有西師過陸粲曰雍絳相去既逺秦人密謀卜偃何由得聞或以他術知之左氏好采異說此等竒怪猥多未容悉辨愚謂春秋兵謀多用間諜此當以間謀得之耳魏禧云濟西之役戎侵魯而不知者無諜也秦謀襲鄭而晉早知之者間諜也必有悖心必有悖戾之心如下滅滑是也召孟明西乞白乙注孟明百里孟明視西乞西乞術白乙白乙丙疏世族譜以百里孟明視為百里之子則姓百里名視字孟明也古人名字皆先字後名而連言之其術丙必是名西乞白乙或字或氏不可知也晉人禦師必于殽風俗通崤在𢎞農渑池縣其語曰東崤西崤渑池所高元和志自東崤至西崤三十五里東崤長坂數里峻阜絶澗車不得方軌西崤全是石坂十二里險不異東崤二崤皆在秦闗之東漢闗之西張預曰凡舉兵伐敵所戰之地與日必先知之則所備者專所守者固雖千里之逺可以赴戰若蹇叔知晉人禦師必於崤是知戰地也陳湯料烏孫圍兵五日必解是知戰日也又若孫臏度龎涓日暮必至馬陵是也按古人用間諜多在險隘之處漢七國反趙渉説周亞夫曰吳王知將軍將行必置間人于殽渑阨陿之間亞夫至滎陽果搜得之孟明師經二殽而不知于此置間能無為晉禽哉其北陵文王之所辟風雨也注此道在二殽之間谷深委曲兩山相嶔故可以辟風雨古道由此魏武帝西討巴漢惡其險而更開北山高道何休曰其道險阻隘勢一人可要百故文王過之驅馳常若避風雨然讀左日鈔卷三
