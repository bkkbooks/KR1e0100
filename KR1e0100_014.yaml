body:
  text: 讀左日鈔補卷下吳江朱鶴齡撰成公二年曲縣周禮注鄭司農云宫縣四面縣軒縣去其一面判縣又去其一面特縣又去其一面軒縣三面其形曲故春秋傳曰曲軒諸侯之禮也赦之以勸事君者乃免之卻克不殺丑父丑父必歸齊師矣史記得之公羊傳云逢丑父免齊侯卻克曰欺三軍者其法若何曰法斫於是斫丑父此不可信賜三帥先路三命之服注已嘗受王先路之服今改而易新并此車所建所服之物疏按釋例先路者革路若木路或云先或云次蓋以就數為差其受之於王則稱大鄭子蟜叔孫穆子受王路皆稱大是也革木是卿大夫車之尊者故云大路諸侯車以金路為尊亦稱大定四年大路大旗是也天子車以玉路為尊亦稱大顧命大路在賓階面是也知改而易新者彼若先無此物無由敢受魯賜魯亦不敢賜之也周禮巾車云革路建大白以即戎司服云凡兵事韋辨服又巾車云木路建大麾以田司服云凡田冠辨服然則此車所建或是大白大麾所服或是韋辨冠辨劉炫以為晉君之賜杜以傳有穆叔子蟜事故據而言之司馬司空輿師候正亞旅皆受一命之服注晉司馬司空皆大夫疏司馬司空本卿官但晉之諸卿皆以三軍將佐為號其司馬司空已為大夫仍有卿名之嫌故曰皆大夫明他國以為卿晉以為大夫也周禮侯伯之卿三命大夫再命此三帥皆卿也本國三命故魯賜以三命之服司馬司空以下本國一命故皆受一命之服卿言賜大夫言受互相足也椁有四阿注四阿四注椁也疏周禮匠人殷人四阿重屋鄭𤣥云阿棟也四角設棟也此云四注椁是椁上四注而下禮天子椁題凑諸侯不題凑不題凑則無四阿王命委於三吏注三吏三公也疏曲禮云五官之長曰伯其擯于天子也曰天子之吏注引此傳云三吏謂三公是三公稱吏故知三吏三公也於時王不見鞏朔命委三公接見之故曰委於三吏五年伐鄭泛音凡祭側界反注泛祭鄭地城臯縣東有泛水疏杜注滎陽中牟縣有東泛襄城縣有西泛知泛祭非彼二汜者以泛祭既為晉人所取當是鄭之西北界即今之泛水也字書水㫄泛為泛水㫄泛為汜字相亂也漢書音義亦為泛今泛水上源為泛谷乘縵注車無文按周禮巾車孤乘夏篆卿乘夏縵大夫乘墨車鄭𤣥云夏篆五采畫轂約也夏縵亦五采畫無篆耳墨車不畫杜氏注云車無文蓋乘卿車之無采者以示貶損之義孔氏疏以為乘大夫墨車恐不然六年且為僕大夫注兼太僕按周禮太僕下大夫一人侍御之臣最親君時韓厥將新中軍則正卿矣而領下大夫之職是兼官也顧炎武曰必言僕大夫者以君之親臣故獨揖之從公而立寢庭也注未及獻子從公立於寢庭注路寢之庭疏禮玉藻云君日出而視朝退適路寢聽政知寢庭是路寢之庭也太僕職云王視燕朝則正位掌擯相鄭注燕朝朝於路寢之庭也韓獻子既為僕大夫故知寢庭路寢之庭也九年南冠而縶疏應劭漢官儀云法冠一名柱後冠左傳南冠而縶即楚冠也秦滅楚以其冠賜近臣御史服之即今之獬豸冠也無棄菅蒯疏陸璣詩疏云菅似茅滑澤無毛肋宜為索漚及曝尤善蒯亦菅之類可以為屨其肋如菅並可代絲麻之乏十一年卻犫來聘注卻犫卻克從父昆弟疏按世本卻豹生冀芮芮生克又云豹生義義生步揚揚生州州即犫也如彼文則犫與克俱是豹之曽孫當為從祖昆弟服䖍以為從祖昆弟杜云從父昆弟或父是祖字誤耳十六年左右執兵而下矣注左將帥右車右疏兵車惟元帥在中御者在左其餘將帥皆御者居中帥在左左右執兵而下惟御者持車不下耳晉楚遇于鄢陵公筮之史曰吉其卦遇復至王中厥目汪琬曰此蓋筮得復之頥也復外卦坤為國又為西南方之卦故曰南國內震木克外坤土故曰䠞震為蒼筤竹以矢上射之象也凡卦上為首元者首也元為王即爻辭國君也又爻辭有災眚眚為目疾故曰射其元王中厥目所謂用行師至于大敗以其國君凶者是也或謂震坤拱巽離巽為多白眼離為目無離無巽則中目此殆近于穿鑿矣子在君側敗者一大我不如子子以君免顧炎武曰敗者一大恐君之不免也我不如子子之才能以君免也注謂軍大崩為一大及御與車右不同者非愚按御與車右同在君側豈可云車右稍逺君乎前注誤引今取此正之今衆繁而從余三年矣無傷也疏聲伯初謂凶夢應在已懼不敢占今衆人繁多而從余三年意夢之凶災散在衆身不在己也故云無傷襄公元年晉韓厥荀偃注荀偃不書非元帥疏魯師出竝舉他將他國惟書元帥詳內略外春秋之常四年無櫬不虞注櫬親身棺不反哭疏檀弓云君即位而為椑嵗一漆之夫人尊與君同亦當生時有椑今無櫬者素無器備禮葬訖日中反虞於正寢謂之反哭今不虞欲不為反哭也后羿自鉏遷於窮石史記正義括地志云故鉏城在滑州衛城縣東十里晉地記云河南有窮谷蓋古有窮氏所遷也處豷於戈注戈在宋鄭之間疏哀十二年傳宋鄭之間有隙地焉曰嵒戈錫是也有窮於是遂亡顧炎武曰注云浞因羿室不改有窮之號非也哀元年伍員明言昔有過澆矣此特承上死於窮門而言以結所引夏訓之文爾愚謂寒浞封子澆於過遂稱過澆或澆以過為國號耳浞之國號無考五年公在位注在阼階西鄉疏喪大記云大夫之喪將大殮鋪絞襟衾衣君至主人迎先入門右巫止於門外君釋菜以禮門神祝先入升堂君即位於序端東序之端士喪禮云君視殮既布衣君至君升自阼階西鄉以君臨士喪西鄉知臨大夫之喪即位於序端亦西鄉也九年使華臣具正徒疏司徒所具正徒者常共官役若今之正丁其司里所使遂正所納皆是臨時調民而役之若今之夫役相土因之故商主大火注相土契孫始代閼伯之後居商丘祀大火疏本紀契生昭明昭明生相土相土是契孫也舜始封契於商鄭𤣥云商國在太華之陽皇甫謐云今上洛商縣是也如鄭𤣥意契居上洛之商至相土而遷於宋之商丘及湯有天下逺取契所封商以為一代大號服䖍王肅俱云相土居商丘故湯以為國號按詩云天命𤣥鳥降而生商不言居商丘也若契之居商即是商丘則契已居之傳不得云相土因閼伯也釋例同鄭說穆姜薨于東宫始往筮之遇艮之八史曰是謂艮之隨隨其出也汪琬曰隨內震外兑是動而得毁折之象也反體為蠱蓋醫和所謂女惑男者以擬穆姜之為人亦甚類矣又互體為艮為巽艮止巽入入而止焉此其兆皆不能出彖辭雖無咎於穆姜何有而史云然者殆阿姜意而為之諱也或為艮之隨亦隨之艮信如此說則隨六二係小子失丈夫艮六二艮其腓不拯其隨其心不快又皆不可出之象明矣十一年政將及子子必不能顧炎武曰注云魯次國而為大國之制貢賦必重故憂不堪非也言魯國之政將歸於季孫以一軍之征而供霸國之政令將有所不給則必改作其後四分公室而季氏擇二蓋亦不得己之計叔孫固已豫見之矣歌鐘二肆及其鎛磬疏杜氏以傳惟言歌鐘故但解鐘數云二肆三十二枚其實磬數亦同此二肆皆為編縣也下云及其鎛磬鎛是大鐘磬是大磬皆特縣之非編縣也據鄭𤣥禮圗如此言歌鐘者歌必先金奏故鐘以歌名之晉語引孔朝注云歌鐘鐘以節歌也晉侯以樂之半賜魏絳周禮注鐘磬編縣之二八十六枚而在一虡謂之堵鐘一堵磬一堵謂之肆半為堵者謂諸侯之卿大夫也諸侯之卿大夫半天子之卿大夫西縣鐘東縣磬無鎛疏鄭賂晉侯止有二肆當天子卿大夫判縣故取半賜魏絳絳得之分為左右故云始有金石之樂十三年先王卜征五年嵗習其祥祥習則行注征謂巡狩征行按周官云六年五服一朝又六年王乃時巡此王制也石㚟云云於經傳未聞或謂昭王南征不復後王憚於征行故有此制然㚟特假為是言欲令楚修德豈必據為典要乎鄭康成禮記注引之以為天子有卜無筮之證則過泥其說矣十四年尹公他學射於庾公差庾公差學射於公孫丁疏孟子引此事姓名略同事正相反孟子蓋傳聞異辭傳文是實成國不過半天子之軍疏鄭𤣥說成國惟公與侯伯雖與侯同命地方三百里未得為成國成國乃得半天子之軍未成則不得也夏官云大國三軍次國二軍小國一軍當以公侯為大國伯為次國子男為小國也周禮疏成國之賦有三春秋時成國不過半天子之軍是據公五百里而言侯伯為次國止二軍晉侯爵也以世為霸主故得置三軍按賈公彥說與鄭𤣥異杜氏從鄭商旅於市百工獻藝疏旅陳釋詁文商人陳其不正之物以諫君也商陳此物本非以諫但觀所陳則貴尚可見在上審而察之以改其過故亦為諫類如齊之鬻踊是也獻藝即夏書所云工執藝事以諫十六年歌詩必類注歌古詩當各從其義類疏謂各從其恩好之義類十七年衛石買孫蒯注孫蒯不書非卿疏經書他國征伐例書元帥而已此經已書石買縱蒯是卿亦不書左師為己短䇿苟過華臣之門必騁林注向戍自為短馬捶助御鞭馬過華臣門必馳去不欲與相見惡之甚也晏嬰粗縗斬苴絰帶枚菅屨食鬻居倚廬寢苫枕之鴆反草疏衰用布為之廣四寸長六寸當心喪服子夏傳曰衰三升鄭𤣥云布八十縷為升三升之布布之最粗者故曰粗縗斬蓋以粗布為衰而斬之也雜記注引此云粗縗斬者言縷在齊斬之間謂縷如三升半而三升不緝也雜記蓋言當時之制大夫與士有異故彼注如此杜氏不用其說麻有子曰枲苴者麻之色其色粗惡故用之麻在首在要皆曰絰此言絰謂首絰也禮記疏引此以為要絰要絰要帶也帶絞帶也鄭𤣥云要絰象大帶又有絞帶象革帶杖竹杖以苴色之竹為杖也為父苴杖為母桐杖茅之已漚者名菅菅屨以菅草為屨也食鬻謂朝一溢米暮一溢米鄭𤣥云溢二十兩也為米一升二十四分升之一又居倚廬謂倚東牆為之鄭𤣥云在中門外東方北户苫編藁也寢苫是喪禮之常枕草非喪禮文故其老以為非大夫之禮二十一年宣子使城著而遂逐之晉語平公六年箕遺及黃淵嘉父作亂不克而死公乃問陽畢畢對曰欒書實覆宗殺厲公以厚其家若滅欒氏則民威矣公許諾盡逐羣賊使祁午陽畢適曲沃逐欒盈按國語所云箕遺等十人之死不在同時又先誅十人而後逐欒盈此傳先言逐盈後言誅其黨屬文之勢宜然非必欒盈既奔之後方殺十人也國語云適曲沃逐欒盈恐不然曲沃乃盈之窟其黨甚盛盈若在焉必據邑為亂安能遽逐之哉孔氏云就著逐其身適曲沃逐其家此說有理得罪於王之守臣顧炎武曰守臣謂晉侯玉藻諸侯之於天子曰某土之守臣某是也注以為范宣子非二十三年禮為鄰國闕顧炎武曰注云禮諸侯絶期故以鄰國責之非也杞孝公乃晉平公之舅尊同不降當服緦麻三月言鄰國之喪且猶徹樂而況於母之兄弟乎二十四年曩者志入而已今則怯也言曩者不告而馳志在入敵壘今則怯敵故不待而出二十六年晉士起將歸時事於宰旅周禮三命受位疏天子之上士三命諸侯之卿大夫皆得聘天子惟三命始有列位於王為王臣故曲禮云列國之大夫入天子之國曰某士晉韓起乃大國之卿三命而於天子稱士與天子三命之士同稱士即為王臣也先八邑注八邑三十二井疏按論語有十室之邑又杜注免餘辭邑為一乘之邑知此邑非彼大邑者邑名大小無定子展子産為卿日久先有采邑今以入陳有功加賜田土不應與以八大邑其實一乘稱邑文無所出故以周禮四井為邑解之釁於勇嗇於禍注釁動也嗇貪也疏王肅云釁謂自矜奮以誇人王延夀魯靈光殿賦云仡奮釁以軒鬐是釁為奮動意也嗇者吝嗇之名故為貪詩云民之貪亂寧為荼毒是小人之性貪禍亂也十八年得慶氏之木百車於莊顧炎武曰木者作室之良材莊者國中之要路言將代之執齊國之權邵國賢所謂隱語也二十九年璽書追而與之蔡雍獨斷璽印也信也天子璽白玉螭虎紐古者尊卑共之夏肄是屏詩傳斬而復生曰肄方言云枿餘秦晉之間曰肄齊人立敬仲之曽孫酀注敬仲髙徯疏世本云敬仲生莊子莊子生傾子傾子之孫武子偃據此則偃為敬仲𤣥孫今傳言曽孫必有一誤此酀即後所云髙偃也聲相近而字異董遇注此亦作偃三十年使為君復陶注復陶主衣服之官疏昭十二年傳說楚子出獵皮冠秦復陶翠被豹舄復陶在冠屨之間知是衣也此言君復陶知是主君衣服之官也復陶之義未詳惟君用鮮注鮮野獸疏殺新曰鮮必於田獵得之周禮疏據禮卿大夫得田獵而左氏豐卷請田子産不許者常田之外臨祭取鮮人君乃得行之大夫止常田耳記云大夫不掩羣亦是常田三十一年以贏諸侯注贏受也疏賈服王注皆讀為盈盈是滿故皆訓受昭公元年賈而欲贏而惡嚻乎喻季孫伐莒求利安能免叔孫之怨疾如蠱按古文而字多作如此言疾而得惑志之蠱也孔氏疏乃云淫而失性未全是蠱故曰如蠱下文明言淫則生內熱惑蠱之疾可謂之未全是蠱乎隂淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾按內經曰隂平陽祕精神乃治隂勝則寒陽勝則熱寒勝則浮熱勝則腫此隂淫寒疾陽淫熱疾之謂也又曰風者善行而數變百病之長也風勝則動王冰注風勝則庶物動搖四肢為四末受氣於中宫中宫不足則四肢厥冷故風淫為末疾也又曰雨氣通於腎雨溼流行腎水受邪民病腹病又曰溼勝則濡瀉蓋脾土惡溼溼盛則土不能制故雨淫為腹病也醫書又有晦傷魄明傷魂之論以魂陽而魄隂也隂失節則晏惰故惑疾生陽太用則煩勞故心疾生在周易女惑男風落山謂之蠱皆同物也林注巽下艮上蠱巽為長女艮為少男少男而說長女蠱惑之象巽為風艮為山山木為風所落蠱壞之象與皿蟲之蠱榖飛之蠱皆同物類三年張躍有知其猶在君子之後乎顧炎武曰言庶幾可以為君子也蓋人臣雖有諱國之禮然或憂其將亂而私告之於友亦無害於義二雅之詩固多有之而叔向晏子之相與語亦無譏於君子也且諺曰且字文義不接或疑上有闕文愚謂且乃曰字之誤諺曰以下皆晏子使宅人反故室之辭五年初穆子之生也莊叔筮之遇明夷之謙以示卜楚丘曰是將行而歸為子祀以讒人入其名曰牛卒以餒死汪琬曰楚丘之辭多未易曉姑擇其可曉者言之其曰行者艮為徑路爻辭所謂於行有攸往是也曰歸者離為飛禽艮為止止不得行所謂於飛垂其翼是也曰讒者離火言揚所謂有言是也曰以餒死者離位居三艮為兌之反不見其口則無以食所謂三日不食是也以上率與爻象合至于為祀則卦中無祀象名牛則卦中有牛而亦無為名之象也其他雜引之卦尤多支離附㑹疑左氏嘗文之以神其占未必皆楚丘本辭也若陳敬仲筮得觀之否史知其將興于姜張守節謂爻屬辛未又觀上體巽未羊巽女女乘羊故為姜此乃以字體牽合則并非左氏之指矣飱有陪鼎疏聘禮賓始入館宰夫朝服設飱飪一牢在西鼎九羞鼎三鄭𤣥云鼎實如饔餼羞鼎則陪鼎也以其實言之則曰羞以其陳言之則曰陪服䖍云陪牛羊豕鼎故云陪鼎六年得貺不過三獻注周禮大夫三獻疏周禮卿五獻大夫三獻鄭注掌客爵卿也饔餼五牢爵大夫也饔餼三牢獻視饔餼之數故言大夫三獻也以其乘馬八匹私面按周禮司儀有私面私獻注私面私覿也郊特牲又云朝覲大夫之私覿非禮也蓋朝與聘不同聘奉使則以申信朝從君則為外交也八年輿嬖袁克殺馬毁玉以葬顧炎武曰杜氏注以輿為衆及謂欲以非禮厚葬哀公皆非也輿嬖輿大夫也言輿者掌君之乘車如晉七輿大夫之類馬陳侯所乘玉陳侯所佩殺馬毁玉不欲使楚人得之今在析木之津注箕斗之間有天漢故謂之析木之津疏析木之津於十二次位在寅劉炫云天漢即天河也天河在箕斗二星之間箕在東方木位斗在北方水位分析水木以箕星為隔隔河須津梁以渡故謂此次為析木之津也此次自南而盡北故依此次不名析水而名析木也襄二十二年傳稱嵗星在娵訾豕韋衛地也秦漢以後名娵訾之口明年乃及降婁嵗星嵗行一次降婁距今九年故此年嵗在析木之津也十二年三命踰父兄非禮也疏禮文王世子云其朝於公內朝雖有三命不踰父兄謂在公內朝位在父兄下非謂不得受三命踰父兄也叔仲子欲搆二家故言昭子受三命自踰其先人以此為非禮十三年蔡公知之曰欲速棄疾知陳蔡人之情欲築軍壘以復讐為名故語之云入楚欲速也入楚不速則變生見棄疾此時便有作略乃求王遇諸棘闈以歸吳語昔楚靈王不君三軍叛之於乾溪王獨行屏營倣徨於山林之中三日乃見其涓人疇王呼之曰余不食三日矣疇趨而進王枕其股以寢於地王寐疇枕王以塊而去之王覺而無見也乃匍匐將入於棘闈棘闈不納乃入芈尹申亥氏焉再㑹而盟以顯昭明按儀禮天子朝諸侯出拜日於東門之外反祀方明注云凡㑹同者不協而盟祀方明者不協而盟故也然則盟誓之禮古蓋有之但成周盛時未必然耳卑而貢重者甸服也疏畿內有公卿大夫之采邑周禮小司徒注采地入者皆四之一其制三等百里之國凡四都一都之田稅入於王五十里之國凡四縣一縣之田稅入於王二十五里之國凡四甸一甸之田稅入於王食采者卑與尊同故云卑而貢重也畿外之國則卑者貢輕尊者貢重孔張後至立於客間執政禦之適客後又禦之適縣間疏孔張後至蓋賓入廟門公揖之時孔始來也至當適東夾之南西面立客間者賓入未升階立西方孔誤立於其間也禦之則移立於賓之西又禦之乃立鐘磬樂肆之間則益西也十八年振除火災顧炎武曰振如振衣之振猶火之著於衣振之則去也注以振為棄未當鄭有他竟望走在晉顧炎武曰言鄭有他竟之憂將望晉而奔走之注謂雖與他國為竟者非飲大子止之藥卒大子奔晉按榖梁傳云止不立乎其位以與其弟虺哭泣啜飦粥未踰年而死與左云奔晉不同世系云莒悼公卒斯立與榖梁云與弟虺亦不同當參考二十二年殺摯荒以說注委罪於荒疏王子還與單子重盟而還殺摯荒者為前取王如莊宫令單子失王而出奔殺荒以解說此罪單子覺還欲背已故又奔平畤二十五年謂曹氏勿與注曹氏宋元夫人林注曹小邾姓也愚按宋元夫人本魯女何故繫以小邾之姓注疏無說未詳為九文注謂山龍華蟲藻火粉米黼黻也疏華若草華蟲雉也此孔傳說先儒皆以華蟲為雉而九章有宗彞此蓋逸之又虞書十二章有日月星辰周人以畫於旌旗此不序臧㑹竊其寶龜僂句按禮器家不寶龜而家語云臧氏家有守龜曰蔡文仲三年而為一兆武仲二年而為二兆孺子容三年而為三兆見禮記疏昭伯又有寶龜僂句臧㑹竊之蓋臧氏世僭於禮夫子以文仲為不知豈徒不知哉二十六年尸氏注鞏縣西南偃師城按此即水經注尸鄉祝雞翁養雞處也王后無嫡則擇立長按襄三十一年傳穆叔曰太子死有母弟則立之無則立長蓋敬歸之子野齊歸之子稠皆非嫡嗣也王猛為太子夀母弟或穆后娣姪之子則其事與魯異矣子朝安得援立長之說孔氏云王后夫人無娣姪之子乃於諸妾之中擇長立之此可以定王猛子朝之案二十七年事君如在國顧炎武曰當時諸侯出奔其國即别立一君惟魯不然昭公雖在外而意如猶以君禮事之范鞅所言蓋為此也注以為書公行告公至不亦謬乎二十九年遂濟窮桑注窮桑少皥之號地在魯北疏賈逵云處窮桑以登為帝故天下號之曰窮桑帝定四年傳稱封伯禽於少皥之虛是窮桑地在魯北也三十一年趙簡子夢童子裸而轉以歌注轉宛轉也按樂府有宛轉歌出此賈公彥曰晉與楚同盟趙簡子晉正卿適吳將伐同盟日應之食故夢發簡子愚謂此說非也吳雖夷姬姓之長吳之强成於入郢黃池之㑹簡子與焉故因日食而先以兆示之耳定公五年卒於房顧炎武曰房疑即防字古卩字作􅎧脫其下而為字漢仙人唐公碑可證也漢書汝南郡吳房孟康曰本房子國而史記項羽紀封楊武為吳房侯字亦作防八年公㑹晉師於瓦范獻子執羔趙簡子中行文子執鴈儀禮疏尚書二生傳云卿執羔大夫執鴈彼從諸侯見天子得有羔鴈若諸侯相朝其臣從君亦得執羔鴈見主君可知獻子執羔簡子文子執鴈是從君見主君禮若為君聘特來則不得執之自有束錦請覿之禮在取寶玉大弓以出公羊傳寶者何璋判白弓繡質龜青純何休注判半也半圭曰璋圭璧琮璜璋盡亡之獨言璋者以祭祀尤重詩奉璋峩峩是也質弣也大者力千斤純緣也謂緣申髯也千嵗之龜青髯按杜氏言夏后氏之璜杜父之繁弱特據祝鮀語耳見定四年合觀此方備十年吾僞固而授之末疏據少儀刀卻刃授穎削授拊凡有刺刃者以授人則辟刃鄭𤣥云穎鐶也拊謂把辟刃不以正鄉人也圉人僞為固陋不知此禮以劒鋒末授之欲因推而殺之哀公三年子服景伯至禮記疏按世本獻子蔑生孝伯孝伯生惠伯惠伯生昭伯昭伯生景伯檀弓稱子服伯子蓋景是諡伯是字也五年公子陽生來奔按公羊述陽生事甚詳其奔魯也實陳乞為之蓋立陽生其本謀也經安得不坐以弒君之獄辨詳集說六年出萊門而告之故按定六年傳陽虎使焚萊門注云萊門陽關邑門時虎將奔齊蓋自魯適齊道必由此門也十一年為王孫氏顧炎武曰傳終言之亦猶夫槩奔楚為堂溪氏也注云改姓欲以辟吳禍非十三年趙鞅呼司馬寅曰疏如此傳趙鞅先欲與吳戰也吳語云吳晉爭長未成邊遽仍至以越亂告吳王懼合大夫謀曰無㑹而歸與㑹而先晉孰利王孫雄對曰二者莫利必㑹而先之乃布陳雞鳴而完去晉軍一里昧明王秉袍鳴鼓三軍皆譁聲動天地晉軍大駭令董褐請事賈逵等皆云董褐司馬寅也如彼文則吳欲先戰國語各記其國之事言有彼此故其文不同請少待之吳語董褐既致命乃告趙鞅曰臣觀吳王之色類有大憂小則嬖妾適子死大則越入吳將毒不可與戰主其許之說與此傳小異十四年子我盟諸陳於陳宗按陳宗乃陳氏宗廟蓋就鬼神以盟之也與下有如陳宗同正義云陳氏宗主謂陳成子也非是迹人來告周禮大司徒迹人掌邦田之地政為厲禁而守之凡田獵者受令焉十六年六月衛侯飲孔悝於平陽醉而送之夜半而遣之按蒯聵之得國全由孔悝考世系悝實成叔達之七世孫文子圉之子也禮記載蒯聵賜悝鼎銘之辭在是年六月丁巳而迫而逐之即在此月銘辭序孔達左右成公甚有勞績不轉盼而棄之其行事反覆悖亂如此未幾死於戎州人之手不亦宜乎續補成公元年入自丘輿顧炎武曰左傳地名相同者多是年鞍之戰入自丘輿注云齊邑三年鄭師禦晉敗諸丘輿注云鄭地哀十四年阮氏葬諸丘輿注云太山南城縣西北有輿城又是魯地是丘輿為三國地也又文七年穆叔如莒蒞盟及鄢陵注云莒邑成十六年戰于鄢陵注云鄭地今屬潁川郡是鄢陵為二國地也襄十四年伐秦至于棫林注云秦地十六年次于棫林注云許地是棫林為二國地也襄十七年飲馬于重丘注云曹邑二十五年同盟于重丘注云齊地是重丘為二國地也定十二年費人北國人追之敗諸姑蔑無注必魯地哀十三年彌庸見姑蔑之旗注云越地今東陽太末縣是姑蔑為二國地也又地名盂者有五僖二十一年㑹于盂宋之盂也定八年劉子伐盂周之盂也十四年蒯聵獻盂于齊衛之盂也而晉則有二盂昭二十八年盂丙為盂大夫今太原盂縣哀四年齊國夏伐晉取邢任欒鄗逆畤隂人盂壺口此盂當在邢洺之間昭公十八年天道逺人道邇顧炎武曰鄭裨竈魯梓慎最明于天文是年夏五月宋衛陳鄭災裨竈曰不用吾言鄭又將火子産不從亦不復火二十八年夏五月朔日食梓慎曰將水叔孫昭子曰旱也秋八月大雩是雖二子之精有時亦不驗也然又有一事兩占而皆驗者襄二十八年春無冰梓慎曰宋鄭必饑裨竈曰今兹周王及楚子皆將死十一月癸巳天王崩十二月楚康王卒宋鄭皆饑是兩占都驗也定公元年正月辛巳晉魏舒合諸侯之大夫于狄泉將以營成周顧炎武曰昭三十二年傳冬十一月晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周與此只一事左氏兩收而失刪其一蓋晉用夏正周之正月晉之十一月也其前年傳曰己丑士彌牟營成周計丈數揣髙卑度厚薄仞溝洫物土方議逺邇量事期計徒庸慮財用書餱糧以㑹役于諸侯此年傳又曰庚寅栽宋仲幾不受功庚寅即己丑之明日而傳分為兩年豈有遲之兩月而始栽仲幾乃不受功者且此役不過三旬而畢矣哀公二年上大夫受縣下大夫受郡呂祖謙曰春秋之時郡屬于縣趙簡子誓衆所謂上大夫受縣下大夫受郡是也戰國之時縣屬于郡秦紀惠文十年魏納上郡十五縣是也方孝公商鞅時并小鄉為大縣縣一令尚未有郡牧守稱及魏納上郡後十餘年秦紀始書置漢中郡豈山東諸侯先變古制而秦效之歟讀左日鈔補卷下
